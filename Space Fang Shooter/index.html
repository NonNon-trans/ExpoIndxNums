    function updateBoss(dt) {
      bossSlots.forEach((bossSlot) => withBoss(bossSlot, () => updateSingleBoss(dt)));
    }

    function updateStage3MothershipEngagement() {
      if (stage.current !== 3 || stage.mothershipEngaged || !mothershipBoss.spawned) return;
      const escortsCleared = [primaryBoss, boss2].every((escort) => (
        escort.spawned &&
        escort.defeated &&
        !escort.group
      ));
      if (!escortsCleared) return;

      withBoss(mothershipBoss, () => {
        if (!boss.active || boss.defeated || !boss.group) return;
        stage.mothershipEngaged = true;
        stageTestLog("Stage 3 escorts defeated; mothership engaged");
        boss.standby = false;
        boss.intro = true;
        boss.homeZ = -260;
        boss.attackTimer = 1.1;
        boss.movementTime = 0;
        showCenterMessage("MOTHERSHIP ADVANCING<br>SHIELD GENERATORS ONLINE", "warning", 1.8);
        playWarningSound();
      });
    }

    function updateSingleBoss(dt) {
      if (boss.messageTimer > 0) {
        boss.messageTimer = Math.max(0, boss.messageTimer - dt);
        if (boss.messageTimer <= 0) {
          hud.centerAlert.className = "";
          hud.centerAlert.textContent = "";
        }
      }

      if (!boss.active || !boss.group) return;
      boss.movementTime += dt;
      if (boss.defeated) {
        updateBossDefeat(dt);
        return;
      }
      if (boss.docked) {
        updateDockedEscortBoss(dt);
        return;
      }
      updateBossPhase();

      if (boss.intro) {
        boss.group.position.z = THREE.MathUtils.lerp(boss.group.position.z, boss.homeZ, 1 - Math.exp(-dt * 0.75));
        boss.group.position.y = THREE.MathUtils.lerp(boss.group.position.y, boss.kind === "mothership" ? 86 : 74, 1 - Math.exp(-dt * 0.7));
        if (Math.abs(boss.group.position.z - boss.homeZ) < 5) boss.intro = false;
        return;
      }

      if (boss.standby) {
        updateBossMovement(dt);
        updateBossTurretEffects(dt);
        updateBossShield(dt);
        return;
      }

      updateBossMovement(dt);
      updateBossAttacks(dt);
      updateBossTurretEffects(dt);
      updateBossShield(dt);
    }

    function updateDockedEscortBoss(dt) {
      const mother = mothershipBoss;
      if (mother.group && mother.active && !mother.defeated) {
        const dockTarget = mother.group.position.clone().add(new THREE.Vector3(boss.dockOffsetX, -12, 18));
        boss.group.position.lerp(dockTarget, 1 - Math.exp(-dt * 5.4));
        boss.group.rotation.z = Math.sin(clock.elapsedTime * 3 + boss.dockOffsetX) * 0.04;
        const motherFacingPlayer = !mother.intro && Math.abs(mother.group.position.z + 180) < 8;
        if (!motherFacingPlayer) return;
        boss.detachTimer = Math.max(0, boss.detachTimer - dt);
      } else {
        boss.detachTimer = 0;
      }

      if (boss.detachTimer <= 0) {
        boss.docked = false;
        boss.intro = false;
        boss.movementTime = Math.random() * Math.PI * 2;
        boss.attackTimer = 0.45 + Math.random() * 0.25;
        boss.group.position.x += Math.sign(boss.dockOffsetX || boss.homeX || 1) * 6;
        boss.group.position.z -= 10;
        if (!mother.escortLaunchAnnounced) {
          mother.escortLaunchAnnounced = true;
          showCenterMessage("ESCORTS LAUNCH", "warning", 1.0);
          playWarningSound();
        }
      }
    }

    function updateBossShield(dt) {
      const turretsAlive = boss.turrets.some((turret) => turret.alive);
      const generatorsAlive = boss.shieldGenerators.some((generator) => generator.alive);
      boss.shieldHitFlash = Math.max(0, boss.shieldHitFlash - dt);
      boss.shieldBreakTimer = Math.max(0, boss.shieldBreakTimer - dt);

      if (boss.kind === "mothership") {
        if (generatorsAlive) {
          boss.shieldBroken = false;
          boss.shieldHp = boss.shieldMaxHp;
        }
        if (boss.shieldMesh) {
          const visible = generatorsAlive && !boss.defeated;
          boss.shieldMesh.visible = visible;
          if (visible) {
            const pulse = 1 + Math.sin(clock.elapsedTime * 4.4) * 0.05 + boss.shieldHitFlash * 0.32;
            boss.shieldMesh.scale.set(1.25 * pulse, 0.92 * pulse, 0.7 * pulse);
            boss.shieldMesh.material.opacity = 0.16 + boss.shieldHitFlash * 0.38;
          }
        }
        return;
      }

      if (!turretsAlive && !boss.defeated) {
        if (boss.shieldBroken && boss.coreHp > 0) {
          boss.shieldRechargeTimer = Math.max(0, boss.shieldRechargeTimer - dt);
          if (boss.shieldRechargeTimer <= 0) {
            if (boss.shieldRechargeProgress <= 0) {
              showCenterMessage("SHIELD RECHARGING", "warning", 1.0);
              playWarningSound();
            }
            boss.shieldRechargeProgress += dt;
            boss.shieldHp = Math.min(boss.shieldMaxHp, boss.shieldHp + (boss.shieldMaxHp / boss.shieldRechargeDuration) * dt);
            if (boss.shieldHp >= boss.shieldMaxHp) {
              boss.shieldBroken = false;
              boss.shieldRechargeProgress = 0;
              showCenterMessage("SHIELD RESTORED", "warning", 1.1);
            }
          }
        }
      }

      if (boss.shieldMesh) {
        const visible = !turretsAlive && !boss.defeated && (!boss.shieldBroken || boss.shieldRechargeProgress > 0 || boss.shieldBreakTimer > 0);
        boss.shieldMesh.visible = visible;
        if (visible) {
          const pulse = 1 + Math.sin(clock.elapsedTime * 5.4) * 0.045 + boss.shieldHitFlash * 0.32 + boss.shieldBreakTimer * 0.75;
          boss.shieldMesh.scale.set(1.15 * pulse, 0.9 * pulse, 0.72 * pulse);
          boss.shieldMesh.material.opacity = 0.12 + boss.shieldHitFlash * 0.38 + boss.shieldBreakTimer * 0.5;
        }
      }
    }

    function updateBossPhase() {
      const nextPhase = boss.coreHp <= 25 ? 3 : boss.coreHp <= 55 ? 2 : 1;
      if (nextPhase !== boss.phase) {
        boss.phase = nextPhase;
        stage.bossPhase = nextPhase;
        showCenterMessage(nextPhase === 2 ? "PHASE 2" : "FINAL PHASE", "info", 1.3);
        playWarningSound();
      }
    }

    function updateBossMovement(dt) {
      if (boss.chargeState !== "idle") {
        updateBossCharge(dt);
        return;
      }
      const speed = boss.phase === 1 ? 0.45 : boss.phase === 2 ? 0.75 : 1.0;
      const isMother = boss.kind === "mothership";
      const stage3Escort = stage.current === 3 && !isMother;
      const motherEngaged = isMother && stage.current === 3 && !boss.standby;
      const xAmplitude = motherEngaged ? 46 : isMother ? 16 : stage3Escort ? 62 : stage.current >= 2 ? 24 : 45;
      const yAmplitude = motherEngaged ? 22 : isMother ? 4 : stage3Escort ? 26 : boss.phase >= 2 ? 18 : 0;
      const target = new THREE.Vector3(
        boss.homeX + Math.sin(boss.movementTime * speed) * xAmplitude,
        (isMother ? 86 : 74) + Math.sin(boss.movementTime * 1.1 + boss.homeX * 0.03) * yAmplitude,
        boss.homeZ
      );
      boss.group.position.lerp(target, 1 - Math.exp(-dt * 2.2));
      boss.group.rotation.z = Math.sin(boss.movementTime * speed) * 0.08;
      boss.core.material.emissiveIntensity = boss.phase === 3 ? 1.8 + Math.sin(clock.elapsedTime * 16) * 0.7 : boss.phase === 2 ? 1.25 : 0.9;
    }

    function updateBossAttacks(dt) {
      if (boss.standby) return;
      boss.attackTimer -= dt;
      boss.chargeCooldown -= dt;
      if (boss.phase === 3 && boss.chargeCooldown <= 0 && boss.chargeState === "idle") {
        boss.chargeState = "windup";
        boss.chargeTimer = 0.85;
        boss.chargeCooldown = 6.2;
        showCenterMessage("CHARGE ATTACK", "warning", 1.0);
        playWarningSound();
        return;
      }
      if (boss.attackTimer > 0) return;

      const aliveTurrets = boss.turrets.filter((turret) => turret.alive);
      if (aliveTurrets.length === 0) {
        boss.attackTimer = 1.2;
        return;
      }
      const turret = aliveTurrets[Math.floor(boss.movementTime * 2) % aliveTurrets.length];
      boss.attackCount += 1;
      // 通常敵と同じテンポの単発射撃を主軸にし、3発目だけ追尾弾へ差し替える。
      if (boss.attackCount % 3 === 0) {
        fireBossHomingBullet(turret);
      } else {
        fireBossDirectBullet(turret);
      }
      boss.attackTimer = 1.25 + Math.random() * 0.7;
    }

    function updateBossCharge(dt) {
      boss.chargeTimer -= dt;
      if (boss.chargeState === "windup") {
        boss.group.position.z = THREE.MathUtils.lerp(boss.group.position.z, -245, 1 - Math.exp(-dt * 3.2));
        if (boss.chargeTimer <= 0) {
          boss.chargeState = "dash";
          boss.chargeTimer = 0.74;
          boss.chargeHit = false;
        }
      } else if (boss.chargeState === "dash") {
        boss.group.position.z = THREE.MathUtils.lerp(boss.group.position.z, 8, 1 - Math.exp(-dt * 7.5));
        if (!boss.chargeHit && boss.group.position.distanceTo(player.position) < 24 && player.invincibleTimer <= 0) {
          player.hp = Math.max(0, player.hp - 28);
          boss.damageTakenDuringBoss += 28;
          boss.chargeHit = true;
          triggerPlayerDamageImpact({ velocity: new THREE.Vector3(0, 0, 180) });
        }
        if (boss.chargeTimer <= 0) {
          boss.chargeState = "return";
          boss.chargeTimer = 1.2;
        }
      } else if (boss.chargeState === "return") {
        boss.group.position.lerp(new THREE.Vector3(boss.homeX, boss.kind === "mothership" ? 86 : 74, boss.homeZ), 1 - Math.exp(-dt * 2.8));
        if (boss.chargeTimer <= 0) boss.chargeState = "idle";
      }
    }

    function fireBossSpread(turret, count, angleStep, predictive = false) {
      const origin = turret.group.getWorldPosition(new THREE.Vector3());
      const aim = player.position.clone();
      if (predictive) aim.add(player.position.clone().sub(player.target).multiplyScalar(-1.2));
      const baseDir = aim.sub(origin).normalize();
      const start = -Math.floor(count / 2);
      for (let i = 0; i < count; i++) {
        const dir = baseDir.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), (start + i) * angleStep);
        spawnBossBullet(origin, dir);
      }
    }

    function fireBossDirectBullet(turret) {
      const origin = turret.group.getWorldPosition(new THREE.Vector3());
      const direction = player.position.clone().sub(origin).normalize();
      spawnBossBullet(origin, direction);
    }

    function spawnBossBullet(origin, direction) {
      const bullet = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 12, 8),
        new THREE.MeshBasicMaterial({ color: 0xff4f5d })
      );
      bullet.position.copy(origin);
      bullet.velocity = direction.multiplyScalar(105);
      bullet.userData.bossBullet = true;
      world.add(bullet);
      enemyBullets.push(bullet);
    }

    function fireBossHomingBullet(turret) {
      const origin = turret.group.getWorldPosition(new THREE.Vector3());
      const bullet = new THREE.Mesh(
        new THREE.SphereGeometry(boss.phase === 3 ? 2.35 : 2.05, 18, 10),
        new THREE.MeshBasicMaterial({
          color: boss.phase === 3 ? 0xff2f9e : 0xff7a2d,
          transparent: true,
          opacity: 0.96,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      bullet.position.copy(origin);
      const direction = player.position.clone().sub(origin).normalize();
      bullet.velocity = direction.multiplyScalar(boss.phase === 1 ? 98 : boss.phase === 2 ? 112 : 128);
      bullet.userData.bossBullet = true;
      bullet.userData.homing = true;
      bullet.userData.turnRate = boss.phase === 1 ? 1.45 : boss.phase === 2 ? 1.7 : 1.95;
      bullet.userData.speed = boss.phase === 1 ? 98 : boss.phase === 2 ? 112 : 128;
      bullet.userData.life = 5.2;
      bullet.userData.damage = boss.phase === 3 ? 18 : 15;
      bullet.userData.hitRadius = boss.phase === 3 ? 8.8 : 8.2;
      bullet.userData.trailTimer = 0;
      bullet.userData.trailColor = boss.phase === 3 ? 0xff2f9e : 0xff8a2a;
      world.add(bullet);
      enemyBullets.push(bullet);
    }

    function updateBossTurretEffects(dt) {
      boss.shieldGenerators.forEach((generator, index) => {
        if (!generator.alive) {
          if (generator.outerRing) generator.outerRing.visible = false;
          if (generator.innerRing) generator.innerRing.visible = false;
          if (generator.beacon) generator.beacon.visible = false;
          return;
        }

        if (generator.flash > 0) {
          generator.flash = Math.max(0, generator.flash - dt);
          generator.group.scale.setScalar(1 + generator.flash * 0.36);
        } else {
          generator.group.scale.setScalar(1);
        }

        const phase = generator.markerPhase ?? index * 1.7;
        const markerPulse = 0.82 + Math.sin(clock.elapsedTime * 5.5 + phase) * 0.18;
        if (generator.outerRing) {
          generator.outerRing.rotation.z += dt * 1.8;
          generator.outerRing.scale.setScalar(markerPulse);
          generator.outerRing.material.opacity = 0.55 + markerPulse * 0.18;
        }
        if (generator.innerRing) {
          generator.innerRing.rotation.z -= dt * 2.3;
          generator.innerRing.scale.setScalar(0.62 + markerPulse * 0.22);
          generator.innerRing.material.opacity = 0.42 + markerPulse * 0.2;
        }
        if (generator.beacon) {
          const beaconPulse = 0.76 + Math.sin(clock.elapsedTime * 6.8 + phase) * 0.24;
          generator.beacon.material.opacity = 0.5 + markerPulse * 0.36;
          generator.beacon.scale.set(10 + beaconPulse * 5.5, 14 + beaconPulse * 7.5, 1);
        }
        if (generator.core?.material) {
          generator.core.material.opacity = 0.74 + markerPulse * 0.2;
        }
      });
      boss.turrets.forEach((turret) => {
        if (turret.flash > 0) {
          turret.flash = Math.max(0, turret.flash - dt);
          turret.group.scale.setScalar(1 + turret.flash * 0.25);
        } else {
          turret.group.scale.setScalar(1);
        }
        if (!turret.alive && Math.random() < dt * 3) {
          spawnHitEffect(turret.group.getWorldPosition(new THREE.Vector3()), 0x777777);
        }
      });
    }

    function updateBossDefeat(dt) {
      if (!boss.defeated || !boss.group) return;
      boss.defeatTimer -= dt;
      boss.defeatExplosionTimer -= dt;
      boss.group.position.x += (Math.random() - 0.5) * 0.8;
      boss.group.position.y += (Math.random() - 0.5) * 0.8;
      if (boss.defeatExplosionTimer <= 0 && boss.defeatExplosions < 10) {
        const pos = boss.group.position.clone().add(new THREE.Vector3((Math.random() - 0.5) * 65, (Math.random() - 0.5) * 34, (Math.random() - 0.5) * 42));
        spawnExplosion(pos);
        boss.defeatExplosionTimer = 0.22;
        boss.defeatExplosions += 1;
      }
      if (boss.defeatTimer <= 0) {
        spawnExplosion(boss.group.position.clone());
        for (let i = 0; i < 5; i++) {
          spawnEnemyDebris(
            boss.group.position.clone().add(new THREE.Vector3((Math.random() - 0.5) * 58, (Math.random() - 0.5) * 28, (Math.random() - 0.5) * 42)),
            boss.group.quaternion
          );
        }
        player.shakeDuration = 0.7;
        player.shakeTimer = 0.7;
        player.shakePower = 18;
        player.damageFlashTimer = player.damageFlashDuration;
        world.remove(boss.group);
        boss.group = null;
        boss.active = false;
        stage.bossDefeated = bossSlots
          .filter((bossSlot) => bossSlot.spawned)
          .every((bossSlot) => bossSlot.defeated && !bossSlot.group);
        if (stage.bossDefeated) {
          const clearMessage = stage.current === 2
            ? "Both Stage 2 bosses defeated"
            : stage.current === 3
              ? "Mothership defeated"
              : `Stage ${stage.current} boss defeated`;
          stageTestLog(clearMessage);
        }
        hitStopTimer = 0.45;
      }
    }

    function spawnWave() {
      stage.wave += 1;
      const remaining = stage.totalEnemies - stage.spawnedEnemies;
      // ステージが進むほど一度に押し寄せる敵数を増やし、後半戦の圧を強める。
      const waveMin = stage.current >= 3 ? 25 : stage.current >= 2 ? 15 : 10;
      const waveMax = stage.current >= 3 ? 30 : stage.current >= 2 ? 25 : 15;
      const count = Math.min(remaining, THREE.MathUtils.randInt(waveMin, waveMax));
      const columns = 5;
      const rows = Math.ceil(count / columns);
      const spacingX = 28;
      const spacingY = 20;
      const spacingZ = 34;
      const formationWidth = (columns - 1) * spacingX;
      const formationHeight = (rows - 1) * spacingY;
      const baseX = -formationWidth / 2;
      const baseY = 58 - formationHeight / 2;

      for (let i = 0; i < count; i++) {
        const row = Math.floor(i / columns);
        const column = i % columns;
        const isOddRow = row % 2 === 1;
        const rowOffsetX = isOddRow ? spacingX * 0.5 : 0;
        const waveDrift = Math.sin(stage.wave * 0.9) * 8;
        const heavyChance = stage.current >= 3 ? 0.34 : stage.current >= 2 ? 0.26 : 0.14;
        const isHeavy = Math.random() < heavyChance;
        const enemy = createEnemy(isHeavy ? "heavy" : "normal");
        const slideFromSide = stage.current >= 3 && isHeavy && Math.random() < 0.65;
        const targetX = baseX + column * spacingX + rowOffsetX + waveDrift;

        enemy.group.position.set(
          slideFromSide ? (Math.random() < 0.5 ? -132 : 132) : targetX,
          baseY + row * spacingY,
          -620 - row * spacingZ - column * 7
        );
        if (slideFromSide) {
          enemy.lateralEntry = true;
          enemy.lateralTargetX = targetX;
          enemy.lateralDirection = enemy.group.position.x < 0 ? 1 : -1;
        }
        enemy.hp = enemy.bodyHp;
        enemy.stopZ = -135 - row * 10 - column * 2;
        enemy.fireTimer = 1.0 + row * 0.22 + column * 0.11 + Math.random() * 0.45;
        enemy.score = enemy.variant === "heavy" ? 180 : 100;
        world.add(enemy.group);
        enemies.push(enemy);
        stage.spawnedEnemies += 1;
      }

      stage.waveTimer = 3.2;
    }

    function rememberBaseMaterial(mesh) {
      const materials = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      materials.forEach((material) => {
        if (!material || !material.color) return;
        material.userData.baseColor = material.color.clone();
        if (material.emissive) material.userData.baseEmissive = material.emissive.clone();
      });
    }

    function createEnemyPart(name, object, hp) {
      object.traverse((child) => {
        if (child.isMesh) rememberBaseMaterial(child);
      });
      const enemyScale = object.getWorldScale(new THREE.Vector3()).x || 1;
      return {
        name,
        object,
        hp,
        maxHp: hp,
        radius: ENEMY_PART_DATA[name].radius * enemyScale,
        score: ENEMY_PART_DATA[name].score,
        destroyed: false,
        flashTimer: 0
      };
    }

    function createEnemy(variant = "normal") {
      const isHeavy = variant === "heavy";
      const group = new THREE.Group();
      const bodyMat = new THREE.MeshStandardMaterial({ color: isHeavy ? 0x5b5260 : 0x34495d, emissive: isHeavy ? 0x160706 : 0x03131b, roughness: 0.42, metalness: isHeavy ? 0.5 : 0.38 });
      const panelMat = new THREE.MeshStandardMaterial({ color: isHeavy ? 0x21151b : 0x0e1b28, emissive: isHeavy ? 0x220704 : 0x001018, roughness: 0.56, metalness: 0.28 });
      const wingMat = new THREE.MeshStandardMaterial({ color: isHeavy ? 0x3d3745 : 0x1d3345, emissive: isHeavy ? 0x160604 : 0x02131c, roughness: 0.45, metalness: isHeavy ? 0.42 : 0.3 });
      const sensorMat = new THREE.MeshStandardMaterial({ color: isHeavy ? 0xff8a2a : 0xff3b5c, emissive: isHeavy ? 0xc94c09 : 0xc41335, roughness: 0.16 });
      const engineMat = new THREE.MeshStandardMaterial({ color: 0x111927, emissive: isHeavy ? 0x7c2508 : 0x113954, roughness: 0.34, metalness: 0.36 });
      const holoLineMat = new THREE.MeshBasicMaterial({ color: isHeavy ? 0xff9a3a : 0x69f6ff, transparent: true, opacity: 0.76, blending: THREE.AdditiveBlending, depthWrite: false });
      const targetMat = new THREE.MeshBasicMaterial({ color: 0xfff15a, transparent: true, opacity: 0.86, blending: THREE.AdditiveBlending, depthWrite: false });
      const partHp = (name) => isHeavy ? HEAVY_ENEMY_PART_HP[name] : ENEMY_PART_DATA[name].hp;

      const bodyGroup = new THREE.Group();
      const body = new THREE.Mesh(new THREE.CapsuleGeometry(3.5, 23.0, 12, 22), bodyMat.clone());
      body.rotation.x = Math.PI / 2;
      bodyGroup.add(body);

      const nose = new THREE.Mesh(new THREE.ConeGeometry(2.7, 8.6, 24), bodyMat.clone());
      nose.rotation.x = Math.PI / 2;
      nose.position.z = 15.7;
      bodyGroup.add(nose);

      const dorsalPanel = new THREE.Mesh(new THREE.BoxGeometry(5.2, 1.0, 10.8), panelMat.clone());
      dorsalPanel.position.set(0, 3.0, -1.0);
      bodyGroup.add(dorsalPanel);
      const bellyLine = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 18.5), holoLineMat);
      bellyLine.position.set(0, 2.9, 0.7);
      bodyGroup.add(bellyLine);
      if (isHeavy) {
        [-1, 1].forEach((side) => {
          const armor = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.3, 17.5), panelMat.clone());
          armor.position.set(side * 3.7, 2.1, -0.8);
          bodyGroup.add(armor);
        });
      }
      group.add(bodyGroup);

      const leftWing = new THREE.Mesh(new THREE.BoxGeometry(21.5, 0.62, 5.6), wingMat.clone());
      leftWing.position.set(-14.4, 0.9, -2.5);
      leftWing.rotation.z = -0.035;
      leftWing.rotation.y = 0.04;
      if (isHeavy) {
        const armor = new THREE.Mesh(new THREE.BoxGeometry(8.4, 0.48, 2.5), panelMat.clone());
        armor.position.set(0, 0.56, -0.65);
        leftWing.add(armor);
      }
      const leftWingLine = new THREE.Mesh(new THREE.BoxGeometry(14.0, 0.08, 0.16), holoLineMat);
      leftWingLine.position.set(-1.4, 0.45, -1.35);
      leftWing.add(leftWingLine);
      group.add(leftWing);

      const rightWing = new THREE.Mesh(new THREE.BoxGeometry(21.5, 0.62, 5.6), wingMat.clone());
      rightWing.position.set(14.4, 0.9, -2.5);
      rightWing.rotation.z = 0.035;
      rightWing.rotation.y = -0.04;
      if (isHeavy) {
        const armor = new THREE.Mesh(new THREE.BoxGeometry(8.4, 0.48, 2.5), panelMat.clone());
        armor.position.set(0, 0.56, -0.65);
        rightWing.add(armor);
      }
      const rightWingLine = new THREE.Mesh(new THREE.BoxGeometry(14.0, 0.08, 0.16), holoLineMat);
      rightWingLine.position.set(1.4, 0.45, -1.35);
      rightWing.add(rightWingLine);
      group.add(rightWing);

      const engineGroup = new THREE.Group();
      engineGroup.position.set(0, 4.7, -9.4);
      const engine = new THREE.Mesh(new THREE.CylinderGeometry(2.55, 3.2, 7.6, 20), engineMat.clone());
      engine.rotation.x = Math.PI / 2;
      engineGroup.add(engine);
      const intake = new THREE.Mesh(new THREE.CylinderGeometry(1.45, 1.8, 0.9, 18), panelMat.clone());
      intake.rotation.x = Math.PI / 2;
      intake.position.z = 3.85;
      engineGroup.add(intake);
      group.add(engineGroup);

      const cockpit = new THREE.Mesh(new THREE.SphereGeometry(2.25, 20, 12), sensorMat.clone());
      cockpit.name = "cockpit";
      cockpit.scale.set(1.95, 0.45, 0.8);
      cockpit.position.set(0, 1.4, 12.4);
      group.add(cockpit);

      const tailBoom = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.3, 10.5), panelMat.clone());
      tailBoom.position.set(0, 0.7, -14.4);
      group.add(tailBoom);

      [-1, 1].forEach((side) => {
        const tail = new THREE.Mesh(new THREE.BoxGeometry(0.7, 6.5, 4.8), wingMat.clone());
        tail.position.set(side * 3.1, 2.9, -18.0);
        tail.rotation.z = side * 0.34;
        tail.rotation.x = -0.08;
        group.add(tail);
      });

      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(1.25, 14, 8),
        new THREE.MeshBasicMaterial({ color: isHeavy ? 0xff7a2d : 0x58e6ff, transparent: true, opacity: 0.82, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      glow.scale.set(1.45, 0.7, 0.7);
      glow.position.set(0, 4.7, -13.6);
      group.add(glow);

      [
        { object: leftWing, scale: [4.6, 4.6, 1], pos: [0, 0.7, -0.2] },
        { object: rightWing, scale: [4.6, 4.6, 1], pos: [0, 0.7, -0.2] },
        { object: engineGroup, scale: [3.6, 3.6, 1], pos: [0, 0, 0] },
        { object: cockpit, scale: [3.2, 3.2, 1], pos: [0, 0, 0] }
      ].forEach((spec) => {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(1, 0.045, 6, 28), targetMat);
        ring.scale.set(...spec.scale);
        ring.position.set(...spec.pos);
        ring.rotation.x = Math.PI / 2;
        spec.object.add(ring);
      });
      if (isHeavy) group.scale.setScalar(2.0);

      const parts = {
        leftWing: createEnemyPart("leftWing", leftWing, partHp("leftWing")),
        rightWing: createEnemyPart("rightWing", rightWing, partHp("rightWing")),
        engine: createEnemyPart("engine", engineGroup, partHp("engine")),
        cockpit: createEnemyPart("cockpit", cockpit, partHp("cockpit")),
        body: createEnemyPart("body", bodyGroup, partHp("body"))
      };

      return {
        id: nextEnemyId++,
        variant,
        isHeavy,
        group,
        baseScale: isHeavy ? 2.0 : 1,
        hp: parts.body.hp,
        bodyHp: parts.body.hp,
        parts,
        engineGlow: glow,
        stopZ: -130,
        fireTimer: 1.5,
        score: 100,
        stopped: false,
        destroyed: false,
        controlState: "normal",
        engineFailureTimer: 0,
        disabledTimer: 0,
        hitShakeTimer: 0,
        hitShakePower: 0,
        lateralEntry: false,
        lateralTargetX: 0,
        lateralDirection: 0,
        wobbleSeed: Math.random() * Math.PI * 2,
        partBonus: 0
      };
    }

    function getEnemyPartWorldPosition(part) {
      return part.object.getWorldPosition(new THREE.Vector3());
    }

    function hitEnemyPartWithProjectile(enemy, position, damage, options = {}) {
      if (!enemy || enemy.destroyed) return false;
      const order = options.preferMissileOrder ? ENEMY_MISSILE_PART_ORDER : ENEMY_PART_ORDER;
      let bestPartName = null;
      let bestDistance = Infinity;

      for (const partName of order) {
        const part = enemy.parts[partName];
        if (!part || part.destroyed) continue;
        const partPos = getEnemyPartWorldPosition(part);
        const projectileRadius = options.projectileRadius || 0;
        const previousPosition = options.previousPosition || position;

        const distance = distancePointToSegment(
          partPos,
          previousPosition,
          position
        );

        if (
          distance <= part.radius + projectileRadius &&
          (!options.preferMissileOrder || distance < bestDistance)
        ) {
          bestPartName = partName;
          bestDistance = distance;

          if (!options.preferMissileOrder) break;
        }
      }

      if (!bestPartName) return false;
      damageEnemyPart(enemy, bestPartName, damage, position, options);
      return bestPartName;
    }

    function applyEnemyAreaDamage(enemy, position, radius, damage, excludedPartName = "") {
      if (!enemy || enemy.destroyed) return;
      const damagedParts = new Set();
      ENEMY_PART_ORDER.forEach((partName) => {
        const part = enemy.parts[partName];
        if (!part || part.destroyed || partName === excludedPartName) return;
        if (damagedParts.has(partName)) return;
        const partPos = getEnemyPartWorldPosition(part);
        if (partPos.distanceTo(position) <= radius + part.radius * 0.45) {
          damagedParts.add(partName);
          damageEnemyPart(enemy, partName, damage, position, { area: true });
        }
      });
    }

    function damageEnemyPart(enemy, partName, damage, position, options = {}) {
      const part = enemy.parts[partName];
      if (!part || part.destroyed || enemy.destroyed) return;

      part.hp = Math.max(0, part.hp - damage);
      part.flashTimer = 0.13;
      if (enemy.isHeavy) {
        // 装甲ドローンは被弾が分かるよう、弾が当たるたびに短く機体を震わせる。
        enemy.hitShakeTimer = Math.max(enemy.hitShakeTimer, 0.16);
        enemy.hitShakePower = Math.min(1, enemy.hitShakePower + 0.22 + damage * 0.08);
      }
      spawnHitEffect(position.clone(), partName === "engine" ? 0xff7045 : 0xfff1be);
      playMetalPing();

      if (partName === "body") {
        enemy.bodyHp = part.hp;
        enemy.hp = part.hp;
      }

      if (part.hp > 0) return;
      destroyEnemyPart(enemy, partName, position, options);
    }

    function destroyEnemyPart(enemy, partName, position, options = {}) {
      const part = enemy.parts[partName];
      if (!part || part.destroyed || enemy.destroyed) return;

      part.destroyed = true;
      if (part.score) {
        player.score += part.score;
        enemy.partBonus += part.score;
      }

      if (partName === "leftWing" || partName === "rightWing") {
        detachEnemyWing(enemy, partName);
        spawnPartBreakEffect(position, partName);
        showPartMessage(ENEMY_PART_DATA[partName].label, 0.75);
      } else if (partName === "engine") {
        part.object.visible = false;
        if (enemy.engineGlow) enemy.engineGlow.visible = false;
        enemy.engineFailureTimer = Math.max(enemy.engineFailureTimer, 4.0);
        spawnPartBreakEffect(position, partName);
        showPartMessage("ENGINE DESTROYED", 0.8);
      } else if (partName === "cockpit") {
        part.object.visible = false;
        if (options.heatMelt) {
          showPartMessage("HIGH-HEAT MELTDOWN", 0.85);
          destroyEnemyByRef(enemy, { melt: true });
        } else {
          spawnPartBreakEffect(position, partName);
          showPartMessage("CRITICAL HIT", 0.85);
          destroyEnemyByRef(enemy, { critical: true });
        }
      } else if (partName === "body") {
        if (options.heatMelt) {
          showPartMessage("HIGH-HEAT MELTDOWN", 0.85);
          destroyEnemyByRef(enemy, { melt: true });
        } else {
          spawnPartBreakEffect(position, partName);
          destroyEnemyByRef(enemy);
        }
      }

      updateEnemyDamageState(enemy);
    }

    function detachEnemyWing(enemy, partName) {
      const part = enemy.parts[partName];
      const source = part.object;
      const wing = source.clone();
      source.getWorldPosition(wing.position);
      source.getWorldQuaternion(wing.quaternion);
      source.getWorldScale(wing.scale);
      wing.material = source.material.clone();
      wing.visible = true;
      wing.velocity = new THREE.Vector3(
        partName === "leftWing" ? -70 : 70,
        14 + Math.random() * 18,
        55 + Math.random() * 45
      );
      wing.rotationVelocity = new THREE.Vector3(
        (Math.random() - 0.5) * 15,
        (partName === "leftWing" ? -1 : 1) * (10 + Math.random() * 8),
        (Math.random() - 0.5) * 15
      );
      wing.life = 1.3;
      wing.baseScale = 1;
      wing.userData.effectType = "debris";
      world.add(wing);
      effects.push(wing);
      source.visible = false;
    }

    function spawnPartBreakEffect(position, partName) {
      const color = partName === "engine" ? 0xff6a22 : partName === "cockpit" ? 0xffffff : 0xffd65a;
      spawnExplosion(position.clone());
      for (let i = 0; i < (partName === "engine" ? 12 : 7); i++) {
        const spark = new THREE.Mesh(
          new THREE.SphereGeometry(0.35 + Math.random() * 0.7, 8, 6),
          new THREE.MeshBasicMaterial({
            color: i % 3 === 0 ? 0xffffff : color,
            transparent: true,
            opacity: 0.92,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          })
        );
        spark.position.copy(position);
        spark.velocity = new THREE.Vector3((Math.random() - 0.5) * 70, (Math.random() - 0.5) * 48, (Math.random() - 0.5) * 78);
        spark.life = 0.38 + Math.random() * 0.35;
        spark.baseScale = 0.55;
        world.add(spark);
        effects.push(spark);
      }
      if (partName === "engine") spawnSmokePuff(position, 10);
    }

    function spawnSmokePuff(position, count = 5) {
      for (let i = 0; i < count; i++) {
        const smoke = new THREE.Mesh(
          new THREE.SphereGeometry(1.1 + Math.random() * 1.4, 8, 6),
          new THREE.MeshBasicMaterial({
            color: 0x777777,
            transparent: true,
            opacity: 0.34,
            depthWrite: false
          })
        );
        smoke.position.copy(position).add(new THREE.Vector3((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4));
        smoke.velocity = new THREE.Vector3((Math.random() - 0.5) * 14, 5 + Math.random() * 10, 18 + Math.random() * 20);
        smoke.life = 0.7 + Math.random() * 0.45;
        smoke.baseScale = 0.75;
        smoke.userData.effectType = "smoke";
        world.add(smoke);
        effects.push(smoke);
      }
    }

    function showPartMessage(message, duration = 0.75) {
      hud.partAlert.textContent = message;
      hud.partAlert.className = "visible";
      partAlertTimer = duration;
    }

    function updateEnemyPartVisuals(enemy, dt) {
      Object.values(enemy.parts).forEach((part) => {
        part.flashTimer = Math.max(0, part.flashTimer - dt);
        part.object.traverse((child) => {
          if (!child.isMesh || !child.material) return;
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          materials.forEach((material) => {
            if (!material.color || !material.userData.baseColor) return;
            if (part.flashTimer > 0) {
              material.color.set(part.name === "engine" ? 0xff744a : 0xffffff);
              if (material.emissive) material.emissive.set(0x551111);
            } else {
              material.color.copy(material.userData.baseColor);
              if (material.emissive && material.userData.baseEmissive) material.emissive.copy(material.userData.baseEmissive);
            }
          });
        });
      });
    }

    function updateEnemyDamageState(enemy) {
      const leftGone = enemy.parts.leftWing.destroyed;
      const rightGone = enemy.parts.rightWing.destroyed;
      const engineGone = enemy.parts.engine.destroyed;
      if (leftGone && rightGone) {
        if (enemy.controlState !== "critical") enemy.disabledTimer = Math.max(enemy.disabledTimer, 2.25);
        enemy.controlState = "critical";
      } else if (engineGone || leftGone || rightGone) {
        enemy.controlState = "damaged";
      } else {
        enemy.controlState = "normal";
      }
    }

    function hitBossWithProjectile(position, damage, heavy = false) {
      for (const bossSlot of bossSlots) {
        if (withBoss(bossSlot, () => hitSingleBossWithProjectile(position, damage, heavy))) return true;
      }
      return false;
    }

    function hitSingleBossWithProjectile(position, damage, heavy = false) {
      if (!boss.active || boss.intro || boss.standby || boss.defeated || !boss.group) return false;
      const bossScale = boss.kind === "mothership" ? 2 : 1;

      if (boss.kind === "mothership") {
        for (const generator of boss.shieldGenerators) {
          if (!generator.alive) continue;
          const generatorPos = generator.group.getWorldPosition(new THREE.Vector3());
          if (position.distanceTo(generatorPos) < 11.5 * bossScale) {
            damageBossGenerator(generator, damage, position);
            return true;
          }
        }
      }

      for (const turret of boss.turrets) {
        if (!turret.alive) continue;
        const turretPos = turret.group.getWorldPosition(new THREE.Vector3());
        if (position.distanceTo(turretPos) < (boss.kind === "mothership" ? 10.5 * bossScale : 7.4)) {
          damageBossTurret(turret, damage);
          spawnHitEffect(position.clone(), 0xfff1be);
          playBossHitSound();
          return true;
        }
      }

      const corePos = boss.core.getWorldPosition(new THREE.Vector3());
      const coreDistance = position.distanceTo(corePos);
      if (coreDistance < (boss.kind === "mothership" ? 19 * bossScale : 12.5)) {
        if (boss.kind === "mothership" && boss.shieldGenerators.some((generator) => generator.alive)) {
          showShieldEffect(corePos);
          showCenterMessage("SHIELD GENERATORS ACTIVE", "info", 0.75);
          return true;
        }
        const turretsAlive = boss.kind !== "mothership" && boss.turrets.some((turret) => turret.alive);
        if (turretsAlive) {
          showShieldEffect(corePos);
          return true;
        }
        if (!boss.shieldBroken) {
          damageBossShield(damage, position);
          return true;
        }
        if (boss.shieldRechargeProgress > 0 && boss.shieldHp > 0 && coreDistance >= 7.2 * bossScale) {
          damageBossShield(damage, position);
          return true;
        }
        damageBossCore(damage, heavy);
        spawnHitEffect(position.clone(), 0xffffff);
        playBossHitSound();
        return true;
      }

      // 巨大な球形判定だと、弾が前面の砲台やコアへ届く前に
      // 装甲へ吸われてしまうため、ボス後方寄りの胴体・翼だけを装甲判定にする。
      const localHitPosition = boss.group.worldToLocal(position.clone());
      const hitCentralArmor =
        Math.abs(localHitPosition.x) < (boss.kind === "mothership" ? 62 : 18) &&
        Math.abs(localHitPosition.y) < (boss.kind === "mothership" ? 24 : 13) &&
        localHitPosition.z > (boss.kind === "mothership" ? -72 : -52) &&
        localHitPosition.z < (boss.kind === "mothership" ? 42 : 18);
      const hitWingArmor =
        Math.abs(localHitPosition.x) < (boss.kind === "mothership" ? 106 : 76) &&
        Math.abs(localHitPosition.y) < (boss.kind === "mothership" ? 12 : 8) &&
        localHitPosition.z > (boss.kind === "mothership" ? -42 : -24) &&
        localHitPosition.z < (boss.kind === "mothership" ? 22 : 8);

      if (hitCentralArmor || hitWingArmor) {
        spawnHitEffect(position.clone(), 0xaaaaaa);
        playMetalPing();
        return true;
      }
      return false;
    }

    function damageBossTurret(turret, damage) {
      turret.hp -= damage;
      turret.flash = 0.22;
      if (turret.hp > 0) return;

      turret.alive = false;
      turret.group.visible = false;
      player.score += 1000;
      registerComboKill();
      spawnExplosion(turret.group.getWorldPosition(new THREE.Vector3()));
      spawnEnemyDebris(turret.group.getWorldPosition(new THREE.Vector3()), turret.group.quaternion);
      playEnemyExplosionSound();
      if (boss.turrets.every((item) => !item.alive)) {
        showCenterMessage("CORE SHIELD ACTIVE", "info", 1.4);
        spawnExplosion(boss.core.getWorldPosition(new THREE.Vector3()));
      }
    }

    function damageBossGenerator(generator, damage, position) {
      generator.hp -= damage;
      generator.flash = 0.24;
      generator.group.scale.setScalar(1.12);
      spawnHitEffect(position.clone(), 0x8defff);
      playShieldSound();
      if (generator.hp > 0) return;

      generator.alive = false;
      if (generator.outerRing) generator.outerRing.visible = false;
      if (generator.innerRing) generator.innerRing.visible = false;
      if (generator.beacon) generator.beacon.visible = false;
      if (generator.core?.material) generator.core.material.opacity = 0;
      generator.group.visible = false;
      player.score += 3000;
      registerComboKill();
      spawnExplosion(generator.group.getWorldPosition(new THREE.Vector3()));
      spawnEnemyDebris(generator.group.getWorldPosition(new THREE.Vector3()), generator.group.quaternion);
      showCenterMessage("SHIELD GENERATOR DESTROYED", "info", 1.0);

      if (boss.shieldGenerators.every((item) => !item.alive)) {
        boss.shieldHp = 0;
        boss.shieldBroken = true;
        boss.shieldBreakTimer = 0.75;
        boss.shieldBreakCount += 1;
        const corePosition = boss.core.getWorldPosition(new THREE.Vector3());
        spawnMothershipShieldShatter(corePosition);
        if (boss.shieldMesh) boss.shieldMesh.visible = false;
        spawnExplosion(corePosition);
        playShieldBreakSound();
        showCenterMessage("MOTHERSHIP SHIELD DOWN<br>CORE EXPOSED", "info", 1.4);
        player.shakeDuration = 0.36;
        player.shakeTimer = 0.36;
        player.shakePower = 13;
        hitStopTimer = Math.max(hitStopTimer, 0.16);
      }
    }

    function damageBossShield(damage, position) {
      boss.shieldHp = Math.max(0, boss.shieldHp - damage);
      boss.shieldHitFlash = 0.28;
      spawnHitEffect(position.clone(), 0x8defff);
      playShieldSound();
      if (boss.shieldRechargeProgress > 0 && boss.shieldHp <= 0) {
        boss.rechargeInterrupted += 1;
        boss.shieldRechargeProgress = 0;
        boss.shieldRechargeTimer = boss.shieldRechargeDelay;
        showCenterMessage("RECHARGE INTERRUPTED", "info", 1.0);
      }
      if (boss.shieldHp <= 0 && !boss.shieldBroken) breakBossShield(position);
    }

    function breakBossShield(position) {
      boss.shieldBroken = true;
      boss.shieldBreakTimer = 0.55;
      boss.shieldBreakCount += 1;
      boss.shieldRechargeTimer = boss.shieldRechargeDelay;
      boss.shieldRechargeProgress = 0;
      player.score += 2000;
      registerComboKill();
      showCenterMessage("SHIELD BREAK<br>CORE EXPOSED", "info", 1.5);
      playShieldBreakSound();
      spawnExplosion(position.clone());
      for (let i = 0; i < 18; i++) {
        const spark = new THREE.Mesh(
          new THREE.SphereGeometry(0.55 + Math.random() * 0.9, 8, 6),
          new THREE.MeshBasicMaterial({ color: 0x8defff, transparent: true, opacity: 0.95 })
        );
        spark.position.copy(position);
        spark.velocity = new THREE.Vector3((Math.random() - 0.5) * 90, (Math.random() - 0.5) * 70, (Math.random() - 0.5) * 90);
        spark.life = 0.55 + Math.random() * 0.3;
        spark.baseScale = 0.8;
        world.add(spark);
        effects.push(spark);
      }
      player.shakeDuration = 0.24;
      player.shakeTimer = 0.24;
      player.shakePower = 8;
      hitStopTimer = Math.max(hitStopTimer, 0.1);
      if (audio.musicGain && audio.context) audio.musicGain.gain.setTargetAtTime(2.9, audio.context.currentTime, 0.18);
    }

    function spawnMothershipShieldShatter(position) {
      const flash = new THREE.Mesh(
        new THREE.SphereGeometry(18, 28, 18),
        new THREE.MeshBasicMaterial({
          color: 0xeaffff,
          transparent: true,
          opacity: 0.95,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      flash.position.copy(position);
      flash.life = 0.34;
      flash.baseScale = 0.45;
      flash.userData.effectType = "explosionCore";
      world.add(flash);
      effects.push(flash);

      for (let i = 0; i < 3; i++) {
        const ring = new THREE.Mesh(
          new THREE.RingGeometry(14 + i * 5, 15.4 + i * 5, 72),
          new THREE.MeshBasicMaterial({
            color: i === 0 ? 0xffffff : 0x8defff,
            transparent: true,
            opacity: 0.9,
            side: THREE.DoubleSide,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          })
        );
        ring.position.copy(position);
        ring.lookAt(camera.position);
        ring.rotation.z += i * Math.PI / 3;
        ring.life = 0.62 + i * 0.08;
        ring.baseScale = 0.65 + i * 0.18;
        ring.userData.effectType = "shockwave";
        world.add(ring);
        effects.push(ring);
      }

      const shardMaterial = new THREE.MeshBasicMaterial({
        color: 0x9ef8ff,
        transparent: true,
        opacity: 0.9,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const shardGeometries = [
        new THREE.BoxGeometry(6.5, 0.28, 2.4),
        new THREE.BoxGeometry(4.8, 0.24, 3.6),
        new THREE.ConeGeometry(1.1, 5.8, 5)
      ];

      for (let i = 0; i < 58; i++) {
        const shard = new THREE.Mesh(
          shardGeometries[i % shardGeometries.length],
          shardMaterial.clone()
        );
        const direction = new THREE.Vector3(
          (Math.random() - 0.5) * 2.5,
          (Math.random() - 0.5) * 1.7,
          (Math.random() - 0.15) * 2.2
        ).normalize();
        shard.position.copy(position).addScaledVector(direction, 14 + Math.random() * 22);
        shard.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        shard.velocity = direction.multiplyScalar(110 + Math.random() * 190);
        shard.rotationVelocity = new THREE.Vector3(
          (Math.random() - 0.5) * 18,
          (Math.random() - 0.5) * 18,
          (Math.random() - 0.5) * 18
        );
        shard.life = 0.72 + Math.random() * 0.5;
        shard.baseScale = 1;
        shard.userData.effectType = "debris";
        world.add(shard);
        effects.push(shard);
      }

      for (let i = 0; i < 20; i++) {
        const crackSpark = new THREE.Mesh(
          new THREE.SphereGeometry(0.9 + Math.random() * 1.4, 8, 6),
          new THREE.MeshBasicMaterial({
            color: i % 3 === 0 ? 0xffffff : 0x5feeff,
            transparent: true,
            opacity: 0.98,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          })
        );
        crackSpark.position.copy(position);
        crackSpark.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 210,
          (Math.random() - 0.5) * 145,
          (Math.random() - 0.5) * 210
        );
        crackSpark.life = 0.38 + Math.random() * 0.34;
        crackSpark.baseScale = 0.8;
        crackSpark.userData.effectType = "spark";
        world.add(crackSpark);
        effects.push(crackSpark);
      }
    }

    function damageBossCore(damage, heavy) {
      boss.coreHp = Math.max(0, boss.coreHp - damage);
      boss.core.scale.setScalar(1.08);
      if (heavy) boss.group.position.x += (Math.random() - 0.5) * 2.4;
      if (boss.coreHp <= 0 && !boss.defeated) defeatBoss();
    }

    function showShieldEffect(position) {
      const shield = new THREE.Mesh(
        new THREE.SphereGeometry(11, 20, 12),
        new THREE.MeshBasicMaterial({ color: 0x91e8ff, transparent: true, opacity: 0.36, wireframe: true })
      );
      shield.position.copy(position);
      shield.life = 0.28;
      shield.baseScale = 1;
      world.add(shield);
      effects.push(shield);
      showCenterMessage("CORE SHIELDED", "info", 0.65);
      playShieldSound();
    }

    function defeatBoss() {
      boss.defeated = true;
      boss.shieldRechargeTimer = 0;
      boss.shieldRechargeProgress = 0;
      if (boss.shieldMesh) boss.shieldMesh.visible = false;
      boss.active = true;
      boss.attackTimer = 999;
      boss.defeatTimer = 2.8;
      boss.defeatExplosionTimer = 0.05;
      boss.defeatExplosions = 0;
      boss.bonus = boss.damageTakenDuringBoss <= 0 && player.hp >= boss.bossStartHp ? 5000 : 0;
      player.score += (boss.kind === "mothership" ? 30000 : 10000) + boss.bonus;
      registerComboKill();
      showCenterMessage(boss.kind === "mothership" ? "MOTHERSHIP DESTROYED" : "DREADNOUGHT DESTROYED", "info", 1.5);
      const anotherBossStillFighting = bossSlots.some((bossSlot) => (
        bossSlot !== boss &&
        bossSlot.spawned &&
        bossSlot.active &&
        !bossSlot.defeated &&
        bossSlot.group
      ));
      if (audio.musicGain) {
        audio.musicGain.gain.setTargetAtTime(anotherBossStillFighting ? 2.9 : 0.2, audio.context.currentTime, 0.35);
      }
    }

    function updateBullets(dt) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        if (bullet.userData.weapon === WEAPON_TYPES.NUMBER9) {
          if (updateNumberNineOrb(bullet, dt)) {
            cleanupNumberNineTrail(bullet);
            world.remove(bullet);
            bullets.splice(i, 1);
          }
          continue;
        }

        if (bullet.userData.previousPosition) {
          bullet.userData.previousPosition.copy(bullet.position);
        }
        
        bullet.position.addScaledVector(bullet.velocity, dt);
        let consumed = false;
        const damage = bullet.userData.damage || 1;
        const blastRadius = bullet.userData.radius || 0;
        const interceptRadius = bullet.userData.collisionRadius || (blastRadius > 0 ? 4.2 : 0.8);

        if (interceptEnemyHomingBullet(bullet.position, interceptRadius, bullet.userData.previousPosition || bullet.position)) {
          if (blastRadius > 0) spawnPlasmaExplosion(bullet.position.clone());
          world.remove(bullet);
          bullets.splice(i, 1);
          continue;
        }

        if (hitBossWithProjectile(bullet.position, damage, blastRadius > 0)) {
          if (blastRadius > 0) spawnPlasmaExplosion(bullet.position.clone());
          consumed = true;
        }

        for (let j = enemies.length - 1; j >= 0 && !consumed; j--) {
          const enemy = enemies[j];
          if (bullet.position.distanceTo(enemy.group.position) < (blastRadius > 0 ? blastRadius + 12 : 13)) {
            if (blastRadius > 0) {
              detonatePlasmaOnEnemy(bullet, enemy);
              consumed = true;
              break;
            }
            if (
              hitEnemyPartWithProjectile(
                enemy,
                bullet.position,
                damage,
                {
                  previousPosition: bullet.userData.previousPosition,
                  projectileRadius: bullet.userData.collisionRadius || 0,
                  plasma: bullet.userData.weapon === WEAPON_TYPES.PLASMA
                }
              )
            ) {
              consumed = true;
              break;
            }
          }
        }

        if (consumed || bullet.position.z < -760) {
          world.remove(bullet);
          bullets.splice(i, 1);
        }
      }
    }

    function interceptEnemyHomingBullet(position, radius = 0.8, previousPosition = position) {
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const enemyBullet = enemyBullets[i];
        if (!enemyBullet.userData.homing) continue;
        const distance = distancePointToSegment(enemyBullet.position, previousPosition, position);
        if (distance <= radius + (enemyBullet.userData.hitRadius || 6.5) * 0.45) {
          spawnExplosion(enemyBullet.position.clone());
          spawnHitEffect(enemyBullet.position.clone(), enemyBullet.userData.trailColor || 0xff8a2a);
          world.remove(enemyBullet);
          enemyBullets.splice(i, 1);
          return true;
        }
      }
      return false;
    }

    function updateEnemies(dt) {
      for (let index = enemies.length - 1; index >= 0; index--) {
        const enemy = enemies[index];
        if (enemy.destroyed) continue;
        updateEnemyDamageState(enemy);
        updateEnemyPartVisuals(enemy, dt);

        const leftGone = enemy.parts.leftWing.destroyed;
        const rightGone = enemy.parts.rightWing.destroyed;
        const engineGone = enemy.parts.engine.destroyed;
        const wingBias = leftGone && !rightGone ? -1 : rightGone && !leftGone ? 1 : 0;
        const engineFactor = engineGone ? 0.48 : 1;
        const fireFactor = (leftGone || rightGone ? 1.3 : 1) * (engineGone ? 1.5 : 1);

        if (enemy.controlState === "critical") {
          enemy.disabledTimer -= dt;
          enemy.group.position.z += 72 * dt;
          enemy.group.position.x += wingBias * 34 * dt + Math.sin(clock.elapsedTime * 6 + enemy.wobbleSeed) * dt * 42;
          enemy.group.position.y -= 22 * dt;
          enemy.group.rotation.z += (wingBias || 1) * dt * 7.5;
          enemy.group.rotation.x += dt * 2.8;
          if (Math.random() < dt * 4) spawnSmokePuff(enemy.group.position.clone(), 1);
          if (enemy.disabledTimer <= 0 || enemy.group.position.y < 12 || enemy.group.position.z > 45) {
            destroyEnemyByRef(enemy, { selfDestruct: true });
          }
          continue;
        }

        if (engineGone) {
          enemy.engineFailureTimer -= dt;
          if (Math.random() < dt * 5) {
            const enginePos = getEnemyPartWorldPosition(enemy.parts.engine);
            spawnSmokePuff(enginePos, 1);
          }
          if (enemy.engineFailureTimer <= 0) {
            destroyEnemyByRef(enemy, { selfDestruct: true });
            continue;
          }
        }

        const wobble = enemy.controlState === "damaged" ? 2.2 : 1;
        if (enemy.lateralEntry) {
          enemy.group.position.x = THREE.MathUtils.lerp(enemy.group.position.x, enemy.lateralTargetX, 1 - Math.exp(-dt * 1.55));
          enemy.group.rotation.z += enemy.lateralDirection * 0.38;
          if (Math.abs(enemy.group.position.x - enemy.lateralTargetX) < 4) enemy.lateralEntry = false;
        }
        if (enemy.group.position.z < enemy.stopZ) {
          enemy.group.position.z += 92 * engineFactor * dt;
          if (!enemy.lateralEntry) enemy.group.position.x += (Math.sin(clock.elapsedTime * 2.1 + index) * 12 * wobble + wingBias * 18) * dt;
          enemy.group.position.y += Math.cos(clock.elapsedTime * 1.8 + index * 1.7) * dt * 7 * wobble;
        } else {
          enemy.stopped = true;
          if (!enemy.lateralEntry) enemy.group.position.x += (Math.sin(clock.elapsedTime * 2.4 + index) * 12 * wobble + wingBias * 12) * dt * engineFactor;
          enemy.group.position.y += Math.cos(clock.elapsedTime * 2.0 + index) * dt * 9 * wobble;
          enemy.group.position.x = THREE.MathUtils.clamp(enemy.group.position.x, -78, 78);
          enemy.group.position.y = THREE.MathUtils.clamp(enemy.group.position.y, 28, 126);
          enemy.fireTimer -= dt;
          if (enemy.fireTimer <= 0) {
            fireEnemyBullet(enemy);
            enemy.fireTimer = (1.25 + Math.random() * 0.7) * fireFactor;
          }
        }

        enemy.group.lookAt(player.position.x, player.position.y, 20);
        enemy.group.rotation.z += wingBias * 0.45 + Math.sin(clock.elapsedTime * 5 + enemy.wobbleSeed) * (enemy.controlState === "damaged" ? 0.14 : 0.03);
        if (enemy.hitShakeTimer > 0) {
          enemy.hitShakeTimer = Math.max(0, enemy.hitShakeTimer - dt);
          const shake = enemy.hitShakePower * (enemy.hitShakeTimer / 0.16);
          enemy.group.rotation.x += (Math.random() - 0.5) * 0.18 * shake;
          enemy.group.rotation.y += (Math.random() - 0.5) * 0.16 * shake;
          enemy.group.rotation.z += (Math.random() - 0.5) * 0.28 * shake;
          enemy.group.scale.setScalar(enemy.baseScale * (1 + shake * 0.035));
          enemy.hitShakePower = Math.max(0, enemy.hitShakePower - dt * 3.2);
        } else if (enemy.group.scale.x !== enemy.baseScale) {
          enemy.group.scale.setScalar(enemy.baseScale);
        }
      }
    }

    function fireEnemyBullet(enemy) {
      if (enemy.isHeavy) {
        fireHeavyEnemyHomingBullet(enemy);
        return;
      }
      const bullet = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 12, 8),
        new THREE.MeshBasicMaterial({ color: 0xff4f5d })
      );
      bullet.position.copy(enemy.group.position);
      const direction = player.position.clone().sub(enemy.group.position).normalize();
      bullet.velocity = direction.multiplyScalar(105);
      world.add(bullet);
      enemyBullets.push(bullet);
    }

    function fireHeavyEnemyHomingBullet(enemy) {
      const bullet = new THREE.Mesh(
        new THREE.SphereGeometry(2.05, 16, 10),
        new THREE.MeshBasicMaterial({
          color: 0xff8a2a,
          transparent: true,
          opacity: 0.96,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      const muzzle = enemy.parts.engine && !enemy.parts.engine.destroyed
        ? getEnemyPartWorldPosition(enemy.parts.engine)
        : enemy.group.position.clone();
      bullet.position.copy(muzzle);
      const direction = player.position.clone().sub(bullet.position).normalize();
      bullet.velocity = direction.multiplyScalar(92);
      bullet.userData.homing = true;
      bullet.userData.turnRate = 1.85;
      bullet.userData.speed = 92;
      bullet.userData.life = 4.5;
      bullet.userData.damage = 16;
      bullet.userData.hitRadius = 8.2;
      bullet.userData.trailTimer = 0;
      world.add(bullet);
      enemyBullets.push(bullet);
    }

    function updateEnemyBullets(dt) {
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const bullet = enemyBullets[i];
        if (bullet.userData.homing) {
          bullet.userData.life -= dt;
          const desired = player.position.clone().sub(bullet.position).normalize();
          const current = bullet.velocity.clone().normalize();
          const turn = THREE.MathUtils.clamp((bullet.userData.turnRate || 1.5) * dt, 0, 0.18);
          bullet.velocity.copy(current.lerp(desired, turn).normalize().multiplyScalar(bullet.userData.speed || 92));
          bullet.userData.trailTimer -= dt;
          if (bullet.userData.trailTimer <= 0) {
            spawnHitEffect(bullet.position.clone(), bullet.userData.trailColor || 0xff8a2a);
            bullet.userData.trailTimer = 0.055;
          }
        }
        bullet.position.addScaledVector(bullet.velocity, dt);

        const hitPlayer = bullet.position.distanceTo(player.position) < (bullet.userData.hitRadius || 6.5);
        if (hitPlayer && player.invincibleTimer <= 0) {
          const damage = bullet.userData.damage || 12;
          player.hp = Math.max(0, player.hp - damage);
          if (boss.active && !boss.defeated) boss.damageTakenDuringBoss += damage;
          player.invincibleTimer = 0.75;
          triggerPlayerDamageImpact(bullet);
          spawnHitEffect(player.position, bullet.userData.homing ? (bullet.userData.trailColor || 0xff8a2a) : 0xff5d6c);
        }

        if (hitPlayer || bullet.userData.life <= 0 || bullet.position.z > 45 || bullet.position.z < -760) {
          world.remove(bullet);
          enemyBullets.splice(i, 1);
        }
      }
    }

    function triggerPlayerDamageImpact(bullet) {
      player.shakeDuration = 0.5;
      player.shakeTimer = player.shakeDuration;
      player.shakePower = 12;
      player.damageFlashTimer = player.damageFlashDuration;
      player.zoomTimer = player.zoomDuration;
      player.damageBlinkTimer = player.damageBlinkDuration;
      player.engineDisruptionTimer = player.engineDisruptionDuration;
      playDamageImpactSound();
      spawnPlayerDamageSparks(player.position, bullet.velocity);

      const incoming = bullet.velocity.clone().normalize();
      const lateralKick = THREE.MathUtils.clamp(incoming.x * 14, -10, 10);
      const verticalKick = THREE.MathUtils.clamp(incoming.y * 10, -8, 8);
      const randomKickX = (Math.random() - 0.5) * 5;
      const randomKickY = (Math.random() - 0.5) * 4;

      player.target.x = THREE.MathUtils.clamp(
        player.target.x + lateralKick + randomKickX,
        -player.bounds.x,
        player.bounds.x
      );
      player.target.y = THREE.MathUtils.clamp(
        player.target.y + verticalKick + randomKickY,
        player.bounds.minY,
        player.bounds.maxY
      );
    }
    function playDamageImpactSound() {
      if (!audio.ready || !audio.context) return;
      if (audio.context.state === "suspended") audio.context.resume();

      const now = audio.context.currentTime;
      const impactGain = audio.context.createGain();
      impactGain.gain.setValueAtTime(0.0001, now);
      impactGain.gain.exponentialRampToValueAtTime(1.1, now + 0.008);
      impactGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
      impactGain.connect(audio.master);

      const noise = audio.context.createBufferSource();
      noise.buffer = audio.noiseBuffer;
      const noiseFilter = audio.context.createBiquadFilter();
      noiseFilter.type = "lowpass";
      noiseFilter.frequency.setValueAtTime(1200, now);
      noiseFilter.frequency.exponentialRampToValueAtTime(180, now + 0.28);
      noise.connect(noiseFilter);
      noiseFilter.connect(impactGain);
      noise.start(now);
      noise.stop(now + 0.34);

      const thump = audio.context.createOscillator();
      thump.type = "sine";
      thump.frequency.setValueAtTime(92, now);
      thump.frequency.exponentialRampToValueAtTime(38, now + 0.28);
      thump.connect(impactGain);
      thump.start(now);
      thump.stop(now + 0.3);
    }

    function spawnPlayerDamageSparks(position, incomingVelocity) {
      const reverseDirection = incomingVelocity.clone().normalize().multiplyScalar(-1);

      for (let i = 0; i < 16; i++) {
        const spark = new THREE.Mesh(
          new THREE.SphereGeometry(0.35 + Math.random() * 0.65, 8, 6),
          new THREE.MeshBasicMaterial({
            color: i % 3 === 0 ? 0xffffff : i % 2 === 0 ? 0xffd65a : 0xff5d6c,
            transparent: true,
            opacity: 1
          })
        );
        spark.position.copy(position);
        spark.position.x += (Math.random() - 0.5) * 5;
        spark.position.y += (Math.random() - 0.5) * 4;
        spark.position.z += (Math.random() - 0.5) * 4;

        const scatter = new THREE.Vector3(
          (Math.random() - 0.5) * 55,
          (Math.random() - 0.5) * 45,
          (Math.random() - 0.5) * 55
        );
        spark.velocity = reverseDirection.clone().multiplyScalar(18 + Math.random() * 24).add(scatter);
        spark.life = 0.34 + Math.random() * 0.28;
        spark.baseScale = 0.7;
        world.add(spark);
        effects.push(spark);
      }

      const smoke = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: createNebulaTexture(Math.floor(Math.random() * 10)),
          color: 0x79808c,
          transparent: true,
          opacity: 0.42,
          depthWrite: false
        })
      );
      smoke.position.copy(position);
      smoke.position.z += 2;
      smoke.scale.set(10, 10, 1);
      smoke.velocity = reverseDirection.clone().multiplyScalar(12);
      smoke.life = 0.5;
      smoke.baseScale = 1;
      world.add(smoke);
      effects.push(smoke);
    }

    function updatePlayerDamageBlink() {
      if (!player.damageMaterials.length) return;

      if (player.damageBlinkTimer <= 0) {
        resetPlayerDamageMaterials();
        return;
      }

      const progress = player.damageBlinkTimer / player.damageBlinkDuration;
      const pulse = Math.sin(progress * Math.PI * 7) > 0 ? 1 : 0;
      player.damageMaterials.forEach((material) => {
        material.color.copy(material.userData.baseColor).lerp(new THREE.Color(0xffffff), pulse * 0.72);
        material.emissive.copy(material.userData.baseEmissive).lerp(new THREE.Color(0xff2638), pulse * 0.95);
      });
    }

    function resetPlayerDamageMaterials() {
      if (!player.damageMaterials.length) return;
      player.damageMaterials.forEach((material) => {
        material.color.copy(material.userData.baseColor);
        material.emissive.copy(material.userData.baseEmissive);
      });
    }

    function updateDamagePresentation() {
      let hudOffsetX = 0;
      let hudOffsetY = 0;

      if (player.shakeTimer > 0) {
        const t = player.shakeTimer / player.shakeDuration;
        const impact = t * t * t;
        const hudShake = player.shakePower * impact * 0.9;
        hudOffsetX = (Math.random() - 0.5) * hudShake;
        hudOffsetY = (Math.random() - 0.5) * hudShake;
      }

      hud.root.style.transform = `translate3d(${hudOffsetX}px, ${hudOffsetY}px, 0)`;

      const flashProgress = player.damageFlashDuration > 0
        ? player.damageFlashTimer / player.damageFlashDuration
        : 0;
      hud.damageFlash.style.opacity = `${Math.max(0, flashProgress * flashProgress)}`;

      const zoomProgress = player.zoomDuration > 0
        ? player.zoomTimer / player.zoomDuration
        : 0;
      const zoomPunch = Math.sin(Math.PI * THREE.MathUtils.clamp(zoomProgress, 0, 1));
      const nextFov = player.baseFov + zoomPunch * 8;
      if (Math.abs(camera.fov - nextFov) > 0.01) {
        camera.fov = nextFov;
        camera.updateProjectionMatrix();
      }
    }

    function registerComboKill() {
      if (player.comboTimer > 0) {
        player.combo += 1;
      } else {
        player.combo = 1;
      }

      player.comboTimer = player.comboDuration;
      player.comboPeak = Math.max(player.comboPeak, player.combo);
      player.comboMultiplier = getComboMultiplier(player.combo);

      const title = getComboTitle(player.combo);
      if (title) {
        hud.comboTitle.textContent = title;
        player.comboTitleTimer = 0.85;
      }

      hud.combo.classList.remove("visible");
      void hud.combo.offsetWidth;
      hud.combo.classList.add("visible");
    }

    function updateCombo(dt) {
      if (player.comboTimer > 0) {
        player.comboTimer = Math.max(0, player.comboTimer - dt);
      }

      if (player.comboTitleTimer > 0) {
        player.comboTitleTimer = Math.max(0, player.comboTitleTimer - dt);
        if (player.comboTitleTimer <= 0) hud.comboTitle.textContent = "";
      }

      if (player.comboTimer <= 0 && player.combo > 0) {
        player.combo = 0;
        player.comboMultiplier = 1;
        hud.combo.classList.remove("visible");
        hud.comboTitle.textContent = "";
      }
    }

    function getComboMultiplier(combo) {
      return Math.min(3, 1 + Math.floor(combo / 3) * 0.1);
    }

    function getComboTitle(combo) {
      if (combo === 5) return "MULTI KILL";
      if (combo === 10) return "RAMPAGE";
      if (combo === 15) return "ACE PILOT";
      if (combo === 20) return "SKY DOMINATOR";
      if (combo === 30) return "UNSTOPPABLE";
      return "";
    }

    function destroyEnemy(index, options = {}) {
      const enemy = enemies[index];
      if (!enemy || enemy.destroyed) return;
      enemy.destroyed = true;
      const explosionPosition = enemy.group.position.clone();
      const defeatDistance = player.position.distanceTo(explosionPosition);
      // 遠距離撃破ほど高得点。近距離でも最低点は入り、遠くで落とすほど伸びる。
      const distanceBonus = Math.round(THREE.MathUtils.clamp(defeatDistance, 80, 680) * 1.8);
      const baseScore = enemy.score + distanceBonus;

      registerComboKill();
      const earnedScore = Math.round(baseScore * player.comboMultiplier);

      triggerEnemyDefeatSlowMotion();
      if (options.melt) {
        spawnHeatMeltEffect(explosionPosition, 1.55);
        spawnSmokePuff(explosionPosition, 8);
      } else {
        spawnExplosion(explosionPosition);
        spawnEnemyDebris(explosionPosition, enemy.group.quaternion);
        playEnemyExplosionSound();
      }

      world.remove(enemy.group);
      enemies.splice(index, 1);
      player.kills += 1;
      player.score += earnedScore;
      maybeSpawnWeaponContainer();
    }

    function destroyEnemyByRef(enemy, options = {}) {
      const index = enemies.indexOf(enemy);
      if (index < 0 || enemy.destroyed) return;
      if (options.critical) {
        const position = enemy.group.position.clone();
        spawnExplosion(position);
        spawnExplosion(position.clone().add(new THREE.Vector3(0, 2.5, 0)));
      }
      destroyEnemy(index, options);
    }

    function triggerEnemyDefeatSlowMotion() {
      hitStopTimer = hitStopDuration;
    }

    function playEnemyExplosionSound() {
      if (!audio.ready || !audio.context) return;
      if (audio.context.state === "suspended") audio.context.resume();

      const now = audio.context.currentTime;
      const explosionGain = audio.context.createGain();
      explosionGain.gain.setValueAtTime(0.0001, now);
      explosionGain.gain.exponentialRampToValueAtTime(0.9, now + 0.012);
      explosionGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.52);
      explosionGain.connect(audio.master);

      const noise = audio.context.createBufferSource();
      noise.buffer = audio.noiseBuffer;
      const filter = audio.context.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(1800, now);
      filter.frequency.exponentialRampToValueAtTime(120, now + 0.48);
      noise.connect(filter);
      filter.connect(explosionGain);
      noise.start(now);
      noise.stop(now + 0.52);

      const boom = audio.context.createOscillator();
      boom.type = "sine";
      boom.frequency.setValueAtTime(110, now);
      boom.frequency.exponentialRampToValueAtTime(32, now + 0.42);
      boom.connect(explosionGain);
      boom.start(now);
      boom.stop(now + 0.46);
    }

        ).normalize();
        spark.velocity = direction.multiplyScalar(42 + Math.random() * 92);

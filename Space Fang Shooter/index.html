    function updateEffects(dt) {
      for (let i = effects.length - 1; i >= 0; i--) {
        const effect = effects[i];
        effect.life -= dt;

        if (effect.velocity) effect.position.addScaledVector(effect.velocity, dt);
        if (effect.rotationVelocity) {
          effect.rotation.x += effect.rotationVelocity.x * dt;
          effect.rotation.y += effect.rotationVelocity.y * dt;
          effect.rotation.z += effect.rotationVelocity.z * dt;
        }

        const type = effect.userData.effectType;
        if (type === "explosionCore") {
          const progress = THREE.MathUtils.clamp(1 - effect.life / 0.32, 0, 1);
          effect.scale.setScalar(0.45 + progress * 4.8);
          effect.material.opacity = Math.max(0, 1 - progress);
        } else if (type === "fireball") {
          const progress = THREE.MathUtils.clamp(1 - effect.life / 0.58, 0, 1);
          effect.scale.setScalar(0.35 + progress * 3.6);
          effect.material.opacity = Math.max(0, (1 - progress) * 0.92);
        } else if (type === "shockwave") {
          const progress = THREE.MathUtils.clamp(1 - effect.life / 0.48, 0, 1);
          effect.scale.setScalar(0.5 + progress * 8.5);
          effect.material.opacity = Math.max(0, (1 - progress) * 0.9);
        } else if (type === "plasmaFlash") {
          const progress = THREE.MathUtils.clamp(1 - effect.life / 0.26, 0, 1);
          effect.scale.setScalar(0.55 + progress * 6.2);
          effect.material.opacity = Math.max(0, (1 - progress) * 0.95);
        } else if (type === "plasmaShockwave") {
          const progress = THREE.MathUtils.clamp(1 - effect.life / 0.42, 0, 1);
          effect.scale.setScalar(0.72 + progress * 8.5);
          effect.material.opacity = Math.max(0, (1 - progress) * 0.82);
        } else if (type === "weaponGate") {
          const progress = THREE.MathUtils.clamp(1 - effect.life / 0.55, 0, 1);
          effect.scale.setScalar(0.35 + progress * 2.2);
          effect.material.opacity = Math.max(0, (1 - progress) * 0.88);
        } else if (type === "laserBeam") {
          const progress = THREE.MathUtils.clamp(1 - effect.life / 0.11, 0, 1);
          effect.scale.set(1 + progress * 0.35, 1, 1 + progress * 0.35);
          effect.material.opacity = Math.max(0, (1 - progress) * 0.82);
        } else if (type === "heatMeltFlare") {
          const progress = THREE.MathUtils.clamp(1 - effect.life / 0.34, 0, 1);
          effect.scale.setScalar(0.35 + progress * 3.1);
          effect.material.opacity = Math.max(0, (1 - progress) * 0.96);
        } else if (type === "moltenDroplet") {
          effect.velocity.y -= dt * 36;
          effect.scale.setScalar(Math.max(0.1, effect.life * 1.7));
          effect.material.opacity = Math.max(0, effect.life * 1.8);
        } else if (type === "smoke") {
          const progress = THREE.MathUtils.clamp(1 - effect.life / 0.9, 0, 1);
          effect.scale.setScalar(effect.baseScale + progress * 2.4);
          effect.material.opacity = Math.max(0, (1 - progress) * 0.34);
        } else if (type === "debris") {
          effect.velocity.multiplyScalar(Math.pow(0.985, dt * 60));
          effect.scale.setScalar(Math.max(0.18, Math.min(1, effect.life * 1.4)));
          if (effect.material.transparent) effect.material.opacity = Math.min(1, effect.life * 1.5);
        } else {
          const scale = Math.max(0.01, effect.baseScale + (0.6 - effect.life) * 3);
          effect.scale.setScalar(scale);
          effect.material.opacity = Math.max(0, effect.life * 1.7);
        }

        if (effect.life <= 0) {
          world.remove(effect);
          effects.splice(i, 1);
        }
      }
    }

    function updateEngineFlames(dt) {
      player.flames.forEach((flame, index) => {
        const t = clock.elapsedTime * 18 + flame.phase + index * 1.7;
        const disruptionProgress = player.engineDisruptionDuration > 0
          ? player.engineDisruptionTimer / player.engineDisruptionDuration
          : 0;
        const disruption = disruptionProgress > 0
          ? (Math.random() * 0.85 + 0.15) * disruptionProgress
          : 0;
        const pulse = 0.78 + Math.sin(t) * 0.16 + Math.sin(t * 0.47) * 0.08 - disruption * 0.52;
        const stretch = 1.0 + pulse * 0.42 + disruption * (Math.random() - 0.5) * 0.8;
        flame.group.position.x += Math.sin(t * 0.31) * dt * 0.7;
        flame.group.position.x = THREE.MathUtils.clamp(flame.group.position.x, index === 0 ? -3.9 : 2.9, index === 0 ? -2.9 : 3.9);
        flame.group.position.z = 10.2 + Math.sin(t * 0.22) * 0.25;

        flame.blueGlow.scale.set(5.0 + pulse * 1.1, 5.4 + pulse * 1.7, 1);
        flame.fireCore.scale.set(3.2 + pulse * 0.8, 5.6 * stretch, 1);
        flame.whiteHot.scale.set(1.6 + pulse * 0.35, 2.8 + pulse * 0.9, 1);
        flame.blueGlow.material.opacity = THREE.MathUtils.clamp(0.32 + pulse * 0.16 - disruption * 0.2, 0.08, 0.6);
        flame.fireCore.material.opacity = THREE.MathUtils.clamp(0.66 + pulse * 0.24 - disruption * 0.45, 0.12, 1);
        flame.whiteHot.material.opacity = THREE.MathUtils.clamp(0.45 + pulse * 0.28 - disruption * 0.55, 0.06, 0.9);
      });
    }

    function updateWorldMotion(dt) {
      // 背景だけを流して、プレイヤーは固定進行方向を保つ。
      stars.forEach((star) => {
        star.position.z += 135 * dt;
        star.material.opacity = star.userData.baseOpacity * (0.68 + Math.sin(clock.elapsedTime * star.userData.twinkle + star.userData.phase) * 0.32);
        if (star.position.z > 45) {
          star.position.z = -880;
          star.position.x = (Math.random() - 0.5) * 520;
          star.position.y = 20 + Math.random() * 230;
        }
      });

      nebulae.forEach((nebula) => {
        nebula.position.z += nebula.userData.drift * dt;
        nebula.material.opacity = 0.14 + Math.sin(clock.elapsedTime * 0.35 + nebula.position.x) * 0.035;
        if (nebula.position.z > -80) {
          nebula.position.z = -950;
          nebula.position.x = (Math.random() - 0.5) * 460;
          nebula.position.y = 75 + Math.random() * 120;
        }
      });
    }

    function updateCamera(dt) {
      const desired = new THREE.Vector3(player.position.x * 0.28, player.position.y + 17, 78);
      if (player.shakeTimer > 0) {
        const t = player.shakeTimer / player.shakeDuration;
        const impact = t * t * t;
        const shake = player.shakePower * impact;
        desired.x += (Math.random() - 0.5) * shake;
        desired.y += (Math.random() - 0.5) * shake;
        desired.z += (Math.random() - 0.5) * shake * 0.55;
      }
      camera.position.lerp(desired, 1 - Math.exp(-dt * 5.8));
      camera.lookAt(player.position.x * 0.16, player.position.y + 4, -150);
    }

    function renderHUD() {
      const stageKills = Math.max(0, player.kills - stage.killStart);
      hud.kills.textContent = `${stageKills} / ${stage.totalEnemies}`;
      hud.hp.textContent = `${Math.ceil(player.hp)}`;
      hud.wave.textContent = `${Math.max(1, stage.wave)}`;
      hud.score.textContent = `${player.score}`;
      const weaponData = WEAPON_DATA[player.mainWeapon] || WEAPON_DATA.VULCAN;
      const ammoText = player.mainWeapon === WEAPON_TYPES.VULCAN ? "VULCAN" : `${weaponData.label}<br>${player.weaponAmmo}`;
      hud.weapon.innerHTML = `MAIN WEAPON<br>${ammoText}`;
      let weaponClass = "badge";
      if (player.mainWeapon !== WEAPON_TYPES.VULCAN) {
        if (player.weaponAmmo <= 2) weaponClass += " danger";
        else if (player.weaponAmmo <= 5) weaponClass += " warn";
        else weaponClass += " active";
      } else if (player.fireHeld || player.weaponHudFlash > 0) {
        weaponClass += " active";
      }
      hud.weapon.className = weaponClass;

      if (player.combo > 1 && player.comboTimer > 0) {
        hud.comboCount.textContent = `${player.combo} COMBO`;
        hud.comboMultiplier.textContent = `SCORE ×${player.comboMultiplier.toFixed(1)}`;
        hud.combo.classList.add("visible");
      } else if (player.combo <= 1) {
        hud.combo.classList.remove("visible");
      }

      if (player.specialWeapon === WEAPON_TYPES.NUMBER9) {
        updateNumberNineLockIndicators();
        const lockCount = player.numberNineLocks.length;
        if (player.numberNineReloadTimer > 0) {
          const reloadProgress = 1 - (player.numberNineReloadTimer / player.numberNineReloadDuration);
          hud.missile.textContent = `NUMBER 9 RELOAD ${player.numberNineReloadTimer.toFixed(1)}s`;
          hud.missile.className = "cooldown";
          hud.numberNineReload.className = "visible";
          hud.numberNineReloadBar.style.width = `${THREE.MathUtils.clamp(reloadProgress, 0, 1) * 100}%`;
        } else {
          hud.missile.textContent = lockCount > 0
            ? `NUMBER 9 LOCK ×${lockCount} ${player.specialWeaponTimer.toFixed(0)}s [E]`
            : `NUMBER 9 NO LOCK ${player.specialWeaponTimer.toFixed(0)}s [E]`;
          hud.missile.className = lockCount > 0 ? "locked" : "";
          hud.numberNineReload.className = "";
          hud.numberNineReloadBar.style.width = "0%";
        }
      } else {
        hideNumberNineLockIndicators();
        hud.numberNineReload.className = "";
        hud.numberNineReloadBar.style.width = "0%";
        const missileTargets = running ? findMissileTargets(2) : [];
        if (player.missileCooldown > 0) {
          hud.missile.textContent = `MISSILE ${player.missileCooldown.toFixed(1)}s`;
          hud.missile.className = "cooldown";
        } else if (missileTargets.length > 0) {
          hud.missile.textContent = `LOCKED ×${missileTargets.length} [E]`;
          hud.missile.className = "locked";
        } else {
          hud.missile.textContent = "NO LOCK [E]";
          hud.missile.className = "";
        }
      }

      if (player.rollTimer > 0) {
        hud.roll.textContent = "ROLLING — INVINCIBLE";
        hud.roll.className = "rolling";
      } else if (player.rollCooldown > 0) {
        hud.roll.textContent = `ROLL ${player.rollCooldown.toFixed(1)}s`;
        hud.roll.className = "cooldown";
      } else {
        hud.roll.textContent = "ROLL READY";
        hud.roll.className = "";
      }

      const visibleBosses = bossSlots.filter((bossSlot) => bossSlot.spawned && !bossSlot.standby && (bossSlot.active || bossSlot.group));
      hud.root.classList.toggle("boss-active", visibleBosses.length > 0);
      if (visibleBosses.length > 0) {
        const aliveTurrets = visibleBosses.reduce((sum, bossSlot) => sum + bossSlot.turrets.filter((turret) => turret.alive).length, 0);
        const totalTurrets = visibleBosses.length * 4;
        const aliveGenerators = visibleBosses.reduce((sum, bossSlot) => sum + bossSlot.shieldGenerators.filter((generator) => generator.alive).length, 0);
        const totalGenerators = visibleBosses.reduce((sum, bossSlot) => sum + bossSlot.shieldGenerators.length, 0);
        const shieldHp = visibleBosses.reduce((sum, bossSlot) => sum + Math.max(0, bossSlot.shieldHp), 0);
        const shieldMaxHp = visibleBosses.reduce((sum, bossSlot) => sum + bossSlot.shieldMaxHp, 0);
        const coreHp = visibleBosses.reduce((sum, bossSlot) => sum + Math.max(0, bossSlot.coreHp), 0);
        const coreMaxHp = visibleBosses.reduce((sum, bossSlot) => sum + bossSlot.coreMaxHp, 0);
        const anyShieldRecharging = visibleBosses.some((bossSlot) => bossSlot.shieldRechargeProgress > 0);
        const allShieldsDown = visibleBosses.every((bossSlot) => bossSlot.shieldBroken && bossSlot.shieldHp <= 0);
        const coreLocked = visibleBosses.some((bossSlot) => {
          if (bossSlot.kind === "mothership") return bossSlot.shieldGenerators.some((generator) => generator.alive);
          const bossTurretsAlive = bossSlot.turrets.some((turret) => turret.alive);
          return bossTurretsAlive || (!bossSlot.shieldBroken && bossSlot.shieldHp > 0);
        });
        hud.boss.className = `visible${coreLocked ? " core-locked" : ""}${aliveTurrets > 0 ? " turrets-up" : ""}`;
        hud.bossName.textContent = visibleBosses.some((bossSlot) => bossSlot.kind === "mothership")
          ? "MOTHERSHIP"
          : visibleBosses.length > 1 ? "TWIN DREADNOUGHTS" : "DREADNOUGHT";
        hud.bossShieldBar.style.width = `${Math.max(0, shieldHp / Math.max(1, shieldMaxHp)) * 100}%`;
        hud.bossBar.style.width = `${Math.max(0, coreHp / Math.max(1, coreMaxHp)) * 100}%`;
        if (aliveTurrets > 0) hud.bossShieldLabel.textContent = "SHIELD";
        else if (anyShieldRecharging) hud.bossShieldLabel.textContent = "RECHARGING";
        else if (allShieldsDown) hud.bossShieldLabel.textContent = "SHIELD DOWN";
        else hud.bossShieldLabel.textContent = "SHIELD";
        hud.bossTurrets.textContent = totalGenerators > 0
          ? `TURRETS ${aliveTurrets} / ${totalTurrets}  GEN ${aliveGenerators} / ${totalGenerators}`
          : `TURRETS ${aliveTurrets} / ${totalTurrets}`;
      } else {
        hud.boss.className = "";
        hud.bossName.textContent = "DREADNOUGHT";
      }

      if (stage.clear) {
        hud.status.textContent = "STAGE CLEAR";
        hud.status.className = "badge clear";
      } else if (paused) {
        hud.status.textContent = "PAUSED";
        hud.status.className = "badge warn";
      } else if (player.hp <= 25) {
        hud.status.textContent = "DANGER";
        hud.status.className = "badge danger";
      } else {
        hud.status.textContent = player.state === "FIGHT" ? `STAGE ${stage.current}` : "READY";
        hud.status.className = "badge";
      }
      hud.pauseButton.disabled = !running || paused || player.state !== "FIGHT" || stage.clear || player.hp <= 0;
    }

    function gameOver(cleared) {
      running = false;
      paused = false;
      hud.pauseMenu.classList.add("hidden");
      player.shakeTimer = 0;
      player.damageFlashTimer = 0;
      player.zoomTimer = 0;
      player.damageBlinkTimer = 0;
      player.engineDisruptionTimer = 0;
      player.rollTimer = 0;
      player.rollCooldown = 0;
      player.rollDirection = 0;
      player.missileCooldown = 0;
      player.mainWeapon = WEAPON_TYPES.VULCAN;
      player.weaponAmmo = 0;
      player.specialWeapon = null;
      player.specialWeaponTimer = 0;
      player.specialWeaponHudFlash = 0;
      player.numberNineReloadTimer = 0;
      player.numberNineLocks = [];
      hideNumberNineLockIndicators();
      hud.numberNineReload.className = "";
      hud.numberNineReloadBar.style.width = "0%";
      player.weaponRouletteTimer = 0;
      player.weaponRouletteElapsed = 0;
      player.pendingWeapon = null;
      player.weaponHudFlash = 0;
      clearObjects(weaponContainers);
      bossWeaponContainerTimer = 0;
      partAlertTimer = 0;
      hud.partAlert.className = "";
      hud.partAlert.textContent = "";
      player.comboTimer = 0;
      player.comboTitleTimer = 0;
      hud.combo.classList.remove("visible");
      resetPlayerDamageMaterials();
      hud.root.style.transform = "translate3d(0, 0, 0)";
      hud.root.classList.remove("boss-active");
      hud.damageFlash.style.opacity = "0";
      camera.fov = player.baseFov;
      camera.updateProjectionMatrix();
      stopBgm();
      stopJetSound();
      resetBgmIntensity();
      stage.clear = cleared;
      player.state = cleared ? "CLEAR" : "GAME OVER";
      stage.transitioning = false;
      hud.boss.className = "";
      const totalBossDamage = bossSlots.reduce((sum, bossSlot) => sum + bossSlot.damageTakenDuringBoss, 0);
      const totalBossBonus = bossSlots.reduce((sum, bossSlot) => sum + bossSlot.bonus, 0);
      const totalShieldBreaks = bossSlots.reduce((sum, bossSlot) => sum + bossSlot.shieldBreakCount, 0);
      const totalRechargeInterrupted = bossSlots.reduce((sum, bossSlot) => sum + bossSlot.rechargeInterrupted, 0);
      hud.result.innerHTML = [
        cleared ? "ALL STAGES CLEAR" : "MISSION FAILED",
        `Stage: ${stage.current} / ${stage.maxStage}`,
        `Kills: ${player.kills}`,
        `Score: ${player.score}`,
        `Max Combo: ${player.comboPeak}`,
        `Boss Defeated: ${bossSlots.filter((bossSlot) => bossSlot.spawned && bossSlot.defeated).length}`,
        `Boss Damage Taken: ${Math.round(totalBossDamage)}`,
        `Boss Bonus: ${totalBossBonus}`,
        `Shield Breaks: ${totalShieldBreaks}`,
        `Recharge Interrupted: ${totalRechargeInterrupted}`,
        `HP: ${Math.ceil(player.hp)}`
      ].join("<br>");
      hud.startButton.textContent = "RESTART";
      hud.overlay.classList.remove("hidden");
      renderHUD();
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateCrosshair();
    }

    function animate() {
      requestAnimationFrame(animate);
      const realDt = Math.min(clock.getDelta(), 0.033);

      if (hitStopTimer > 0) {
        hitStopTimer = Math.max(0, hitStopTimer - realDt);
      }

      const gameDt = hitStopTimer > 0 ? realDt * hitStopScale : realDt;
      updateGame(gameDt);
      updateCamera(realDt);
      updateCrosshair();
      renderHUD();
      renderer.render(scene, camera);
    }
  </script>
</body>

    function fireVulcan() {
      if (player.mainWeapon === WEAPON_TYPES.LASER) {
        fireContinuousLaser(WEAPON_DATA[WEAPON_TYPES.LASER]);
        return;
      }
      if (player.fireCooldown > 0) return;
      const weapon = WEAPON_DATA[player.mainWeapon] || WEAPON_DATA.VULCAN;
      player.fireCooldown = weapon.fireCooldown;

      if (weapon.sound === "laser") playLaserSound();
      else if (weapon.sound === "plasma") playPlasmaSound();
      else if (weapon.sound === "number9") playNumberNineSound();
      else playVulcanSound();

      if (player.mainWeapon === WEAPON_TYPES.LASER) fireLaserWeapon(weapon);
      else if (player.mainWeapon === WEAPON_TYPES.WIDE) fireWideWeapon(weapon);
      else if (player.mainWeapon === WEAPON_TYPES.PLASMA) firePlasmaWeapon(weapon);
      else firePairedBullets(weapon);

      consumeMainWeaponAmmo();
    }

    function fireContinuousLaser(weapon) {
      if (player.weaponAmmo <= 0) {
        consumeMainWeaponAmmo();
        return;
      }
      const start = new THREE.Vector3(player.position.x, player.position.y, -14);
      const end = new THREE.Vector3(player.position.x, player.position.y, -720);
      spawnLaserBeamVisual(start, end, weapon, player.fireCooldown <= 0);

      // レーザーは弾丸ではなく照射武器。見た目は常時出し、ダメージと弾数消費だけ短い間隔で刻む。
      if (player.fireCooldown > 0) return;
      player.fireCooldown = weapon.fireCooldown;
      playLaserSound();
      applyLaserDamage(start, end, 1);
      consumeMainWeaponAmmo();
    }

    function firePairedBullets(weapon) {
      const aimedEnemy = findAimedEnemy();
      spawnPlayerBullet(-1.6, aimedEnemy, weapon);
      spawnPlayerBullet(1.6, aimedEnemy, weapon);
    }

    function fireWideWeapon(weapon) {
      spawnDirectedPlayerBullet(0, weapon, -weapon.spreadAngle);
      spawnDirectedPlayerBullet(0, weapon, 0);
      spawnDirectedPlayerBullet(0, weapon, weapon.spreadAngle);
    }

    function firePlasmaWeapon(weapon) {
      const aimedEnemy = findAimedEnemy();
      spawnPlayerBullet(0, aimedEnemy, weapon, { plasma: true });
    }

    function fireNumberNineWeapon(weapon, lockedTargets = []) {
      const targets = lockedTargets.length > 0 ? lockedTargets : findNumberNineTargets(weapon.count);
      for (let i = 0; i < weapon.count; i++) {
        const angle = (i / weapon.count) * Math.PI * 2;
        const offset = new THREE.Vector3(Math.cos(angle) * 4.8, Math.sin(angle) * 3.2, 0);
        spawnNumberNineOrb(i, offset, targets[i % Math.max(1, targets.length)] || null, weapon);
      }
    }

    function getNumberNineLockedTargets() {
      player.numberNineLocks = findNumberNineTargets(WEAPON_DATA[WEAPON_TYPES.NUMBER9].count);
      return player.numberNineLocks;
    }

    function findNumberNineTargets(count) {
      const candidates = [];
      getBossLockTargets().forEach((target) => candidates.push(target));
      enemies.forEach((enemy) => {
        if (!enemy.destroyed) candidates.push({ kind: "enemy", enemy, object: enemy.group });
      });
      return candidates
        .map((target) => {
          const position = getTargetWorldPosition(target);
          const screen = worldToScreen(position);
          const screenDistance = Math.hypot(screen.x - player.aimScreen.x, screen.y - player.aimScreen.y);
          const worldDistance = player.position.distanceTo(position);
          return { target, screen, screenDistance, worldDistance };
        })
        .filter((item) => item.screen.z >= -1 && item.screen.z <= 1 && item.worldDistance <= 620)
        .sort((a, b) => a.screenDistance - b.screenDistance)
        .slice(0, count)
        .map((item) => item.target);
    }

    function spawnNumberNineOrb(index, offset, target, weapon) {
      const orb = new THREE.Group();
      const core = new THREE.Mesh(
        new THREE.SphereGeometry(1.35, 18, 12),
        new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.96,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      orb.add(core);

      const aura = new THREE.Mesh(
        new THREE.SphereGeometry(2.7, 18, 12),
        new THREE.MeshBasicMaterial({
          color: weapon.color,
          transparent: true,
          opacity: 0.48,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      orb.add(aura);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(2.9, 0.12, 6, 22),
        new THREE.MeshBasicMaterial({
          color: 0xff8a4f,
          transparent: true,
          opacity: 0.72,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      ring.rotation.x = Math.PI / 2;
      orb.add(ring);

      const launchOffset = new THREE.Vector3(offset.x, offset.y - 1.0, -12);
      orb.position.copy(player.position).add(launchOffset);
      const launchDir = new THREE.Vector3(offset.x * 0.08, offset.y * 0.08, -1).normalize();
      orb.velocity = launchDir.multiplyScalar(weapon.bulletSpeed * 0.72);
      orb.visible = false;
      orb.userData.weapon = WEAPON_TYPES.NUMBER9;
      orb.userData.damage = weapon.damage;
      orb.userData.target = target;
      orb.userData.life = 3.2;
      orb.userData.speed = weapon.bulletSpeed;
      orb.userData.turnRate = 3.8 + index * 0.08;
      orb.userData.phase = index * 0.72;
      orb.userData.index = index;
      orb.userData.launchDelay = index * (weapon.launchInterval || 0.075);
      orb.userData.launchOffset = launchOffset;
      orb.userData.launched = false;
      orb.userData.core = core;
      orb.userData.aura = aura;
      orb.userData.ring = ring;
      orb.userData.previousPosition = orb.position.clone();
      orb.userData.trailHistory = Array.from({ length: 16 }, () => orb.position.clone());
      orb.userData.trailNodes = createNumberNineTrailNodes(weapon);
      world.add(orb);
      bullets.push(orb);
    }

    function createNumberNineTrailNodes(weapon) {
      const nodes = [];
      for (let i = 0; i < 16; i++) {
        const trail = new THREE.Mesh(
          numberNineTrailGeometry,
          new THREE.MeshBasicMaterial({
            color: weapon.color,
            transparent: true,
            opacity: 0,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          })
        );
        trail.visible = false;
        trail.userData.baseScale = 1.12;
        world.add(trail);
        nodes.push(trail);
      }
      return nodes;
    }

    function updateNumberNineTrail(orb, dt) {
      const nodes = orb.userData.trailNodes || [];
      const history = orb.userData.trailHistory || [];
      if (!nodes.length) return;
      if (!orb.userData.launched) {
        nodes.forEach((node) => { node.visible = false; });
        history.forEach((point) => point.copy(orb.position));
        return;
      }

      // NUMBER9はカーブしながら飛ぶため、過去位置を少し保持して尾を軌跡へ沿わせる。
      if (history.length) {
        for (let i = history.length - 1; i > 0; i--) history[i].copy(history[i - 1]);
        history[0].copy(orb.position);
      }

      const speedGlow = THREE.MathUtils.clamp(orb.velocity.length() / 220, 0.55, 1.25);
      nodes.forEach((node, index) => {
        const t = index / Math.max(1, nodes.length - 1);
        const source = history[index + 1] || history[index] || orb.position;
        const flicker = 1 + Math.sin(clock.elapsedTime * 22 + orb.userData.phase + index * 0.9) * 0.12;
        node.visible = true;
        node.position.copy(source);
        node.scale.setScalar((2.25 - t * 1.8) * node.userData.baseScale * flicker);
        node.material.opacity = (1 - t) * 0.44 * speedGlow;
      });
    }

    function cleanupNumberNineTrail(orb) {
      const nodes = orb.userData?.trailNodes || [];
      nodes.forEach((node) => {
        world.remove(node);
        if (node.material) node.material.dispose();
      });
      if (orb.userData) {
        orb.userData.trailNodes = [];
        orb.userData.trailHistory = [];
      }
    }

    function spawnPlayerBullet(offsetX, aimedEnemy, weapon = WEAPON_DATA.VULCAN, options = {}) {
      const bullet = new THREE.Mesh(
        options.plasma
          ? new THREE.SphereGeometry(1.55 * weapon.bulletScale, 18, 12)
          : new THREE.CapsuleGeometry(0.33 * weapon.bulletScale, 5.2 * weapon.bulletScale, 4, 8),
        new THREE.MeshBasicMaterial({
          color: weapon.color,
          transparent: !!options.plasma,
          opacity: options.plasma ? 0.92 : 1,
          depthWrite: !options.plasma,
          blending: options.plasma ? THREE.AdditiveBlending : THREE.NormalBlending
        })
      );
      bullet.position.set(player.position.x + offsetX, player.position.y - 0.5, -12);
      const target = aimedEnemy
        ? aimedEnemy.group.position.clone()
        : new THREE.Vector3(player.position.x, player.position.y, -520);
      const direction = target.sub(bullet.position).normalize();
      bullet.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
      bullet.velocity = direction.multiplyScalar(weapon.bulletSpeed);
      bullet.userData.damage = weapon.damage || 1;
      bullet.userData.radius = options.plasma ? weapon.radius : 0;
      bullet.userData.splashDamage = options.plasma ? (weapon.splashDamage || 1) : 0;
      bullet.userData.collisionRadius = options.plasma ? 4.2 : 0.6;
      bullet.userData.previousPosition = bullet.position.clone();
      bullet.userData.weapon = player.mainWeapon;
      world.add(bullet);
      bullets.push(bullet);
    }

    function spawnDirectedPlayerBullet(offsetX, weapon, yawAngle) {
      const bullet = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.33 * weapon.bulletScale, 5.2 * weapon.bulletScale, 4, 8),
        new THREE.MeshBasicMaterial({ color: weapon.color })
      );
      bullet.position.set(player.position.x + offsetX, player.position.y - 0.5, -12);
      const direction = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yawAngle).normalize();
      bullet.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
      bullet.velocity = direction.multiplyScalar(weapon.bulletSpeed);
      bullet.userData.damage = 1;
      bullet.userData.radius = 0;
      bullet.userData.collisionRadius = 0.6;
      bullet.userData.previousPosition = bullet.position.clone();
      bullet.userData.weapon = player.mainWeapon;
      world.add(bullet);
      bullets.push(bullet);
    }

    function fireLaserWeapon(weapon) {
      const start = new THREE.Vector3(player.position.x, player.position.y, -14);
      const end = new THREE.Vector3(player.position.x, player.position.y, -700);
      spawnLaserBeamVisual(start, end, weapon, true);
      applyLaserDamage(start, end, 1);
    }

    function spawnLaserBeamVisual(start, end, weapon, hotCore = false) {
      const beam = new THREE.Mesh(
        new THREE.CylinderGeometry(hotCore ? 0.55 : 0.42, hotCore ? 0.55 : 0.42, start.distanceTo(end), 12),
        new THREE.MeshBasicMaterial({
          color: weapon.color,
          transparent: true,
          opacity: hotCore ? 0.9 : 0.58,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      beam.position.copy(start).lerp(end, 0.5);
      beam.rotation.x = Math.PI / 2;
      beam.life = 0.11;
      beam.baseScale = 1;
      beam.userData.effectType = "laserBeam";
      world.add(beam);
      effects.push(beam);
    }

    function applyLaserDamage(start, end, damage) {
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const enemyBullet = enemyBullets[i];
        if (!enemyBullet.userData.homing) continue;
        if (distancePointToSegment(enemyBullet.position, start, end) < (enemyBullet.userData.hitRadius || 6.5) * 0.55 + 1.8) {
          spawnExplosion(enemyBullet.position.clone());
          spawnHitEffect(enemyBullet.position.clone(), enemyBullet.userData.trailColor || 0xff8a2a);
          world.remove(enemyBullet);
          enemyBullets.splice(i, 1);
        }
      }

      const hitParts = new Set();
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        if (enemy.destroyed) continue;
        for (const partName of ENEMY_PART_ORDER) {
          const part = enemy.parts[partName];
          if (!part || part.destroyed) continue;
          const key = `${enemy.id}:${partName}`;
          if (hitParts.has(key)) continue;
          const partPos = getEnemyPartWorldPosition(part);
          if (distancePointToSegment(partPos, start, end) < part.radius + 2.2) {
            hitParts.add(key);
            damageEnemyPart(enemy, partName, damage, partPos, { laser: true });
            break;
          }
        }
      }

      bossSlots.forEach((bossSlot) => {
        if (!bossSlot.active || bossSlot.intro || bossSlot.defeated) return;
        const bossTargets = [];
        bossSlot.turrets.forEach((turret) => {
          if (turret.alive) bossTargets.push(turret.group.getWorldPosition(new THREE.Vector3()));
        });
        if (bossTargets.length === 0 && bossSlot.core) bossTargets.push(bossSlot.core.getWorldPosition(new THREE.Vector3()));
        bossTargets
          .filter((position) => distancePointToSegment(position, start, end) < 12.5)
          .sort((a, b) => a.distanceTo(start) - b.distanceTo(start))
          .forEach((position) => withBoss(bossSlot, () => hitSingleBossWithProjectile(position, damage, false)));
      });
    }

    function distancePointToSegment(point, start, end) {
      const segment = end.clone().sub(start);
      const lengthSq = segment.lengthSq();
      if (lengthSq === 0) return point.distanceTo(start);
      const t = THREE.MathUtils.clamp(point.clone().sub(start).dot(segment) / lengthSq, 0, 1);
      return point.distanceTo(start.clone().addScaledVector(segment, t));
    }

    function spawnPlasmaExplosion(position) {
      spawnExplosion(position.clone());
      const flash = new THREE.Mesh(
        new THREE.SphereGeometry(4.6, 20, 14),
        new THREE.MeshBasicMaterial({
          color: 0xdaf7ff,
          transparent: true,
          opacity: 0.95,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      flash.position.copy(position);
      flash.life = 0.26;
      flash.baseScale = 0.55;
      flash.userData.effectType = "plasmaFlash";
      world.add(flash);
      effects.push(flash);

      const shock = new THREE.Mesh(
        new THREE.RingGeometry(4.5, 6.2, 52),
        new THREE.MeshBasicMaterial({
          color: 0x8fa7ff,
          transparent: true,
          opacity: 0.82,
          side: THREE.DoubleSide,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      shock.position.copy(position);
      shock.lookAt(camera.position);
      shock.life = 0.42;
      shock.baseScale = 0.72;
      shock.userData.effectType = "plasmaShockwave";
      world.add(shock);
      effects.push(shock);

      for (let i = 0; i < 18; i++) {
        const spark = new THREE.Mesh(
          new THREE.SphereGeometry(0.55 + Math.random() * 1.15, 8, 6),

            color: i % 3 === 0 ? 0xffffff : 0x8ca7ff,
            transparent: true,
            opacity: 0.98,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          })
        );
        spark.position.copy(position);
        spark.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2
        ).normalize().multiplyScalar(70 + Math.random() * 120);
        spark.life = 0.34 + Math.random() * 0.34;
        spark.baseScale = 0.75;
        spark.userData.effectType = "spark";
        world.add(spark);
        effects.push(spark);
      }
      playPlasmaImpactSound();
    }

    function findNearestEnemyPart(enemy, position) {
      let nearestName = "";
      let nearestDistance = Infinity;
      for (const partName of ENEMY_PART_ORDER) {
        const part = enemy.parts[partName];
        if (!part || part.destroyed) continue;
        const distance = getEnemyPartWorldPosition(part).distanceTo(position);
        if (distance < nearestDistance) {
          nearestName = partName;
          nearestDistance = distance;
        }
      }
      return nearestName;
    }

    function detonatePlasmaOnEnemy(bullet, enemy) {
      const position = bullet.position.clone();
      const radius = bullet.userData.radius || WEAPON_DATA.PLASMA.radius || 15;
      const directDamage = bullet.userData.damage || WEAPON_DATA.PLASMA.damage || 10;
      const splashDamage = bullet.userData.splashDamage || WEAPON_DATA.PLASMA.splashDamage || 4;
      const previousPosition = bullet.userData.previousPosition || bullet.position;
      let directPart = hitEnemyPartWithProjectile(enemy, position, directDamage, {
        previousPosition,
        projectileRadius: bullet.userData.collisionRadius || 4.2,
        plasma: true
      });

      // 近接信管では中心点が少し外れても、最も近い未破壊部位へ直撃扱いを入れる。
      if (!directPart && !enemy.destroyed) {
        directPart = findNearestEnemyPart(enemy, position);
        if (directPart) damageEnemyPart(enemy, directPart, directDamage, position, { plasma: true });
      }

      if (!enemy.destroyed) {
        applyEnemyAreaDamage(enemy, position, radius, splashDamage, directPart || "");
      }
      spawnPlasmaExplosion(position);
    }

    function updateNumberNineOrb(orb, dt) {
      if (!orb.userData.launched) {
        orb.userData.launchDelay = Math.max(0, orb.userData.launchDelay - dt);
        orb.position.copy(player.position).add(orb.userData.launchOffset);
        orb.userData.previousPosition.copy(orb.position);
        updateNumberNineTrail(orb, dt);
        if (orb.userData.launchDelay > 0) return false;
        orb.userData.launched = true;
        orb.visible = true;
        playNumberNineOrbSound(orb.userData.index || 0);
      }

      orb.userData.life -= dt;
      orb.userData.previousPosition.copy(orb.position);
      const target = orb.userData.target;
      let desiredVelocity = new THREE.Vector3(player.position.x * 0.15, player.position.y, -620)
        .sub(orb.position)
        .normalize()
        .multiplyScalar(orb.userData.speed);

      if (target && isMissileTargetAlive(target)) {
        const targetPos = getTargetWorldPosition(target);
        const curve = new THREE.Vector3(
          Math.sin(clock.elapsedTime * 6.2 + orb.userData.phase) * 18,
          Math.cos(clock.elapsedTime * 5.1 + orb.userData.phase) * 12,
          0
        );
        desiredVelocity = targetPos
          .clone()
          .add(curve)
          .sub(orb.position)
          .normalize()
          .multiplyScalar(orb.userData.speed);
      }

      orb.velocity.lerp(desiredVelocity, 1 - Math.exp(-dt * orb.userData.turnRate));
      orb.position.addScaledVector(orb.velocity, dt);
      orb.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, -1), orb.velocity.clone().normalize());

      const pulse = 1 + Math.sin(clock.elapsedTime * 17 + orb.userData.phase) * 0.18;
      orb.userData.core.scale.setScalar(pulse);
      orb.userData.aura.scale.setScalar(0.9 + pulse * 0.16);
      orb.userData.ring.rotation.z += dt * 7;
      updateNumberNineTrail(orb, dt);

      return resolveNumberNineHit(orb);
    }

    function resolveNumberNineHit(orb) {
      const damage = orb.userData.damage || 3;
      if (hitBossWithProjectile(orb.position, damage, true)) {
        spawnHeatMeltEffect(orb.position.clone(), 0.7);
        return true;
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        if (enemy.destroyed) continue;
        if (orb.position.distanceTo(enemy.group.position) > 18) continue;
        const partName = hitEnemyPartWithProjectile(enemy, orb.position, damage, {
          previousPosition: orb.userData.previousPosition,
          projectileRadius: 2.5,
          preferMissileOrder: true,
          heatMelt: true
        });
        if (partName) {
          const meltPos = getEnemyPartWorldPosition(enemy.parts[partName]);
          spawnHeatMeltEffect(meltPos, 1.15);
          if (!enemy.destroyed) destroyEnemyByRef(enemy, { melt: true });
          return true;
        }
      }

      return orb.userData.life <= 0 || orb.position.z < -820 || orb.position.z > 80;
    }

    function findAimedEnemy() {
      let bestEnemy = null;
      let bestDistance = 72;
      enemies.forEach((enemy) => {
        const aimPosition = enemy.parts?.cockpit && !enemy.parts.cockpit.destroyed
          ? enemy.parts.cockpit.object.getWorldPosition(new THREE.Vector3())
          : enemy.group.position;
        const screen = worldToScreen(aimPosition);
        if (screen.z < -1 || screen.z > 1) return;
        const distance = Math.hypot(screen.x - player.aimScreen.x, screen.y - player.aimScreen.y);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestEnemy = enemy;
        }
      });
      return bestEnemy;
    }

    function worldToScreen(position) {
      const projected = position.clone().project(camera);
      return {
        x: (projected.x * 0.5 + 0.5) * window.innerWidth,
        y: (-projected.y * 0.5 + 0.5) * window.innerHeight,
        z: projected.z
      };
    }

    function showCenterMessage(message, type = "info", duration = 1.2) {
      boss.message = message;
      boss.messageTimer = Math.max(boss.messageTimer, duration);
      hud.centerAlert.innerHTML = message;
      hud.centerAlert.className = `visible${type === "info" ? " info" : ""}`;
    }

        spawnBossInstance(mothershipBoss, 0, true, { standby: true, homeZ: -520 });

        stageTestLog("Stage 2 twin bosses spawned");
        spawnBossInstance(primaryBoss, -44, true);

        boss.group = createBossModel();

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D Fighter Rail Shooter Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --panel: rgba(6, 15, 30, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.64);
      --cyan: #58e6ff;
      --yellow: #ffd65a;
      --red: #ff5d6c;
      --green: #74ff99;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      background: #020612;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: var(--text);
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.35);
      transform: translate3d(0, 0, 0);
      will-change: transform;
    }

    #damageFlash {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255, 70, 70, 0.08), rgba(255, 0, 0, 0.52));
      opacity: 0;
      mix-blend-mode: screen;
      will-change: opacity;
    }

    .metrics {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: max(14px, env(safe-area-inset-left));
      display: grid;
      grid-template-columns: repeat(2, minmax(92px, 1fr));
      gap: 8px;
      width: min(340px, calc(100vw - 28px));
    }

    .metric {
      min-height: 58px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(12px);
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0;
    }

    .value {
      display: block;
      margin-top: 5px;
      font-size: clamp(17px, 4.4vw, 25px);
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    #rightHud {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      right: max(14px, env(safe-area-inset-right));
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .badge {
      min-width: 132px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .badge.active {
      background: var(--cyan);
      color: #07152b;
      text-shadow: none;
    }

    .badge.warn {
      background: var(--yellow);
      color: #07152b;
      text-shadow: none;
    }

    .badge.clear {
      background: var(--green);
      color: #07152b;
      text-shadow: none;
    }

    .badge.danger {
      background: var(--red);
      color: #fff;
    }

    #pauseButton {
      min-width: 132px;
      padding: 9px 12px;
      border: 1px solid rgba(88, 230, 255, 0.4);
      border-radius: 8px;
      background: rgba(6, 15, 30, 0.72);
      color: var(--cyan);
      font: inherit;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      pointer-events: auto;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    #pauseButton:disabled {
      color: var(--muted);
      cursor: default;
      opacity: 0.62;
    }

    #rollHud {
      position: absolute;
      left: 50%;
      bottom: calc(max(18px, env(safe-area-inset-bottom)) + 48px);
      min-width: 178px;
      transform: translateX(-50%);
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(6, 15, 30, 0.6);
      color: var(--cyan);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    #rollHud.rolling {
      background: rgba(255, 214, 90, 0.88);
      color: #07152b;
      text-shadow: none;
    }

    #rollHud.cooldown {
      background: rgba(6, 15, 30, 0.62);
      color: var(--muted);
    }

    #missileButton {
      position: absolute;
      right: max(18px, env(safe-area-inset-right));
      bottom: max(18px, env(safe-area-inset-bottom));
      min-width: 148px;
      min-height: 48px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(6, 15, 30, 0.72);
      color: var(--cyan);
      font: inherit;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      pointer-events: auto;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    #missileButton.locked {
      background: rgba(255, 214, 90, 0.9);
      color: #07152b;
      text-shadow: none;
    }

    #missileButton.cooldown {
      color: var(--muted);
      cursor: default;
      opacity: 0.75;
    }

    #numberNineReload {
      position: absolute;
      left: 50%;
      top: auto;
      bottom: calc(max(18px, env(safe-area-inset-bottom)) + 102px);
      display: none;
      width: min(280px, calc(100vw - 44px));
      transform: translateX(-50%);
      padding: 8px 12px;
      border: 1px solid rgba(255, 56, 82, 0.58);
      border-radius: 8px;
      background: rgba(22, 4, 12, 0.7);
      color: #ff3d58;
      font-size: clamp(13px, 2.8vw, 18px);
      font-weight: 1000;
      text-align: center;
      text-shadow: 0 0 18px rgba(255, 38, 63, 0.86);
      pointer-events: none;
      backdrop-filter: blur(10px);
    }

    #numberNineReload.visible {
      display: block;
    }

    #numberNineReloadOuter {
      height: 6px;
      margin-top: 7px;
      border: 1px solid rgba(255, 111, 128, 0.58);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 10px rgba(255, 38, 63, 0.16);
    }

    #numberNineReloadBar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(255, 38, 63, 0.7), rgba(255, 107, 120, 0.96));
      box-shadow: 0 0 18px rgba(255, 38, 63, 0.82);
    }

    #pauseMenu {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: grid;
      place-items: center;
      background: rgba(0, 4, 14, 0.52);
      backdrop-filter: blur(8px);
      color: var(--text);
    }

    #pauseMenu.hidden {
      display: none;
    }

    .pauseBox {
      width: min(420px, calc(100vw - 36px));
      padding: 24px;
      border: 1px solid rgba(88, 230, 255, 0.46);
      border-radius: 10px;
      background: rgba(6, 15, 30, 0.86);
      box-shadow: 0 0 30px rgba(88, 230, 255, 0.18);
      text-align: center;
    }

    .pauseBox h2 {
      margin: 0 0 18px;
      color: var(--cyan);
      font-size: 28px;
      letter-spacing: 0;
    }

    .pauseActions {
      display: grid;
      gap: 10px;
    }

    .pauseActions button {
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(88, 230, 255, 0.9);
      color: #07152b;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .pauseActions button.secondary {
      background: rgba(255, 93, 108, 0.88);
      color: #fff;
    }

    .numberLock {
      position: absolute;
      width: 42px;
      height: 42px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255, 54, 78, 0.92);
      border-radius: 3px;
      box-shadow: 0 0 14px rgba(255, 38, 63, 0.64), inset 0 0 12px rgba(255, 38, 63, 0.2);
      color: #fff;
      font-size: 12px;
      font-weight: 1000;
      line-height: 1;
      text-align: center;
      text-shadow: 0 0 8px rgba(255, 38, 63, 0.95);
      pointer-events: none;
      opacity: 0;
    }

    .numberLock.visible {
      opacity: 1;
    }

    .numberLock::before {
      content: attr(data-lock);
      position: absolute;
      top: -15px;
      left: -2px;
      min-width: 20px;
      padding: 2px 4px;
      border-radius: 3px;
      background: rgba(255, 38, 63, 0.88);
      color: white;
    }

    #comboHud {
      position: absolute;
      left: 50%;
      top: max(14px, env(safe-area-inset-top));
      transform: translateX(-50%) scale(0.92);
      min-width: 220px;
      padding: 10px 18px;
      border: 1px solid rgba(255, 214, 90, 0.45);
      border-radius: 10px;
      background: rgba(6, 15, 30, 0.58);
      color: var(--yellow);
      text-align: center;
      opacity: 0;
      transition: opacity 120ms ease, transform 120ms ease;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    #comboHud.visible {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    #hud.boss-active #comboHud {
      top: calc(max(14px, env(safe-area-inset-top)) + 126px);
    }

    #comboCount {
      display: block;
      font-size: clamp(32px, 6vw, 54px);
      font-weight: 1000;
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    #comboMultiplier {
      display: block;
      margin-top: 5px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
    }

    #comboTitle {
      display: block;
      min-height: 18px;
      margin-top: 4px;
      color: var(--cyan);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    #bossHud {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      display: none;
      width: min(430px, calc(100vw - 32px));
      transform: translateX(-50%);
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(12, 6, 24, 0.74);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    #bossHud.visible {
      display: block;
    }

    #bossName {
      display: block;
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      font-weight: 950;
    }

    .bossMeterLabel {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-align: left;
    }

    #bossBarOuter,
    #bossShieldOuter {
      height: 12px;
      margin: 4px 0 5px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.36);
    }

    #bossBar,
    #bossShieldBar {
      width: 100%;
      height: 100%;
      transition: width 120ms linear, opacity 120ms linear;
    }

    #bossShieldBar {
      background: linear-gradient(90deg, #46f4ff, #5790ff);
    }

    #bossBar {
      background: linear-gradient(90deg, #9f4cff, #ff315f);
    }

    #bossHud.core-locked #bossBar,
    #bossHud.turrets-up #bossShieldBar {
      opacity: 0.42;
    }

    #bossTurrets {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
    }

    #centerAlert {
      position: absolute;
      left: 50%;
      top: 34%;
      display: none;
      min-width: min(430px, calc(100vw - 36px));
      transform: translate(-50%, -50%);
      padding: 15px 20px;
      border: 1px solid rgba(255, 93, 108, 0.66);
      border-radius: 8px;
      background: rgba(35, 5, 13, 0.7);
      color: #ff6b78;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 1000;
      text-align: center;
      text-shadow: 0 0 16px rgba(255, 49, 95, 0.8);
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    #centerAlert.visible {
      display: block;
      animation: warningBlink 0.32s steps(2, end) infinite;
    }

    #centerAlert.info {
      border-color: rgba(88, 230, 255, 0.62);
      background: rgba(4, 25, 36, 0.72);
      color: var(--cyan);
      animation: none;
    }

    #partAlert {
      position: absolute;
      left: 50%;
      top: calc(max(14px, env(safe-area-inset-top)) + 112px);
      min-width: min(360px, calc(100vw - 36px));
      transform: translateX(-50%) scale(0.96);
      padding: 10px 18px;
      border: 1px solid rgba(255, 214, 90, 0.5);
      border-radius: 8px;
      background: rgba(6, 15, 30, 0.64);
      color: var(--yellow);
      font-size: clamp(16px, 4vw, 24px);
      font-weight: 1000;
      text-align: center;
      opacity: 0;
      backdrop-filter: blur(10px);
      pointer-events: none;
      transition: opacity 0.12s ease, transform 0.12s ease;
    }

    #partAlert.visible {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    #hud.boss-active #partAlert {
      top: calc(max(14px, env(safe-area-inset-top)) + 224px);
    }

    @keyframes warningBlink {
      50% { opacity: 0.36; }
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 55%;
      width: 54px;
      height: 54px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(88, 230, 255, 0.82);
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(88, 230, 255, 0.28), inset 0 0 18px rgba(88, 230, 255, 0.16);
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.88);
    }

    #crosshair::before {
      left: 50%;
      top: -10px;
      width: 2px;
      height: 74px;
      transform: translateX(-50%);
    }

    #crosshair::after {
      top: 50%;
      left: -10px;
      width: 74px;
      height: 2px;
      transform: translateY(-50%);
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      width: min(600px, calc(100vw - 28px));
      transform: translateX(-50%);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(6, 15, 30, 0.52);
      color: rgba(255, 255, 255, 0.76);
      font-size: clamp(12px, 2.8vw, 14px);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 22px;
      background: radial-gradient(circle at 50% 32%, rgba(34, 101, 170, 0.32), rgba(2, 8, 18, 0.82));
      color: white;
      text-align: center;
      touch-action: none;
    }

    #overlay.hidden {
      display: none;
    }

    .overlayBox {
      width: min(540px, 100%);
      padding: 26px 24px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(5, 13, 26, 0.72);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 8vw, 62px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 auto 18px;
      max-width: 36rem;
      color: rgba(255, 255, 255, 0.78);
      font-size: clamp(14px, 3.4vw, 17px);
      line-height: 1.55;
    }

    #result {
      min-height: 26px;
      margin: 0 0 16px;
      color: var(--yellow);
      font-weight: 900;
      font-size: 18px;
      line-height: 1.45;
    }

    #startButton {
      display: inline-grid;
      place-items: center;
      min-width: 190px;
      min-height: 50px;
      padding: 0 22px;
      border: 0;
      border-radius: 8px;
      background: #ffffff;
      color: #07152b;
      font: inherit;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: min(320px, calc(100vw - 24px));
      }

      #rightHud {
        top: auto;
        right: max(12px, env(safe-area-inset-right));
        bottom: calc(max(66px, env(safe-area-inset-bottom)) + 12px);
      }

      .badge {
        min-width: 108px;
        padding: 9px 10px;
      }

      #numberNineReload {
        width: min(230px, calc(100vw - 170px));
        bottom: calc(max(18px, env(safe-area-inset-bottom)) + 104px);
        padding: 7px 10px;
      }

      #hud.boss-active #comboHud {
        top: calc(max(14px, env(safe-area-inset-top)) + 118px);
      }

      #hud.boss-active #partAlert {
        top: calc(max(14px, env(safe-area-inset-top)) + 210px);
      }
    }
  </style>
</head>
<body>
  <div id="damageFlash" aria-hidden="true"></div>
  <div id="hud">
    <div class="metrics">
      <div class="metric"><span class="label">KILLS</span><span class="value" id="killsValue">0 / 100</span></div>
      <div class="metric"><span class="label">HP</span><span class="value" id="hpValue">100</span></div>
      <div class="metric"><span class="label">WAVE</span><span class="value" id="waveValue">1</span></div>
      <div class="metric"><span class="label">SCORE</span><span class="value" id="scoreValue">0</span></div>
    </div>

    <div id="rightHud">
      <div class="badge" id="weaponBadge">MAIN WEAPON<br>VULCAN</div>
      <div class="badge" id="statusBadge">STAGE 1</div>
      <button id="pauseButton" type="button">PAUSE</button>
    </div>

    <div id="crosshair" aria-hidden="true"></div>
    <div id="bossHud" aria-live="polite">
      <span id="bossName">DREADNOUGHT</span>
      <span class="bossMeterLabel" id="bossShieldLabel">SHIELD</span>
      <div id="bossShieldOuter"><div id="bossShieldBar"></div></div>
      <span class="bossMeterLabel">CORE</span>
      <div id="bossBarOuter"><div id="bossBar"></div></div>
      <span id="bossTurrets">TURRETS 4 / 4</span>
    </div>
    <div id="centerAlert"></div>
    <div id="partAlert"></div>
    <div id="numberNineReload" aria-hidden="true">
      <span>RELOAD</span>
      <div id="numberNineReloadOuter"><div id="numberNineReloadBar"></div></div>
    </div>
    <div id="rollHud">ROLL READY</div>
    <button id="missileButton" type="button">MISSILE READY [E]</button>
    <div id="comboHud" aria-live="polite">
      <span id="comboCount">2 COMBO</span>
      <span id="comboMultiplier">SCORE ×1.1</span>
      <span id="comboTitle"></span>
    </div>
    <div id="hint">ドラッグで移動。スペースキー長押しで連射。←/→またはA/Dをダブルタップ、または素早く横フリックでローリング回避。</div>
  </div>

  <div id="overlay">
    <div class="overlayBox">
      <h1>Space Fang Shooter</h1>
      <p class="subtitle">正面から迫る敵艦隊を撃ち落とす3D戦闘機シューティングゲーム</p>
      <p id="result"></p>
      <button id="startButton" type="button">START</button>
    </div>
  </div>

  <div id="pauseMenu" class="hidden" aria-live="polite">
    <div class="pauseBox">
      <h2>PAUSE</h2>
      <div class="pauseActions">
        <button id="continueButton" type="button">コンティニュー</button>
        <button id="restartButton" class="secondary" type="button">はじめからやりなおす</button>
      </div>
    </div>
  </div>

  <script type="module">

    function createNebulaTexture(seed) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 34; i++) {
        const x = canvas.width * (0.18 + Math.random() * 0.64);
        const y = canvas.height * (0.18 + Math.random() * 0.64);
        const r = 18 + Math.random() * 52;
        const hue = seed % 2 ? 260 + Math.random() * 35 : 185 + Math.random() * 45;
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
        gradient.addColorStop(0, `hsla(${hue}, 95%, 72%, ${0.16 + Math.random() * 0.16})`);
        gradient.addColorStop(1, `hsla(${hue}, 95%, 50%, 0)`);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function createFlameTexture(kind) {
      const canvas = document.createElement("canvas");
      canvas.width = 96;
      canvas.height = 160;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createRadialGradient(48, 46, 2, 48, 68, 76);
      if (kind === "blue") {
        gradient.addColorStop(0, "rgba(210,235,255,0.85)");
        gradient.addColorStop(0.34, "rgba(79,150,255,0.46)");
        gradient.addColorStop(1, "rgba(44,80,255,0)");
      } else if (kind === "white") {
        gradient.addColorStop(0, "rgba(255,255,255,1)");
        gradient.addColorStop(0.36, "rgba(255,244,190,0.72)");
        gradient.addColorStop(1, "rgba(255,210,70,0)");
      } else {
        gradient.addColorStop(0, "rgba(255,255,230,1)");
        gradient.addColorStop(0.25, "rgba(255,220,70,0.9)");
        gradient.addColorStop(0.52, "rgba(255,115,20,0.58)");
        gradient.addColorStop(1, "rgba(255,60,0,0)");
      }
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.ellipse(48, 56, 42, 72, 0, 0, Math.PI * 2);
      ctx.fill();
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

      window.addEventListener("keydown", (event) => {
        if (event.code === "Escape") {
          event.preventDefault();
          if (paused) resumeGame();
          else pauseGame();
        } else if (paused) {
          return;
        } else if (event.code === "Space") {
          event.preventDefault();
          player.fireHeld = true;
        } else if (event.code === "KeyE") {
          event.preventDefault();
          if (!event.repeat) fireHomingMissiles();
        } else if (event.code === "ArrowLeft" || event.code === "KeyA") {
          event.preventDefault();
          handleRollKeyTap("left", -1, event.repeat);
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          event.preventDefault();
          handleRollKeyTap("right", 1, event.repeat);
        }
      });
      window.addEventListener("keyup", (event) => {
        if (event.code === "Space") player.fireHeld = false;
      });

      renderer.domElement.addEventListener("pointerdown", (event) => {
        dragging = true;
        lastPointerX = event.clientX;
        lastPointerY = event.clientY;
        pointerStartX = event.clientX;
        pointerStartY = event.clientY;
        pointerStartTime = performance.now();
        renderer.domElement.setPointerCapture(event.pointerId);
      });

      renderer.domElement.addEventListener("pointermove", (event) => {
        if (!dragging || !running || paused) return;
        const dx = event.clientX - lastPointerX;
        const dy = event.clientY - lastPointerY;
        lastPointerX = event.clientX;
        lastPointerY = event.clientY;
        updateControls(dx, dy);
      });

      renderer.domElement.addEventListener("pointerup", endDrag);
      renderer.domElement.addEventListener("pointercancel", endDrag);
    }

    function setupStage(stageNumber) {
      stage.current = stageNumber;
      stage.totalEnemies = getStageEnemyCount(stageNumber);
      stage.killStart = player.kills;
      stage.spawnedEnemies = 0;
      stage.wave = 0;
      stage.waveTimer = stageNumber === 1 ? 0.4 : 1.2;
      stage.clear = false;
      stage.bossSpawned = false;
      stage.bossDefeated = false;
      stage.bossIntroTimer = 0;
      stage.bossPhase = 1;
      stage.mothershipEngaged = false;
      stage.transitioning = false;
      showCenterMessage(`STAGE ${stageNumber}`, "info", 1.0);
      stageTestLog(`Stage ${stageNumber} started`);
    }

    function startNextStage() {
      if (stage.transitioning) return;
      stage.transitioning = true;
      stageTestLog(`Stage ${stage.current} cleared`);
      clearObjects(bullets);
      clearObjects(missiles);
      clearObjects(enemyBullets);
      clearObjects(enemies);
      clearObjects(weaponContainers);
      clearObjects(effects);
      resetBossState();
      hideNumberNineLockIndicators();
      hud.root.classList.remove("boss-active");
      hud.numberNineReload.className = "";
      hud.numberNineReloadBar.style.width = "0%";
      bossWeaponContainerTimer = 0;
      setupStage(stage.current + 1);
      // ステージ突破時は全回復。次の戦場へ気持ちよく出撃できるようにする。
      player.hp = 100;
      player.invincibleTimer = Math.max(player.invincibleTimer, 1.0);
      player.state = "FIGHT";
    }

    function clearObjects(list) {
      while (list.length) {
        const object = list.pop();
        if (object.userData?.weapon === WEAPON_TYPES.NUMBER9) cleanupNumberNineTrail(object);
        world.remove(object.group || object);
      }
    }

    function pauseGame() {
      if (!running || paused || player.state !== "FIGHT" || stage.clear || player.hp <= 0) return;
      paused = true;
      player.fireHeld = false;
      dragging = false;
      hud.pauseMenu.classList.remove("hidden");
      if (audio.jetGain && audio.context) audio.jetGain.gain.setTargetAtTime(0.02, audio.context.currentTime, 0.12);
    }

    function resumeGame() {
      if (!paused) return;
      paused = false;
      hud.pauseMenu.classList.add("hidden");
      if (audio.jetGain && audio.context) audio.jetGain.gain.setTargetAtTime(0.12, audio.context.currentTime, 0.18);
    }

    function restartFromBeginning() {
      paused = false;
      hud.pauseMenu.classList.add("hidden");
      initAudio();
      resetGame();
      startBgm();
      startJetSound();
      running = true;
      player.state = "FIGHT";
      hud.overlay.classList.add("hidden");
    }

    function resetBossState() {
      const previousBoss = boss;
      for (const bossSlot of bossSlots) {
        boss = bossSlot;
        if (boss.group) world.remove(boss.group);
        boss.group = null;
        boss.active = false;
        boss.intro = false;
        boss.defeated = false;
        boss.spawned = false;
        boss.homeX = 0;
        boss.homeZ = -180;
        boss.core = null;
        boss.coreMaxHp = boss.kind === "mothership" ? 180 : 80;
        boss.coreHp = boss.coreMaxHp;
        boss.shieldMesh = null;
        boss.shieldMaxHp = boss.kind === "mothership" ? 140 : 60;
        boss.shieldHp = boss.shieldMaxHp;
        boss.shieldBroken = false;
        boss.shieldRechargeTimer = 0;
        boss.shieldRechargeProgress = 0;
        boss.shieldHitFlash = 0;
        boss.shieldBreakTimer = 0;
        boss.shieldBreakCount = 0;
        boss.rechargeInterrupted = 0;
        boss.shieldGenerators = [];
        boss.turrets = [];
        boss.docked = false;
        boss.dockOffsetX = 0;
        boss.detachTimer = 0;
        boss.escortLaunchAnnounced = false;
        boss.standby = false;
        boss.phase = 1;
        boss.attackTimer = 0;
        boss.attackCount = 0;
        boss.movementTime = 0;
        boss.warningTimer = 0;
        boss.messageTimer = 0;
        boss.message = "";
        boss.chargeState = "idle";
        boss.chargeTimer = 0;
        boss.chargeCooldown = 4.5;
        boss.chargeHit = false;
        boss.defeatTimer = 0;
        boss.defeatExplosionTimer = 0;
        boss.defeatExplosions = 0;
        boss.damageTakenDuringBoss = 0;
        boss.bonus = 0;
      }
      boss = previousBoss || primaryBoss;
      resetBgmIntensity();
      hud.boss.className = "";
      hud.bossBar.style.width = "100%";
      hud.bossShieldBar.style.width = "100%";
      hud.bossShieldLabel.textContent = "SHIELD";
      hud.bossTurrets.textContent = "TURRETS 4 / 4";
      hud.centerAlert.className = "";
      hud.centerAlert.textContent = "";
    }

    function endDrag(event) {
      dragging = false;
      const elapsed = performance.now() - pointerStartTime;
      const dx = event.clientX - pointerStartX;
      const dy = event.clientY - pointerStartY;
      if (elapsed <= 240 && Math.abs(dx) >= 70 && Math.abs(dx) >= Math.abs(dy) * 1.6) {
        triggerRoll(dx < 0 ? -1 : 1);
      }
      if (event.pointerId !== undefined && renderer.domElement.hasPointerCapture(event.pointerId)) {
        renderer.domElement.releasePointerCapture(event.pointerId);
      }
    }

    function handleRollKeyTap(side, direction, repeated) {
      if (repeated) return;
      const now = performance.now();
      if (now - lastRollKeyTime[side] <= 280) {
        triggerRoll(direction);
        lastRollKeyTime[side] = -Infinity;
      } else {
        lastRollKeyTime[side] = now;
      }
    }

    function updateControls(dx, dy) {
      // 固定進行方向の画面内移動。端に行ったらそれ以上曲がらない。
      player.target.x = THREE.MathUtils.clamp(player.target.x + dx * 0.22, -player.bounds.x, player.bounds.x);
      player.target.y = THREE.MathUtils.clamp(player.target.y - dy * 0.18, player.bounds.minY, player.bounds.maxY);
    }

    function triggerRoll(direction) {
      if (!running || player.state !== "FIGHT" || stage.clear) return;
      if (player.rollTimer > 0 || player.rollCooldown > 0) return;

      player.rollDirection = direction < 0 ? -1 : 1;
      player.rollTimer = player.rollDuration;
      player.rollCooldown = 0;
      player.invincibleTimer = Math.max(player.invincibleTimer, player.rollInvincibleDuration);
      player.target.x = THREE.MathUtils.clamp(
        player.target.x + player.rollDirection * player.rollDistance,
        -player.bounds.x,
        player.bounds.x
      );
      playRollSound();
    }

    function updateGame(dt) {
      if (!running || paused) return;

      stage.waveTimer -= dt;
      if (
        stage.waveTimer <= 0 &&
        enemies.length === 0 &&
        stage.spawnedEnemies < stage.totalEnemies &&
        !stage.bossSpawned
      ) {
        spawnWave();
      }

      player.fireCooldown = Math.max(0, player.fireCooldown - dt);
      player.missileCooldown = Math.max(0, player.missileCooldown - dt);
      player.numberNineReloadTimer = Math.max(0, player.numberNineReloadTimer - dt);
      player.weaponHudFlash = Math.max(0, player.weaponHudFlash - dt);
      player.specialWeaponHudFlash = Math.max(0, player.specialWeaponHudFlash - dt);
      updateSpecialWeapon(dt);
      partAlertTimer = Math.max(0, partAlertTimer - dt);
      if (partAlertTimer <= 0) hud.partAlert.className = "";
      updateCombo(dt);
      updateWeaponRoulette(dt);
      player.invincibleTimer = Math.max(0, player.invincibleTimer - dt);
      const wasRolling = player.rollTimer > 0;
      player.rollTimer = Math.max(0, player.rollTimer - dt);
      if (wasRolling && player.rollTimer <= 0) {
        player.rollDirection = 0;
        player.rollCooldown = player.rollCooldownDuration;
      } else if (!wasRolling) {
        player.rollCooldown = Math.max(0, player.rollCooldown - dt);
      }
      if (player.fireHeld) fireVulcan();

      updatePlayerTransform(dt);
      updateBullets(dt);
      updateMissiles(dt);
      updateWeaponContainers(dt);
      updateEnemies(dt);
      updateEnemyBullets(dt);
      updateBoss(dt);
      updateStage3MothershipEngagement();
      updateEffects(dt);
      updateEngineFlames(dt);
      updateWorldMotion(dt);
      player.shakeTimer = Math.max(0, player.shakeTimer - dt);
      player.damageFlashTimer = Math.max(0, player.damageFlashTimer - dt);
      player.zoomTimer = Math.max(0, player.zoomTimer - dt);
      player.damageBlinkTimer = Math.max(0, player.damageBlinkTimer - dt);
      player.engineDisruptionTimer = Math.max(0, player.engineDisruptionTimer - dt);
      updateDamagePresentation();
      updatePlayerDamageBlink();

      if (player.kills - stage.killStart >= stage.totalEnemies && !stage.bossSpawned && enemies.length === 0) {
        clearObjects(enemyBullets);
        stage.bossSpawned = true;
        stage.bossIntroTimer = 2.0;
        stageTestLog(`Stage ${stage.current} boss intro started`);
        playWarningSound();
      }

      if (stage.bossSpawned && stage.bossIntroTimer > 0 && !bossSlots.some((slot) => slot.active || slot.group)) {
        stage.bossIntroTimer = Math.max(0, stage.bossIntroTimer - dt);
        const warningMessage = stage.current === 3
          ? "WARNING<br>MOTHERSHIP AND ESCORTS APPROACHING"
          : stage.current === 2
            ? "WARNING<br>TWIN DREADNOUGHTS APPROACHING"
            : "WARNING<br>LARGE ENEMY APPROACHING";
        showCenterMessage(warningMessage, "warning", stage.bossIntroTimer);
        if (stage.bossIntroTimer <= 0) spawnBoss();
      }

      if (bossSlots.some((slot) => slot.active && !slot.intro && !slot.defeated && !slot.standby)) {
        bossWeaponContainerTimer = Math.max(0, bossWeaponContainerTimer - dt);
        if (bossWeaponContainerTimer <= 0 && weaponContainers.length === 0) {
          spawnWeaponContainer(true);
          bossWeaponContainerTimer = THREE.MathUtils.randFloat(18, 26);
        }
      }

      if (player.hp <= 0) {
        gameOver(false);
      } else if (stage.bossDefeated && !stage.clear && !stage.transitioning) {
        if (stage.current < stage.maxStage) startNextStage();
        else {
          stage.transitioning = true;
          stageTestLog("Game cleared");
          gameOver(true);
        }
      }
    }
    function fireHomingMissiles() {
      if (!running || player.state !== "FIGHT" || stage.clear) return;
      if (player.missileCooldown > 0) return;

      if (player.specialWeapon === WEAPON_TYPES.NUMBER9) {
        if (player.numberNineReloadTimer > 0) return;
        const weapon = WEAPON_DATA[WEAPON_TYPES.NUMBER9];
        const lockedTargets = getNumberNineLockedTargets();
        if (lockedTargets.length === 0) {
          showPartMessage("NO TARGET LOCK", 0.65);
          return;
        }
        // NUMBER9は一斉射後に専用リロードを挟み、連発で戦場を制圧しすぎないようにする。
        player.numberNineReloadTimer = player.numberNineReloadDuration;
        playNumberNineSound();
        fireNumberNineWeapon(weapon, lockedTargets);
        return;
      }

      const targets = findMissileTargets(2);
      if (targets.length === 0) return;

      player.missileCooldown = player.missileCooldownDuration;
      playMissileLaunchSound();
      spawnHomingMissile(-5.4, targets[0]);
      spawnHomingMissile(5.4, targets[1] || targets[0]);
    }

    function findMissileTargets(maxTargets) {
      const candidates = [];
      getBossLockTargets().forEach((part) => candidates.push(part));
      enemies.forEach((enemy) => candidates.push({ kind: "enemy", enemy, object: enemy.group }));
      return candidates
        .map((target) => {
          const pos = getTargetWorldPosition(target);
          const screen = worldToScreen(pos);
          const screenDistance = Math.hypot(
            screen.x - player.aimScreen.x,
            screen.y - player.aimScreen.y
          );
          const worldDistance = player.position.distanceTo(pos);
          return { target, screen, screenDistance, worldDistance };
        })
        .filter((item) =>
          item.screen.z >= -1 &&
          item.screen.z <= 1 &&
          item.worldDistance <= player.missileLockRange &&
          item.screenDistance <= player.missileLockScreenRadius
        )
        .sort((a, b) => a.screenDistance - b.screenDistance)
        .slice(0, maxTargets)
        .map((item) => item.target);
    }

    function getBossLockTargets() {
      return bossSlots.flatMap((bossSlot) => withBoss(bossSlot, () => getSingleBossLockTargets()));
    }

    function getSingleBossLockTargets() {
      if (!boss.active || boss.intro || boss.defeated || boss.standby) return [];
      if (boss.kind === "mothership") {
        const generators = boss.shieldGenerators
          .filter((generator) => generator.alive)
          .map((generator) => ({ kind: "bossGenerator", boss, generator, object: generator.group }));
        if (generators.length > 0) return generators;
      }
      const targets = boss.turrets
        .filter((turret) => turret.alive)
        .map((turret) => ({ kind: "bossTurret", boss, turret, object: turret.group }));
      if (targets.length === 0 && boss.coreHp > 0 && (!boss.shieldBroken || boss.shieldHp > 0)) {
        targets.push({ kind: "bossShield", boss, object: boss.shieldMesh });
      } else if (targets.length === 0 && boss.coreHp > 0) {
        targets.push({ kind: "bossCore", boss, object: boss.core });
      }
      return targets;
    }

    function getTargetWorldPosition(target) {
      if (target.kind === "enemy") {
        const sensor = target.enemy.parts?.cockpit;
        if (sensor && !sensor.destroyed) return sensor.object.getWorldPosition(new THREE.Vector3());
        return target.enemy.group.position.clone();
      }
      if (target.kind === "bossShield") {
        return target.object.getWorldPosition(new THREE.Vector3()).add(new THREE.Vector3(0, 8, 0));
      }
      return target.object.getWorldPosition(new THREE.Vector3());
    }

    function spawnHomingMissile(offsetX, targetEnemy) {
      const missile = new THREE.Group();

      const missileBodyMaterial = new THREE.MeshStandardMaterial({
        color: 0xdfe8f3,
        roughness: 0.28,
        metalness: 0.42
      });
      const missileDarkMaterial = new THREE.MeshStandardMaterial({
        color: 0x25324a,
        roughness: 0.4,
        metalness: 0.28
      });
      const missileNoseMaterial = new THREE.MeshStandardMaterial({
        color: 0xff5d6c,
        emissive: 0x3a050a,
        roughness: 0.3,
        metalness: 0.2
      });

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.36, 0.48, 6.8, 14),
        missileBodyMaterial
      );
      body.rotation.x = Math.PI / 2;
      missile.add(body);

      const nose = new THREE.Mesh(
        new THREE.ConeGeometry(0.48, 2.2, 14),
        missileNoseMaterial
      );
      nose.rotation.x = -Math.PI / 2;
      nose.position.z = -4.5;
      missile.add(nose);

      const rearSection = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.58, 1.2, 12),
        missileDarkMaterial
      );
      rearSection.rotation.x = Math.PI / 2;
      rearSection.position.z = 4;
      missile.add(rearSection);

      const finGeometry = new THREE.BoxGeometry(0.16, 1.55, 1.7);
      const finTop = new THREE.Mesh(finGeometry, missileDarkMaterial);
      finTop.position.set(0, 0.92, 3.6);
      missile.add(finTop);

      const finBottom = finTop.clone();
      finBottom.position.y = -0.92;
      missile.add(finBottom);

      const finLeft = new THREE.Mesh(finGeometry, missileDarkMaterial);
      finLeft.rotation.z = Math.PI / 2;
      finLeft.position.set(-0.92, 0, 3.6);
      missile.add(finLeft);

      const finRight = finLeft.clone();
      finRight.position.x = 0.92;
      missile.add(finRight);

      const glow = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: createFlameTexture("blue"),
          color: 0x7bd7ff,
          transparent: true,
          opacity: 0.92,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      glow.position.z = 5.4;
      glow.scale.set(2.6, 7.8, 1);
      missile.add(glow);

      const hotCore = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: createFlameTexture("white"),
          color: 0xffffff,
          transparent: true,
          opacity: 0.8,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      hotCore.position.z = 4.9;
      hotCore.scale.set(1.25, 4.2, 1);
      missile.add(hotCore);

      missile.position.set(player.position.x + offsetX, player.position.y - 1.2, -7);
      missile.userData.target = targetEnemy;
      missile.userData.velocity = new THREE.Vector3(offsetX < 0 ? -14 : 14, 6, -155);
      missile.userData.speed = 220;
      missile.userData.turnRate = 4.8;
      missile.userData.life = 4.2;
      missile.userData.damage = 3;
      missile.userData.glow = glow;
      missile.userData.hotCore = hotCore;
      world.add(missile);
      missiles.push(missile);
    }

    function updateMissiles(dt) {
      for (let i = missiles.length - 1; i >= 0; i--) {
        const missile = missiles[i];
        missile.userData.life -= dt;
        const target = missile.userData.target;

        if (target && isMissileTargetAlive(target)) {
          const desiredVelocity = getTargetWorldPosition(target)
            .clone()
            .sub(missile.position)
            .normalize()
            .multiplyScalar(missile.userData.speed);
          missile.userData.velocity.lerp(
            desiredVelocity,
            1 - Math.exp(-dt * missile.userData.turnRate)
          );
        }

        missile.position.addScaledVector(missile.userData.velocity, dt);
        missile.quaternion.setFromUnitVectors(
          new THREE.Vector3(0, 0, -1),
          missile.userData.velocity.clone().normalize()
        );

        const pulse = 0.86 + Math.sin(clock.elapsedTime * 28 + i) * 0.14;
        missile.userData.glow.scale.set(2.6 * pulse, 7.8 * pulse, 1);
        missile.userData.hotCore.scale.set(1.25 * pulse, 4.2 * pulse, 1);

        const bossHit = hitBossWithProjectile(missile.position, missile.userData.damage, true);
        if (bossHit) {
          spawnExplosion(missile.position.clone());
          world.remove(missile);
          missiles.splice(i, 1);
          continue;
        }

        let hitEnemyIndex = -1;
        for (let j = enemies.length - 1; j >= 0; j--) {
          if (missile.position.distanceTo(enemies[j].group.position) < 26) {
            hitEnemyIndex = j;
            break;
          }
        }

        if (hitEnemyIndex >= 0) {
          const enemy = enemies[hitEnemyIndex];
          const directPart = hitEnemyPartWithProjectile(enemy, missile.position, missile.userData.damage, { preferMissileOrder: true });
          applyEnemyAreaDamage(enemy, missile.position, 10, 1, directPart || "");
          spawnExplosion(missile.position.clone());
          world.remove(missile);
          missiles.splice(i, 1);
          continue;
        }

        if (missile.userData.life <= 0 || missile.position.z < -820 || missile.position.z > 80) {
          world.remove(missile);
          missiles.splice(i, 1);
        }
      }
    }

    function getNextWeaponContainerKill(currentKills) {
      return currentKills + THREE.MathUtils.randInt(10, 18);
    }

    function maybeSpawnWeaponContainer() {
      if (!running || player.kills < nextWeaponContainerKill) return;
      if (weaponContainers.length > 0) return;
      spawnWeaponContainer(false);
    }

    function spawnWeaponContainer(forBoss = false) {
      const group = new THREE.Group();
      const cube = new THREE.Mesh(
        new THREE.BoxGeometry(10, 10, 10),
        new THREE.MeshBasicMaterial({
          color: 0x8defff,
          transparent: true,
          opacity: 0.22,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      group.add(cube);

      const lineMat = new THREE.MeshBasicMaterial({
        color: 0xc7fbff,
        transparent: true,
        opacity: 0.62,
        wireframe: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const shell = new THREE.Mesh(new THREE.OctahedronGeometry(7.6, 1), lineMat);
      group.add(shell);

      for (let i = 0; i < 3; i++) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(7.4, 0.12, 6, 6),
          new THREE.MeshBasicMaterial({
            color: i === 1 ? 0x58e6ff : 0xffffff,
            transparent: true,
            opacity: 0.64,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          })
        );
        ring.rotation.set(i === 0 ? Math.PI / 2 : 0, i === 1 ? Math.PI / 2 : 0, i === 2 ? Math.PI / 2 : 0);
        group.add(ring);
      }

      const spawnX = THREE.MathUtils.randFloat(-30, 30);
      const spawnY = THREE.MathUtils.randFloat(42, 92);
      group.position.set(spawnX, spawnY, forBoss ? -150 : -185);
      const container = {
        group,
        baseY: spawnY,
        phase: Math.random() * Math.PI * 2,
        life: forBoss ? 18 : 13,
        collected: false
      };
      world.add(group);
      weaponContainers.push(container);
      spawnWeaponGate(group.position.clone());
      playWeaponContainerSound();
    }

    function spawnWeaponGate(position) {
      const gate = new THREE.Mesh(
        new THREE.TorusGeometry(13, 0.55, 8, 36),
        new THREE.MeshBasicMaterial({
          color: 0x58e6ff,
          transparent: true,
          opacity: 0.88,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      gate.position.copy(position);
      gate.lookAt(camera.position);
      gate.life = 0.55;
      gate.baseScale = 0.35;
      gate.userData.effectType = "weaponGate";
      world.add(gate);
      effects.push(gate);

      for (let i = 0; i < 16; i++) {
        const spark = new THREE.Mesh(
          new THREE.SphereGeometry(0.32 + Math.random() * 0.45, 8, 6),
          new THREE.MeshBasicMaterial({
            color: 0x9af5ff,
            transparent: true,
            opacity: 0.92,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          })
        );
        spark.position.copy(position);
        spark.velocity = new THREE.Vector3((Math.random() - 0.5) * 44, (Math.random() - 0.5) * 36, (Math.random() - 0.5) * 44);
        spark.life = 0.45 + Math.random() * 0.28;
        spark.baseScale = 0.6;
        world.add(spark);
        effects.push(spark);
      }
    }

    function updateWeaponContainers(dt) {
      for (let i = weaponContainers.length - 1; i >= 0; i--) {
        const container = weaponContainers[i];
        container.life -= dt;
        const t = clock.elapsedTime + container.phase;
        container.group.rotation.x += dt * 1.15;
        container.group.rotation.y += dt * 1.65;
        container.group.position.y = container.baseY + Math.sin(t * 2.1) * 3.2;
        container.group.position.z += 26 * dt;

        if (isWeaponContainerTouchingPlayer(container.group.position)) {
          collectWeaponContainer(container, i);
          continue;
        }

        if (container.life <= 0 || container.group.position.z > 35) {
          world.remove(container.group);
          weaponContainers.splice(i, 1);
          nextWeaponContainerKill = getNextWeaponContainerKill(player.kills);
        }
      }
    }

    function isWeaponContainerTouchingPlayer(containerPosition) {
      // 機体中央だけでなく、翼端・機首・胴体後部まで含めた取得しやすい当たり判定。
      const localPoints = [
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0.4, -8.5),
        new THREE.Vector3(0, -0.3, 7.0),
        new THREE.Vector3(-8.8, -0.1, -0.8),
        new THREE.Vector3(8.8, -0.1, -0.8),
        new THREE.Vector3(-3.6, 0.4, 5.7),
        new THREE.Vector3(3.6, 0.4, 5.7)
      ];
      const pickupRadius = 12.8;
      return localPoints.some((point) =>
        player.position.clone().add(point).distanceTo(containerPosition) <= pickupRadius
      );
    }

    function collectWeaponContainer(container, index) {
      if (container.collected) return;
      container.collected = true;
      const position = container.group.position.clone();
      world.remove(container.group);
      weaponContainers.splice(index, 1);
      spawnWeaponAbsorbEffect(position);
      startWeaponRoulette();
      playWeaponAcquireSound();
      nextWeaponContainerKill = getNextWeaponContainerKill(player.kills);
    }

    function spawnWeaponAbsorbEffect(position) {
      for (let i = 0; i < 24; i++) {
        const particle = new THREE.Mesh(
          new THREE.SphereGeometry(0.36 + Math.random() * 0.5, 8, 6),
          new THREE.MeshBasicMaterial({
            color: i % 3 === 0 ? 0xffffff : 0x58e6ff,
            transparent: true,
            opacity: 0.94,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          })
        );
        particle.position.copy(position);
        particle.velocity = player.position.clone().sub(position).normalize().multiplyScalar(65 + Math.random() * 45);
        particle.life = 0.42 + Math.random() * 0.22;
        particle.baseScale = 0.7;
        world.add(particle);
        effects.push(particle);
      }
    }

    function startWeaponRoulette() {
      player.pendingWeapon = pickWeaponType();
      player.weaponRouletteTimer = player.weaponRouletteDuration;
      player.weaponRouletteElapsed = 0;
      showCenterMessage("WEAPON ACQUIRED", "info", 0.75);
    }

    function pickWeaponType() {
      const totalWeight = WEAPON_LOOT_TABLE.reduce((sum, item) => sum + item.weight, 0);
      let roll = Math.random() * totalWeight;
      for (const item of WEAPON_LOOT_TABLE) {
        roll -= item.weight;
        if (roll <= 0) return item.type;
      }
      return WEAPON_TYPES.RAPID;
    }

    function updateWeaponRoulette(dt) {
      if (player.weaponRouletteTimer <= 0) return;
      player.weaponRouletteTimer = Math.max(0, player.weaponRouletteTimer - dt);
      player.weaponRouletteElapsed += dt;
      const rouletteNames = [WEAPON_TYPES.LASER, WEAPON_TYPES.WIDE, WEAPON_TYPES.RAPID, WEAPON_TYPES.PLASMA, WEAPON_TYPES.NUMBER9];
      const index = Math.floor(player.weaponRouletteElapsed * 18) % rouletteNames.length;
      hud.centerAlert.innerHTML = rouletteNames[index];
      hud.centerAlert.className = "visible info";

      if (player.weaponRouletteTimer <= 0) {
        applyMainWeapon(player.pendingWeapon || WEAPON_TYPES.RAPID);
        player.pendingWeapon = null;
      }
    }

    function applyMainWeapon(type) {
      if (type === WEAPON_TYPES.NUMBER9) {
        activateSpecialWeapon(type);
        return;
      }
      const data = WEAPON_DATA[type] || WEAPON_DATA.VULCAN;
      player.mainWeapon = type;
      player.weaponAmmo = Number.isFinite(data.ammo) ? data.ammo : 0;
      player.weaponTimer = 0;
      player.weaponHudFlash = 1.1;
      showCenterMessage(`WEAPON ACQUIRED<br>${data.label}`, "info", 1.15);
    }

    function activateSpecialWeapon(type) {
      const data = WEAPON_DATA[type] || WEAPON_DATA[WEAPON_TYPES.NUMBER9];
      player.specialWeapon = type;
      player.specialWeaponTimer = data.specialDuration || 18;
      player.specialWeaponHudFlash = 1.2;
      player.numberNineReloadTimer = 0;
      player.missileCooldown = 0;
      showCenterMessage(`SPECIAL WEAPON<br>${data.label}`, "info", 1.25);
      playWeaponAcquireSound();
    }

    function updateSpecialWeapon(dt) {
      if (!player.specialWeapon) return;
      player.specialWeaponTimer = Math.max(0, player.specialWeaponTimer - dt);
      if (player.specialWeaponTimer <= 0) {
        player.specialWeapon = null;
        player.numberNineLocks = [];
        hideNumberNineLockIndicators();
        player.specialWeaponHudFlash = 0.8;
        player.numberNineReloadTimer = 0;
        player.missileCooldown = 0;
        hud.numberNineReload.className = "";
        hud.numberNineReloadBar.style.width = "0%";
        showCenterMessage("MISSILE RESTORED", "info", 0.8);
      }
    }

    function hideNumberNineLockIndicators() {
      hud.numberLocks.forEach((marker) => {
        marker.className = "numberLock";
      });
    }

    function updateNumberNineLockIndicators() {
      if (player.specialWeapon !== WEAPON_TYPES.NUMBER9 || !running || player.state !== "FIGHT" || stage.clear) {
        player.numberNineLocks = [];
        hideNumberNineLockIndicators();
        return;
      }

      const locks = getNumberNineLockedTargets();
      hud.numberLocks.forEach((marker, index) => {
        const target = locks[index];
        if (!target || !isMissileTargetAlive(target)) {
          marker.className = "numberLock";
          return;
        }

        const screen = worldToScreen(getTargetWorldPosition(target));
        if (screen.z < -1 || screen.z > 1) {
          marker.className = "numberLock";
          return;
        }

        marker.style.left = `${screen.x}px`;
        marker.style.top = `${screen.y}px`;
        marker.className = "numberLock visible";
      });
    }

    function consumeMainWeaponAmmo() {
      if (player.mainWeapon === WEAPON_TYPES.VULCAN) return;
      player.weaponAmmo = Math.max(0, player.weaponAmmo - 1);
      if (player.weaponAmmo <= 0) {
        player.mainWeapon = WEAPON_TYPES.VULCAN;
        player.weaponAmmo = 0;
        player.weaponHudFlash = 0.6;
        showCenterMessage("VULCAN RESTORED", "info", 0.75);
      }
    }

    function isMissileTargetAlive(target) {
      if (!target) return false;
      if (target.kind === "enemy") return enemies.includes(target.enemy);
      const targetBoss = target.boss || boss;
      if (target.kind === "bossTurret") return targetBoss.active && target.turret.alive;
      if (target.kind === "bossGenerator") return targetBoss.active && !targetBoss.defeated && target.generator.alive;
      if (target.kind === "bossShield") return targetBoss.active && !targetBoss.defeated && targetBoss.turrets.every((turret) => !turret.alive) && (!targetBoss.shieldBroken || targetBoss.shieldHp > 0);
      if (target.kind === "bossCore") return targetBoss.active && !targetBoss.defeated && targetBoss.turrets.every((turret) => !turret.alive) && targetBoss.shieldBroken && targetBoss.shieldHp <= 0;
      return false;
    }

    function playMissileLaunchSound() {
      if (!audio.ready || !audio.context) return;
      if (audio.context.state === "suspended") audio.context.resume();

      const now = audio.context.currentTime;
      if (audio.missileBuffer) {
        const source = audio.context.createBufferSource();
        const sampleGain = audio.context.createGain();
        source.buffer = audio.missileBuffer;
        source.playbackRate.setValueAtTime(1.0, now);
        // 通常ミサイルは副武装らしく、バルカンより前に出る音量で鳴らす。
        sampleGain.gain.setValueAtTime(2.35, now);
        source.connect(sampleGain);
        sampleGain.connect(audio.master);
        source.start(now);
        return;
      }
      loadMissileSample();

      const launchGain = audio.context.createGain();
      launchGain.gain.setValueAtTime(0.0001, now);
      launchGain.gain.exponentialRampToValueAtTime(0.5, now + 0.018);
      launchGain.gain.exponentialRampToValueAtTime(0.22, now + 0.16);
      launchGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.72);
      launchGain.connect(audio.master);

      const hiss = audio.context.createBufferSource();
      hiss.buffer = audio.noiseBuffer;
      const hissFilter = audio.context.createBiquadFilter();
      hissFilter.type = "bandpass";
      hissFilter.frequency.setValueAtTime(1450, now);
      hissFilter.frequency.exponentialRampToValueAtTime(2350, now + 0.22);
      hissFilter.frequency.exponentialRampToValueAtTime(1100, now + 0.7);
      hissFilter.Q.value = 0.72;
      hiss.connect(hissFilter);
      hissFilter.connect(launchGain);
      hiss.start(now);
      hiss.stop(now + 0.74);

      const rumbleGain = audio.context.createGain();
      rumbleGain.gain.setValueAtTime(0.0001, now);
      rumbleGain.gain.exponentialRampToValueAtTime(0.13, now + 0.025);
      rumbleGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.48);
      rumbleGain.connect(audio.master);

      const rumble = audio.context.createOscillator();
      rumble.type = "sawtooth";
      rumble.frequency.setValueAtTime(92, now);
      rumble.frequency.exponentialRampToValueAtTime(54, now + 0.42);
      const rumbleFilter = audio.context.createBiquadFilter();
      rumbleFilter.type = "lowpass";
      rumbleFilter.frequency.setValueAtTime(320, now);
      rumble.connect(rumbleFilter);
      rumbleFilter.connect(rumbleGain);
      rumble.start(now);
      rumble.stop(now + 0.5);
    }

    function updatePlayerTransform(dt) {
      const prevX = player.position.x;
      const prevY = player.position.y;
      const moveResponsiveness = player.rollTimer > 0 ? 13.5 : 8.5;
      player.position.lerp(player.target, 1 - Math.exp(-dt * moveResponsiveness));

      const vx = player.position.x - prevX;
      const vy = player.position.y - prevY;
      const rollProgress = player.rollTimer > 0 ? 1 - player.rollTimer / player.rollDuration : 0;
      const rollSpin = player.rollDirection * rollProgress * Math.PI * 2;
      const rollPitch = player.rollTimer > 0 ? -0.16 * Math.sin(rollProgress * Math.PI) : 0;
      player.group.position.copy(player.position);
      player.group.rotation.set(
        THREE.MathUtils.clamp(-vy * 0.06, -0.32, 0.32) + rollPitch,
        0,
        THREE.MathUtils.clamp(-vx * 0.08, -0.62, 0.62) + rollSpin
      );
    }

    function updateCrosshair() {
      const aimWorld = player.position.clone().add(new THREE.Vector3(0, 2.5, -95));
      const screen = worldToScreen(aimWorld);
      player.aimScreen.x = THREE.MathUtils.clamp(screen.x, 28, window.innerWidth - 28);
      player.aimScreen.y = THREE.MathUtils.clamp(screen.y, 28, window.innerHeight - 28);
      hud.crosshair.style.left = `${player.aimScreen.x}px`;
      hud.crosshair.style.top = `${player.aimScreen.y}px`;
    }

    function initAudio() {
      if (audio.ready) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      audio.context = new AudioContext();
      audio.master = audio.context.createGain();
      audio.master.gain.value = 0.18;
      audio.master.connect(audio.context.destination);
      audio.musicGain = audio.context.createGain();
      audio.musicGain.gain.value = 2.1;
      audio.musicGain.connect(audio.master);
      audio.jetGain = audio.context.createGain();
      audio.jetGain.gain.value = 0;
      audio.jetGain.connect(audio.master);

      const bufferSize = audio.context.sampleRate * 1.2;
      audio.noiseBuffer = audio.context.createBuffer(1, bufferSize, audio.context.sampleRate);
      const data = audio.noiseBuffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      audio.ready = true;
      loadNumberNineSample();
      loadPlasmaSample();
      loadMissileSample();
    }

    function base64ToArrayBuffer(base64) {
      const binary = window.atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }

    function loadNumberNineSample() {
      if (!audio.context || audio.numberNineBuffer || audio.numberNineLoading || NUMBER9_SAMPLE_BASE64.startsWith("__")) return;
      audio.numberNineLoading = true;
      const sampleData = base64ToArrayBuffer(NUMBER9_SAMPLE_BASE64);
      audio.context.decodeAudioData(sampleData)
        .then((buffer) => {
          audio.numberNineBuffer = buffer;
        })
        .catch(() => {
          audio.numberNineBuffer = null;
        });
    }

    function loadPlasmaSample() {
      if (!audio.context || audio.plasmaBuffer || audio.plasmaLoading || PLASMA_SAMPLE_BASE64.startsWith("__")) return;
      audio.plasmaLoading = true;
      const sampleData = base64ToArrayBuffer(PLASMA_SAMPLE_BASE64);
      audio.context.decodeAudioData(sampleData)
        .then((buffer) => {
          audio.plasmaBuffer = buffer;
        })
        .catch(() => {
          audio.plasmaBuffer = null;
        });
    }

    function loadMissileSample() {
      if (!audio.context || audio.missileBuffer || audio.missileLoading || MISSILE_SAMPLE_BASE64.startsWith("__")) return;
      audio.missileLoading = true;
      const sampleData = base64ToArrayBuffer(MISSILE_SAMPLE_BASE64);
      audio.context.decodeAudioData(sampleData)
        .then((buffer) => {
          audio.missileBuffer = buffer;
        })
        .catch(() => {
          audio.missileBuffer = null;
        });
    }

    function startBgm() {
      if (!audio.ready || !audio.context || audio.bgmTimer) return;
      if (audio.context.state === "suspended") audio.context.resume();
      audio.bgmStep = 0;
      scheduleBgmStep();
      audio.bgmTimer = window.setInterval(scheduleBgmStep, 165);
    }

    function stopBgm() {
      if (audio.bgmTimer) {
        window.clearInterval(audio.bgmTimer);
        audio.bgmTimer = null;
      }
    }

    function boostBossBgm() {
      if (!audio.ready || !audio.context || !audio.musicGain) return;
      audio.musicGain.gain.setTargetAtTime(2.65, audio.context.currentTime, 0.35);
      if (audio.bgmTimer) {
        window.clearInterval(audio.bgmTimer);
        audio.bgmTimer = window.setInterval(scheduleBgmStep, 120);
      }
    }

    function resetBgmIntensity() {
      if (!audio.ready || !audio.context || !audio.musicGain) return;
      audio.musicGain.gain.setTargetAtTime(2.1, audio.context.currentTime, 0.25);
      if (audio.bgmTimer) {
        window.clearInterval(audio.bgmTimer);
        audio.bgmTimer = window.setInterval(scheduleBgmStep, 165);
      }
    }

    function startJetSound() {
      if (!audio.ready || !audio.context || audio.jetNoise) return;
      if (audio.context.state === "suspended") audio.context.resume();
      const now = audio.context.currentTime;

      const jetFilter = audio.context.createBiquadFilter();
      jetFilter.type = "lowpass";
      jetFilter.frequency.setValueAtTime(760, now);
      jetFilter.Q.value = 0.35;

      const throatFilter = audio.context.createBiquadFilter();
      throatFilter.type = "bandpass";
      throatFilter.frequency.setValueAtTime(170, now);
      throatFilter.Q.value = 0.75;

      const throatGain = audio.context.createGain();
      throatGain.gain.value = 0.38;

      audio.jetNoise = audio.context.createBufferSource();
      audio.jetNoise.buffer = audio.noiseBuffer;
      audio.jetNoise.loop = true;
      audio.jetNoise.connect(jetFilter);
      jetFilter.connect(audio.jetGain);
      audio.jetNoise.connect(throatFilter);
      throatFilter.connect(throatGain);
      throatGain.connect(audio.jetGain);

      // ノイズ主体の「ゴォー」にするため、発振音は薄い低音の支えだけにする。
      audio.jetOscLow = audio.context.createOscillator();
      audio.jetOscLow.type = "sine";
      audio.jetOscLow.frequency.setValueAtTime(46, now);
      const rumbleGain = audio.context.createGain();
      rumbleGain.gain.value = 0.035;
      audio.jetOscLow.connect(rumbleGain);
      rumbleGain.connect(audio.jetGain);

      audio.jetOscHigh = audio.context.createOscillator();
      audio.jetOscHigh.type = "triangle";
      audio.jetOscHigh.frequency.setValueAtTime(0.55, now);
      const lfoDepth = audio.context.createGain();
      lfoDepth.gain.value = 120;
      audio.jetOscHigh.connect(lfoDepth);
      lfoDepth.connect(jetFilter.frequency);

      audio.jetGain.gain.cancelScheduledValues(now);
      audio.jetGain.gain.setValueAtTime(0.0001, now);
      audio.jetGain.gain.exponentialRampToValueAtTime(0.09, now + 0.8);

      audio.jetNoise.start(now);
      audio.jetOscLow.start(now);
      audio.jetOscHigh.start(now);
    }

    function stopJetSound() {
      if (!audio.context || !audio.jetNoise) return;
      const now = audio.context.currentTime;
      audio.jetGain.gain.cancelScheduledValues(now);
      audio.jetGain.gain.setValueAtTime(Math.max(audio.jetGain.gain.value, 0.0001), now);
      audio.jetGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
      const stopAt = now + 0.4;
      audio.jetNoise.stop(stopAt);
      audio.jetOscLow.stop(stopAt);
      audio.jetOscHigh.stop(stopAt);
      audio.jetNoise = null;
      audio.jetOscLow = null;
      audio.jetOscHigh = null;
    }

    function scheduleBgmStep() {
      if (!audio.ready || !audio.context) return;
      const now = audio.context.currentTime;
      const step = audio.bgmStep % 32;
      const bassNotes = [49, 49, 61.7, 49, 73.4, 61.7, 55, 55, 65.4, 55, 82.4, 65.4, 43.6, 43.6, 55, 65.4];
      const arpNotes = [196, 246.9, 293.7, 392, 329.6, 293.7, 246.9, 196];

      if (step % 4 === 0) playSynthNote(bassNotes[Math.floor(step / 2) % bassNotes.length], 0.2, 0.42, "sawtooth", 420);
      if (step % 2 === 0) playSynthNote(arpNotes[(step / 2) % arpNotes.length], 0.055, 0.16, "triangle", 1800);
      if (step === 0 || step === 16) {
        playSynthNote(98, 0.045, 1.45, "sine", 620);
        playSynthNote(146.8, 0.035, 1.45, "sine", 760);
        playSynthNote(196, 0.03, 1.45, "sine", 900);
      }
      if (boss.active && !boss.defeated && step % 8 === 0) {
        playSynthNote(boss.phase === 3 ? 36.7 : 43.6, boss.phase === 3 ? 0.24 : 0.16, 0.7, "sawtooth", 360);
      }

      audio.bgmStep += 1;
    }

    function playSynthNote(frequency, volume, duration, type, filterFrequency) {
      const now = audio.context.currentTime;
      const osc = audio.context.createOscillator();
      const gain = audio.context.createGain();
      const filter = audio.context.createBiquadFilter();
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, now);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(filterFrequency, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audio.musicGain);
      osc.start(now);
      osc.stop(now + duration + 0.03);
    }

    function playVulcanSound() {
      if (!audio.ready || !audio.context) return;
      if (audio.context.state === "suspended") audio.context.resume();

      const now = audio.context.currentTime;
      const tickGain = audio.context.createGain();
      tickGain.gain.setValueAtTime(0.0001, now);
      tickGain.gain.exponentialRampToValueAtTime(0.85, now + 0.006);
      tickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.055);
      tickGain.connect(audio.master);

      const noise = audio.context.createBufferSource();
      noise.buffer = audio.noiseBuffer;
      const filter = audio.context.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(950, now);
      filter.Q.value = 0.9;
      noise.connect(filter);
      filter.connect(tickGain);
      noise.start(now);
      noise.stop(now + 0.055);

      const motor = audio.context.createOscillator();
      motor.type = "sawtooth";
      motor.frequency.setValueAtTime(82 + Math.random() * 18, now);
      motor.frequency.exponentialRampToValueAtTime(54, now + 0.055);
      motor.connect(tickGain);
      motor.start(now);
      motor.stop(now + 0.055);
    }

    function playWeaponContainerSound() {
      if (!audio.ready || !audio.context) return;
      const now = audio.context.currentTime;
      const gain = audio.context.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.16, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
      gain.connect(audio.master);
      const osc = audio.context.createOscillator();
      osc.type = "sine";
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(980, now + 0.36);
      osc.connect(gain);
      osc.start(now);
      osc.stop(now + 0.44);
    }

    function playWeaponAcquireSound() {
      if (!audio.ready || !audio.context) return;
      const now = audio.context.currentTime;
      [440, 660, 990].forEach((frequency, index) => {
        const gain = audio.context.createGain();
        gain.gain.setValueAtTime(0.0001, now + index * 0.055);
        gain.gain.exponentialRampToValueAtTime(0.12, now + index * 0.055 + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.055 + 0.22);
        gain.connect(audio.master);
        const osc = audio.context.createOscillator();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(frequency, now + index * 0.055);
        osc.connect(gain);
        osc.start(now + index * 0.055);
        osc.stop(now + index * 0.055 + 0.24);
      });

    function playLaserSound() {
      if (!audio.ready || !audio.context) return;
      const now = audio.context.currentTime;
      const gain = audio.context.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.17);
      gain.connect(audio.master);
      const filter = audio.context.createBiquadFilter();

      const osc = audio.context.createOscillator();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(920, now);
      osc.frequency.exponentialRampToValueAtTime(1680, now + 0.13);
      osc.connect(filter);
      filter.connect(gain);
      osc.start(now);
      osc.stop(now + 0.18);
    }

    function playPlasmaSound() {
      if (!audio.ready || !audio.context) return;
      if (audio.context.state === "suspended") audio.context.resume();
      if (audio.plasmaBuffer) {
        const source = audio.context.createBufferSource();
        source.buffer = audio.plasmaBuffer;
        source.playbackRate.setValueAtTime(1.0, audio.context.currentTime);
        source.connect(audio.master);
        source.start(audio.context.currentTime);
        return;
      }
      loadPlasmaSample();

      const now = audio.context.currentTime;
      const gain = audio.context.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.2, now + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
      gain.connect(audio.master);
      const osc = audio.context.createOscillator();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.exponentialRampToValueAtTime(72, now + 0.25);
      osc.connect(gain);
      osc.start(now);
      osc.stop(now + 0.32);
    }

    function playPlasmaImpactSound() {
      if (!audio.ready || !audio.context) return;
      const now = audio.context.currentTime;
      const gain = audio.context.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.34, now + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
      gain.connect(audio.master);

      const filter = audio.context.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(680, now);
      filter.frequency.exponentialRampToValueAtTime(190, now + 0.34);
      filter.Q.setValueAtTime(0.8, now);
      filter.connect(gain);

      const osc = audio.context.createOscillator();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(108, now);
      osc.frequency.exponentialRampToValueAtTime(42, now + 0.34);
      osc.connect(filter);
      osc.start(now);
      osc.stop(now + 0.44);

      const noiseBuffer = audio.context.createBuffer(1, Math.floor(audio.context.sampleRate * 0.28), audio.context.sampleRate);
      const channel = noiseBuffer.getChannelData(0);
      for (let i = 0; i < channel.length; i++) {
        channel[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / channel.length, 2.4);
      }
      const noise = audio.context.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseGain = audio.context.createGain();
      noiseGain.gain.setValueAtTime(0.18, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
      noise.connect(noiseGain);
      noiseGain.connect(filter);
      noise.start(now);
      noise.stop(now + 0.29);
    }

    function playNumberNineSound() {
      if (!audio.ready || !audio.context) return;
      if (audio.context.state === "suspended") audio.context.resume();
      loadNumberNineSample();
    }

    function playNumberNineOrbSound(index = 0) {
      if (!audio.ready || !audio.context) return;
      if (audio.context.state === "suspended") audio.context.resume();
      const now = audio.context.currentTime;

      if (audio.numberNineBuffer) {
        const source = audio.context.createBufferSource();
        source.buffer = audio.numberNineBuffer;
        // 1発ごとに音源ファイルをそのまま再生する。
        source.playbackRate.setValueAtTime(1.0, now);
        source.connect(audio.master);
        source.start(now);
        return;
      }

      const gain = audio.context.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.95, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);
      gain.connect(audio.master);

      const filter = audio.context.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(760 + index * 18, now);
      filter.frequency.exponentialRampToValueAtTime(3000 + index * 40, now + 0.2);
      filter.Q.value = 1.9;

      const osc = audio.context.createOscillator();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(260 + index * 12, now);
      osc.frequency.exponentialRampToValueAtTime(1420 + index * 34, now + 0.2);
      osc.connect(filter);
      filter.connect(gain);
      osc.start(now);
      osc.stop(now + 0.25);
    }

    function playRollSound() {
      if (!audio.ready || !audio.context) return;
      if (audio.context.state === "suspended") audio.context.resume();

      const now = audio.context.currentTime;
      const rollGain = audio.context.createGain();
      rollGain.gain.setValueAtTime(0.0001, now);
      rollGain.gain.exponentialRampToValueAtTime(0.16, now + 0.035);
      rollGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
      rollGain.connect(audio.master);

      const sweep = audio.context.createOscillator();
      sweep.type = "triangle";
      sweep.frequency.setValueAtTime(180, now);
      sweep.frequency.exponentialRampToValueAtTime(760, now + 0.32);
      const filter = audio.context.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(1200, now);
      sweep.connect(filter);
      filter.connect(rollGain);
      sweep.start(now);
      sweep.stop(now + 0.35);

      const wind = audio.context.createBufferSource();
      wind.buffer = audio.noiseBuffer;
      const windFilter = audio.context.createBiquadFilter();
      windFilter.type = "bandpass";
      windFilter.frequency.setValueAtTime(520, now);
      windFilter.frequency.exponentialRampToValueAtTime(980, now + 0.32);
      windFilter.Q.value = 0.9;
      wind.connect(windFilter);
      windFilter.connect(rollGain);
      wind.start(now);
      wind.stop(now + 0.35);
    }

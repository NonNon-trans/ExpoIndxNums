<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>冪乗・添え字変換</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100svh;
      background: linear-gradient(145deg, #0c332c, #166553 54%, #2a7a7b);
      color: white;
      display: grid;
      place-items: center;
    }
    main {
      width: min(100% - 32px, 520px);
      display: grid;
      gap: 16px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 30px;
      letter-spacing: 0;
    }
    textarea, output {
      box-sizing: border-box;
      width: 100%;
      min-height: 132px;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 14px;
      padding: 14px;
      font: inherit;
      font-size: 20px;
      line-height: 1.45;
      color: white;
      background: rgba(4, 18, 16, .38);
      backdrop-filter: blur(18px);
    }
    textarea::placeholder { color: rgba(255,255,255,.55); }
    output {
      display: block;
      overflow-wrap: anywhere;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      min-height: 52px;
      border: 0;
      border-radius: 12px;
      font: inherit;
      font-weight: 700;
      color: #09241f;
      background: #d8fff7;
    }
    button.secondary {
      color: white;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.24);
    }
  </style>
</head>
<body>
  <main>
    <h1>冪乗・添え字変換</h1>
    <textarea id="source" placeholder="変換したい文字列"></textarea>
    <div class="controls">
      <button data-mode="sup">冪乗</button>
      <button class="secondary" data-mode="sub">添え字</button>
    </div>
    <output id="result">結果</output>
    <button id="copy">コピー</button>
  </main>
  <script>
    const superscript = {
      "0":"⁰","1":"¹","2":"²","3":"³","4":"⁴","5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹",
      "+":"⁺","-":"⁻","=":"⁼","(":"⁽",")":"⁾",
      "a":"ᵃ","b":"ᵇ","c":"ᶜ","d":"ᵈ","e":"ᵉ","f":"ᶠ","g":"ᵍ","h":"ʰ","i":"ᶦ","j":"ʲ","k":"ᵏ","l":"ˡ","m":"ᵐ","n":"ⁿ","o":"ᵒ","p":"ᵖ","r":"ʳ","s":"ˢ","t":"ᵗ","u":"ᵘ","v":"ᵛ","w":"ʷ","x":"ˣ","y":"ʸ","z":"ᶻ",
      "A":"ᴬ","B":"ᴮ","D":"ᴰ","E":"ᴱ","G":"ᴳ","H":"ᴴ","I":"ᴵ","J":"ᴶ","K":"ᴷ","L":"ᴸ","M":"ᴹ","N":"ᴺ","O":"ᴼ","P":"ᴾ","R":"ᴿ","T":"ᵀ","U":"ᵁ","V":"ⱽ","W":"ᵂ"
    };
    const subscript = {
      "0":"₀","1":"₁","2":"₂","3":"₃","4":"₄","5":"₅","6":"₆","7":"₇","8":"₈","9":"₉",
      "+":"₊","-":"₋","=":"₌","(":"₍",")":"₎",
      "a":"ₐ","e":"ₑ","h":"ₕ","i":"ᵢ","j":"ⱼ","k":"ₖ","l":"ₗ","m":"ₘ","n":"ₙ","o":"ₒ","p":"ₚ","r":"ᵣ","s":"ₛ","t":"ₜ","u":"ᵤ","v":"ᵥ","x":"ₓ"
    };
    const source = document.getElementById("source");
    const result = document.getElementById("result");
    const convert = mode => {
      const map = mode === "sup" ? superscript : subscript;
      result.textContent = [...source.value].map(ch => map[ch] || ch).join("") || "結果";
    };
    document.querySelectorAll("[data-mode]").forEach(button => {
      button.addEventListener("click", () => convert(button.dataset.mode));
    });
    document.getElementById("copy").addEventListener("click", async () => {
      const text = result.textContent === "結果" ? "" : result.textContent;
      if (!text) return;
      await navigator.clipboard.writeText(text);
      document.getElementById("copy").textContent = "コピー済み";
      setTimeout(() => document.getElementById("copy").textContent = "コピー", 900);
    });
  </script>
</body>
</html>

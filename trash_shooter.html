    function spawnEnemy(type = "minion") {
      const stage = state.stage + 1;
      const edge = Math.floor(rand(0, 4));
      const margin = 70;
      let x = rand(0, state.w);
      let y = rand(0, state.h);
      if (edge === 0) y = -margin;
      if (edge === 1) x = state.w + margin;
      if (edge === 2) y = state.h + margin;
      if (edge === 3) x = -margin;

      const kind = trashKinds[Math.floor(rand(0, trashKinds.length))];
      const bossScale = type === "boss" ? 2.75 : 1;
      const speedLevel = (Math.pow(1.2, state.stage) / 3) * difficultyRate();
      const radius = (18 + rand(0, 13) + stage * 1.3) * bossScale;
      const hpBase = type === "boss" ? 150 : 4;
      const hp = hpBase * stageDefenseMultiplier(type);
      const finalStageSpeed = type === "minion" ? rand(34, 62) + 2.2 : 88;
      const enemy = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Math.random()),
        type,
        kind,
        x,
        y,
        vx: 0,
        vy: 0,
        radius,
        maxHp: hp,
        hp,
        speed: finalStageSpeed * speedLevel * (kind.speedMul || 1),
        move: kind.move || "straight",
        speedLevel,
        wobble: rand(0, Math.PI * 2),
        dashPhase: rand(0, Math.PI * 2),
        freezeTimer: 0,
        iceBreakTimer: 0,
        bossShotTimer: rand(1, 3) / difficultyRate(),
        powerupHitCount: 0,
        nextPowerupHit: Math.floor(rand(3, 7)),
        attack: 8 * stageAttackMultiplier(type),
        value: type === "boss" ? 1800 + stage * 220 : 85 + stage * 15,
      };
      assignWord(enemy);
      state.enemies.push(enemy);
      return enemy;
    }

    function fireBulletTo(target, powerScale = 1) {
      const origin = { x: state.player.x, y: state.player.y };
      const angle = Math.atan2(target.y - origin.y, target.x - origin.x);
      state.bullets.push({
        x: origin.x,
        y: origin.y,
        vx: Math.cos(angle) * 1060,
        vy: Math.sin(angle) * 1060,
        radius: state.pierceTimer > 0 ? 6 : 5,
        life: 1.05,
        power: playerAttackDamage() * powerScale,
        targetId: target.id,
        pierce: state.pierceTimer > 0,
        explosive: state.explosiveTimer > 0,
        bouncesLeft: state.bounceTimer > 0 ? 2 : 0,
        hitIds: [],
      });
      return origin;
    }

    function fireBulletAtAngle(angle, powerScale = 1) {
      const origin = { x: state.player.x, y: state.player.y };
      state.bullets.push({
        x: origin.x,
        y: origin.y,
        vx: Math.cos(angle) * 1060,
        vy: Math.sin(angle) * 1060,
        radius: state.pierceTimer > 0 ? 6 : 5,
        life: 0.92,
        power: playerAttackDamage() * powerScale,
        targetId: null,
        pierce: state.pierceTimer > 0,
        explosive: state.explosiveTimer > 0,
        bouncesLeft: state.bounceTimer > 0 ? 2 : 0,
        hitIds: [],
      });
    }

    const bossBulletChars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ";

    function fireBossBullet(boss) {
      const char = bossBulletChars[Math.floor(rand(0, bossBulletChars.length))];
      const angle = Math.atan2(state.player.y - boss.y, state.player.x - boss.x);
      const speed = 240 + state.stage * 14;
      const normalized = normalizeInput(char);
      const roman = kanaToRoman(normalized);
      const answers = [...new Set([normalized, ...expandRomanVariants(roman)].filter(Boolean))];
      state.enemyBullets.push({
        x: boss.x,
        y: boss.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: 17,
        display: char,
        answers,
        damage: boss.attack * 0.5,
        life: 7,
      });
      playSound("shoot");
    }

    function interceptBossBullet(text) {
      const value = normalizeInput(text);
      if (!value) return { hit: false, pending: false };
      const roman = kanaToRoman(value);
      const typedForBuffer = /^[a-z]+$/.test(value) ? value : roman;
      if (typedForBuffer) state.bossBulletInput = (state.bossBulletInput + typedForBuffer).slice(-8);
      const directForms = [...new Set([value, roman].filter(Boolean))];
      let bullet = state.enemyBullets.find((shot) => {
        const answers = shot.answers || [shot.answer];
        return answers.some((answer) => answer.length > 1 && state.bossBulletInput.endsWith(answer));
      });
      if (!bullet) {
        bullet = state.enemyBullets.find((shot) => {
          const answers = shot.answers || [shot.answer];
          return answers.some((answer) => directForms.includes(answer));
        });
      }
      if (!bullet) {
        const suffixes = [];
        for (let i = 1; i <= state.bossBulletInput.length; i++) suffixes.push(state.bossBulletInput.slice(-i));
        const pending = !!state.bossBulletInput && state.enemyBullets.some((shot) => {
          const answers = shot.answers || [shot.answer];
          return answers.some((answer) => answer.length > 1 && suffixes.some((suffix) => answer.startsWith(suffix)));
        });
        if (!pending && typedForBuffer) state.bossBulletInput = typedForBuffer.slice(-2);
        return { hit: false, pending };
      }
      addFloater(bullet.x, bullet.y, "迎撃", "#47b7c8");
      for (let i = 0; i < 16; i++) addParticle(bullet.x, bullet.y, "#47b7c8", rand(70, 220), rand(0.18, 0.5), rand(2, 6));
      state.enemyBullets = state.enemyBullets.filter((shot) => shot !== bullet);
      state.bossBulletInput = "";
      playSound("hit");
      if (Math.random() < 0.18) {
        spawnPowerup(bullet.x, bullet.y, pickPowerupKind());
      }
      return { hit: true, pending: false };
    }

    function fireTypedShot(enemy) {
      if (!state.running || !enemy) return;
      state.shake = Math.max(state.shake, 4);
      state.targetId = enemy.id;
      playSound("shoot");
      const itemScale = state.explosiveTimer > 0 ? 12 : state.pierceTimer > 0 ? 10 : 1;
      const origin = fireBulletTo(enemy, itemScale);
      if (state.omniTimer > 0) {
        for (let i = 0; i < 8; i++) fireBulletAtAngle((Math.PI * 2 * i) / 8, itemScale);
      }
      for (let i = 0; i < 7; i++) {
        const burstColor = state.explosiveTimer > 0 ? "#ff8f3d" : state.pierceTimer > 0 ? "#f5b84b" : "#e8f5d4";
        addParticle(origin.x, origin.y, burstColor, rand(18, 80), rand(0.12, 0.28));
      }
    }

    function enemyLimitMultiplier() {
      if (state.stage <= 2) return 3;
      if (state.stage <= 5) return 2;
      return 1;
    }

    function dropPowerup(x, y, enemyType) {
      const baseChance = enemyType === "boss" ? 1 : 0.14 + state.stage * 0.012;
      if (Math.random() > baseChance) return;
      spawnPowerup(x, y, pickPowerupKind());
    }

    function dropBossHitPowerup(enemy) {
      if (enemy.type !== "boss") return;
      enemy.powerupHitCount += 1;
      if (enemy.powerupHitCount < enemy.nextPowerupHit) return;
      enemy.powerupHitCount = 0;
      enemy.nextPowerupHit = Math.floor(rand(3, 7));
      spawnPowerup(
        enemy.x + rand(-enemy.radius * 0.45, enemy.radius * 0.45),
        enemy.y + rand(-enemy.radius * 0.45, enemy.radius * 0.45),
        pickPowerupKind(),
      );
    }

    function pickPowerupKind() {
      const roll = Math.random();
      if (roll < 0.18) return "shield";
      if (roll < 0.36) return "pierce";
      if (roll < 0.54) return "explosive";
      if (roll < 0.68) return "omni";
      if (roll < 0.81) return "freeze";
      if (roll < 0.90) return "bounce";
      if (roll < 0.90) return "vacuum";
      if (roll < 0.98) return "thunder";
      return "laser";
    }

    function powerupLabel(kind) {
      if (kind === "shield") return "無敵";
      if (kind === "pierce") return "貫通ショット";
      if (kind === "explosive") return "炸裂弾";
      if (kind === "omni") return "八方位ショット";
      if (kind === "freeze") return "敵停止";
      if (kind === "laser") return "レーザー";
      if (kind === "bounce") return "跳弾ショット";
      if (kind === "vacuum") return "掃除機";
      if (kind === "heal") return "HP回復";
      if (kind === "thunder") return "雷撃";
      return "強化";
    }

    function powerupColor(kind) {
      if (kind === "shield") return "#ffd84d";
      if (kind === "pierce") return "#45a7ff";
      if (kind === "explosive") return "#ff8f3d";
      if (kind === "omni") return "#ff4b4b";
      if (kind === "freeze") return "#f5fbff";
      if (kind === "laser") return "#6defff";
      if (kind === "bounce") return "#ff9d2f";
      if (kind === "vacuum") return "#bac3c2";
      if (kind === "heal") return "#8fd14f";
      if (kind === "thunder") return "#fff176";
      return "#ffcf5f";
    }

    function spawnPowerup(x, y, kind) {
      const radius = state.player.radius * 0.625;
      const powerup = {
        x: clamp(x, radius + 8, state.w - radius - 8),
        y: clamp(y, 90 + radius, state.h - radius - 8),
        kind,
        radius,
        age: 0,
        life: 18,
        spin: rand(0, Math.PI * 2),
      };
      state.powerups.push(powerup);
      addFloater(powerup.x, powerup.y - 26, powerupLabel(kind), powerupColor(kind));
      for (let i = 0; i < 14; i++) addParticle(powerup.x, powerup.y, powerupColor(kind), rand(35, 120), rand(0.18, 0.45), rand(2, 5));
      return powerup;
    }

    function activatePowerup(powerup) {
      playSound("powerup");
      addFloater(state.player.x, state.player.y - 96, `アイテムゲット! ${powerupLabel(powerup.kind)}`, "#ffcf5f");
      if (powerup.kind === "shield") {
        state.invincibleTimer = Math.max(state.invincibleTimer, 10);
        addFloater(powerup.x, powerup.y, "無敵", "#47b7c8");
        showToast("防護コア起動: 10秒間ダメージ無効");
      } else if (powerup.kind === "pierce") {
        state.pierceTimer = Math.max(state.pierceTimer, 10);
        addFloater(powerup.x, powerup.y, "貫通", "#f5b84b");
        showToast("貫通コア起動: 10秒間ショットが敵を貫く");
      } else if (powerup.kind === "explosive") {
        state.explosiveTimer = Math.max(state.explosiveTimer, 10);
        addFloater(powerup.x, powerup.y, "炸裂", "#ff8f3d");
        showToast("炸裂弾起動: 10秒間ショットが爆発する");
      } else if (powerup.kind === "omni") {
        state.omniTimer = Math.max(state.omniTimer, 10);
        addFloater(powerup.x, powerup.y, "八方位", "#d6cdfa");
        showToast("八方位ショット起動: 10秒間全方向へ発射");
      } else if (powerup.kind === "freeze") {
        for (const enemy of state.enemies) {
          enemy.freezeTimer = Math.max(enemy.freezeTimer || 0, 10);
          enemy.iceBreakTimer = 0;
        }
        addFloater(powerup.x, powerup.y, "停止", "#47b7c8");
        showToast("停止コア起動: 10秒間敵が止まる");
      } else if (powerup.kind === "laser") {
        state.laserTimer = Math.max(state.laserTimer, 10);
        state.laserTickTimer = 0;
        addFloater(powerup.x, powerup.y, "レーザー", "#7ee7ff");
        showToast("レーザー起動: 10秒間方向キーで照射方向を操作");
      } else if (powerup.kind === "bounce") {
        state.bounceTimer = Math.max(state.bounceTimer, 10);
        addFloater(powerup.x, powerup.y, "跳弾", "#f0a7ff");
        showToast("跳弾ショット起動: 10秒間最大2回跳ね返る");
      } else if (powerup.kind === "vacuum") {
        state.vacuums = [{
          x: rand(80, state.w - 80),
          y: rand(105, state.h - 95),
          radius: 34,
          pullRadius: 230,
          life: 10,
          spin: 0,
        }];
        addFloater(state.vacuums[0].x, state.vacuums[0].y - 52, "掃除機", "#b8c3b0");
        showToast("掃除機出現: 近くの敵を吸い込む");
      } else if (powerup.kind === "thunder") {
        state.thunderCount += 1;

        addFloater(
          powerup.x,
          powerup.y,
          `雷撃×${state.thunderCount}`,
          "#fff176"
        );

        showToast("雷撃ストック獲得");
      } else if (powerup.kind === "heal") {
        healPlayer(0.1, powerup.x, powerup.y);
        showToast("HPを回復");
      }
      state.shake = Math.max(state.shake, 12);
      const color = powerupColor(powerup.kind);
      for (let i = 0; i < 34; i++) {
        addParticle(powerup.x, powerup.y, color, rand(90, 280), rand(0.35, 0.9), rand(3, 8));
      }
      powerup.life = 0;
    }

    function startThunderChain(x, y) {
      const range = state.player.radius * 12;

      const targets = state.enemies.filter((enemy) => {
        if (enemy.hp <= 0) return false;
        const d = Math.hypot(enemy.x - state.player.x, enemy.y - state.player.y);
        return d <= range + enemy.radius;
      })
      .sort((a, b) => {
        const da = Math.hypot(a.x - state.player.x, a.y - state.player.y);
        const db = Math.hypot(b.x - state.player.x, b.y - state.player.y);
        return da - db;
      });

      if (!targets.length) {
        addFloater(state.player.x, state.player.y - 70, "不発", "#b8c3b0");
        return;
      }

      state.thunderChain = {
        targets,
        index: 0,
        timer: 0,
        interval: 0.15
      };

      state.shake = Math.max(state.shake, 18);
      addFloater(state.player.x, state.player.y - 82, `雷撃 ${targets.length}体`, "#fff176");
      playThunderSound(0);
    }

    function useThunder() {
      if (state.thunderCount <= 0) return;

      state.thunderCount -= 1;

      startThunderChain(
        state.player.x,
        state.player.y
      );
    }

    function addParticle(x, y, color, speed = 90, life = 0.45, size = rand(2, 6)) {
      const a = rand(0, Math.PI * 2);
      state.particles.push({
        x,
        y,
        vx: Math.cos(a) * speed * rand(0.3, 1.2),
        vy: Math.sin(a) * speed * rand(0.3, 1.2),
        color,
        life,
        maxLife: life,
        size,
      });
    }

    function addFloater(x, y, text, color = "#f5f7ef") {
      state.floaters.push({ x, y, text, color, life: 0.75, maxLife: 0.75 });
    }

    function updatePowerups(dt) {
      for (const powerup of state.powerups) {
        powerup.age += dt;
        powerup.life -= dt;
        powerup.spin += dt * 1.8;
        const dx = state.player.x - powerup.x;
        const dy = state.player.y - powerup.y;
        const distance = Math.hypot(dx, dy) || 1;
        const speed = Math.min(980, 28 * (Math.exp(powerup.age * 2.35) - 1));
        const step = Math.min(distance, speed * dt);
        powerup.x += (dx / distance) * step;
        powerup.y += (dy / distance) * step;
        if (distance <= powerup.radius + state.player.radius) {
          activatePowerup(powerup);
          powerup.life = 0;
        }
      }
      state.powerups = state.powerups.filter((powerup) => powerup.life > 0);
    }

    function updateThunderChain(dt) {
      if (!state.thunderChain) return;

      const chain = state.thunderChain;
      chain.timer -= dt;

      if (chain.timer > 0) return;

      while (chain.index < chain.targets.length) {
        const enemy = chain.targets[chain.index];
        chain.index += 1;

        if (!state.enemies.includes(enemy)) continue;
        if (enemy.hp <= 0) continue;

        state.lightningEffects.push({
          fromX: state.player.x,
          fromY: state.player.y,
          toX: enemy.x,
          toY: enemy.y,
          life: 0.20,
          maxLife: 0.20
        });

        hitEnemy(enemy, enemy.hp + 9999, {
          reassign: false,
          quiet: true
        });

        state.enemies = state.enemies.filter((target) => target.hp > 0);

        state.shake = Math.max(state.shake, 14);
        addFloater(enemy.x, enemy.y - enemy.radius, "雷撃", "#fff176");

        for (let i = 0; i < 22; i += 1) {
          addParticle(enemy.x, enemy.y, i % 2 ? "#fff176" : "#ffffff", rand(120, 360), rand(0.22, 0.55), rand(3, 8));
        }

        playThunderSound(chain.index);

        chain.timer = chain.interval;
        return;
      }

      state.thunderChain = null;
    }

    function updateLightningEffects(dt) {
      for (const fx of state.lightningEffects) {
        fx.life -= dt;
      }
      state.lightningEffects = state.lightningEffects.filter((fx) => fx.life > 0);
    }

    function shouldAdvanceForKill(enemy) {
      return (state.phase === "waves" && enemy.type === "minion")
        || (state.phase === "boss" && enemy.type === "boss");
    }

    function hitEnemy(enemy, damage, options = {}) {
      const reassign = options.reassign !== false;
      const quiet = options.quiet === true;
      const awardExp = options.awardExp !== false;
      enemy.hp -= damage;
      state.clean = clamp(state.clean + damage * 0.025, 0, 100);
      if (!quiet) addFloater(enemy.x, enemy.y - enemy.radius, `${Math.round(damage)}`, "#e8f5d4");
      for (let i = 0; i < (quiet ? 3 : 8); i++) addParticle(enemy.x, enemy.y, enemy.kind.color, rand(40, 160), rand(0.18, 0.55));
      if (enemy.hp <= 0) {
        state.totalKills += 1;
        state.killsSinceLevel += 1;
        if (shouldAdvanceForKill(enemy)) state.phaseKills += 1;
        state.score += Math.round(enemy.value * (1 + Math.min(0.75, state.combo * 0.035)));
        state.clean = clamp(state.clean + (enemy.type === "minion" ? 4 : 35), 0, 100);
        state.shake = Math.max(state.shake, enemy.type === "minion" ? 7 : 16);
        addFloater(enemy.x, enemy.y, enemy.type === "minion" ? "浄化" : "大浄化", enemy.type === "boss" ? "#f5b84b" : "#8fd14f");
        for (let i = 0; i < 28; i++) addParticle(enemy.x, enemy.y, i % 2 ? enemy.kind.color : "#f5f7ef", rand(70, 260), rand(0.35, 0.85), rand(3, 9));
        dropPowerup(enemy.x + rand(-18, 18), enemy.y + rand(-18, 18), enemy.type);
        if (enemy.type === "minion" && Math.random() < 0.18) {
          spawnPowerup(enemy.x + rand(-16, 16), enemy.y + rand(-16, 16), "heal");
        }
        if (awardExp) awardEnemyKillExp(enemy);
        processLevelUps();
        return true;
      }
      dropBossHitPowerup(enemy);
      if (reassign) assignWord(enemy);
      return false;
    }

    function explodeBulletAt(center, sourceDamage, sourceId) {
      playSound("explode");
      state.shake = Math.max(state.shake, 16);
      const radius = center.radius * 4;
      addFloater(center.x, center.y - center.radius, "炸裂", "#ff8f3d");
      for (let i = 0; i < 42; i++) addParticle(center.x, center.y, i % 2 ? "#ff8f3d" : "#f5b84b", rand(90, 340), rand(0.25, 0.75), rand(3, 10));
      for (const enemy of [...state.enemies]) {
        if (enemy.id === sourceId) continue;
        const distance = dist(center, enemy);
        if (distance > radius + enemy.radius) continue;
        const falloff = clamp(1 - distance / (radius + enemy.radius), 0.25, 0.9);
        const killed = hitEnemy(enemy, sourceDamage * 0.62 * falloff);
        if (killed) state.enemies = state.enemies.filter((target) => target !== enemy);
      }
    }

    function retargetBounceBullet(bullet, fromEnemy) {
      if ((bullet.bouncesLeft || 0) <= 0) return false;
      let next = null;
      let best = Infinity;
      for (const enemy of state.enemies) {
        if (enemy === fromEnemy || bullet.hitIds.includes(enemy.id) || enemy.hp <= 0) continue;
        const distance = dist(fromEnemy, enemy);
        if (distance < best) {
          best = distance;
          next = enemy;
        }
      }
      if (!next) return false;
      const speed = Math.hypot(bullet.vx, bullet.vy) || 1060;
      const angle = Math.atan2(next.y - bullet.y, next.x - bullet.x);
      bullet.vx = Math.cos(angle) * speed;
      bullet.vy = Math.sin(angle) * speed;
      bullet.targetId = next.id;
      bullet.bouncesLeft -= 1;
      bullet.life = Math.max(bullet.life, 0.55);
      addFloater(bullet.x, bullet.y - 10, "跳弾", "#f0a7ff");
      playSoundAt("pierceHit", 1.25);
      for (let i = 0; i < 12; i++) addParticle(bullet.x, bullet.y, "#f0a7ff", rand(50, 180), rand(0.16, 0.4), rand(2, 5));
      return true;
    }

    function vacuumEnemy(enemy, vacuum) {
      state.totalKills += 1;
      state.killsSinceLevel += 1;
      if (shouldAdvanceForKill(enemy)) state.phaseKills += 1;
      state.score += Math.round(enemy.value * 0.8);
      state.clean = clamp(state.clean + 3, 0, 100);
      awardEnemyKillExp(enemy, 1.05);
      addFloater(vacuum.x, vacuum.y - 42, "吸引", "#b8c3b0");
      playSound("heal");
      for (let i = 0; i < 20; i++) addParticle(vacuum.x, vacuum.y, i % 2 ? enemy.kind.color : "#b8c3b0", rand(60, 220), rand(0.2, 0.65), rand(2, 7));
      state.enemies = state.enemies.filter((target) => target !== enemy);
    }

    function updateVacuums(dt) {
      for (const vacuum of state.vacuums) {
        vacuum.life -= dt;
        vacuum.spin += dt * 7;
        for (const enemy of [...state.enemies]) {
          if (enemy.type !== "minion") continue;
          const dx = vacuum.x - enemy.x;
          const dy = vacuum.y - enemy.y;
          const distance = Math.hypot(dx, dy) || 1;
          if (distance > vacuum.pullRadius) continue;
          const strength = clamp(1 - distance / vacuum.pullRadius, 0.18, 1);
          enemy.x += (dx / distance) * (170 + 280 * strength) * dt;
          enemy.y += (dy / distance) * (170 + 280 * strength) * dt;
          enemy.radius = Math.max(6, enemy.radius - 8 * strength * dt);
          if (distance < vacuum.radius + enemy.radius * 0.42) vacuumEnemy(enemy, vacuum);
        }
      }
      state.vacuums = state.vacuums.filter((vacuum) => vacuum.life > 0);
    }

    function crackIce(enemy) {
      enemy.iceBreakTimer = 0.42;
      playSound("pierceHit");
      for (let i = 0; i < 24; i++) addParticle(enemy.x, enemy.y, i % 2 ? "#bff3ff" : "#f5fbff", rand(80, 260), rand(0.28, 0.7), rand(3, 8));
      addFloater(enemy.x, enemy.y - enemy.radius, "氷解", "#bff3ff");
    }

    function updateLaser(dt) {
      if (state.laserTimer <= 0) return;
      const angle = normalizeAngle(state.laserAngle);
      let keyX = 0;
      let keyY = 0;
      if (state.keys.has("ArrowRight")) keyX += 1;
      if (state.keys.has("ArrowLeft")) keyX -= 1;
      if (state.keys.has("ArrowUp")) keyY += 1;
      if (state.keys.has("ArrowDown")) keyY -= 1;
      const tangentX = -Math.sin(angle);
      const tangentY = Math.cos(angle);
      const rotation = clamp(keyX * tangentX + keyY * tangentY, -1, 1);
      if (rotation) state.laserAngle = normalizeAngle(state.laserAngle + rotation * 3.4 * dt);
      state.laserTickTimer -= dt;
      if (state.laserTickTimer > 0) return;
      state.laserTickTimer = 0.11;
      const start = { x: state.player.x, y: state.player.y };
      const end = laserEndPoint();
      const beamRadius = 20;
      for (const enemy of [...state.enemies]) {
        if (distanceToSegment(enemy, start, end) > enemy.radius + beamRadius) continue;
        const damage = playerAttackDamage() * (enemy.type === "boss" ? 0.22 : 0.34);
        const killed = hitEnemy(enemy, damage, { reassign: false, quiet: true });
        playSoundAt("hit", 1.35);
        if (killed) {
          state.enemies = state.enemies.filter((target) => target !== enemy);
        }
      }
    }

    function startBossPrep() {
      state.phase = "bossPrep";
      state.phaseKills = 0;
      state.phaseGoal = 6;
      state.bossPrepTimer = 6;
      state.spawnTimer = 0;
      showToast("ボス接近: 敵が押し寄せる");
    }

    function summonBossByAbsorbing() {
      const cleared = state.enemies.filter((enemy) => enemy.type !== "boss");
      for (const enemy of cleared) {
        for (let i = 0; i < 18; i++) addParticle(enemy.x, enemy.y, i % 2 ? enemy.kind.color : "#f5b84b", rand(100, 300), rand(0.25, 0.85), rand(3, 9));
      }
      state.enemies.length = 0;
      state.input = "";
      state.typingStartTime = 0;
      state.bossBulletInput = "";
      state.bossIntroTimer = 2.1;
      playSound("explode");
      const boss = spawnEnemy("boss");
      boss.maxHp += cleared.length * (12 + state.stage * 4) * stageDefenseMultiplier("boss");
      boss.hp = boss.maxHp;
      boss.radius += Math.min(70, cleared.length * 3.2);
      boss.value += cleared.length * 90;
      state.shake = Math.max(state.shake, 20);
      startBgm("boss");
      addFloater(boss.x, boss.y - boss.radius, "大ボス出現", "#f5b84b");
      showToast("敵全滅: 大ボス出現");
    }

    function findTypedEnemy() {
      const typed = normalizeInput(state.input);
      return state.enemies.find((enemy) => enemy.wordAnswers.some((answer) => answer === typed));
    }

    function hasInputPrefix() {
      const typed = normalizeInput(state.input);
      return typed === "" || state.enemies.some((enemy) => enemy.wordAnswers.some((answer) => answer.startsWith(typed)));
    }

    function registerTypingMiss() {
      state.combo = 0;
      state.typoStreak += 1;
      state.totalMistypes += 1;
      playSound("typeMiss");
      if (state.typoStreak >= 3 && state.enemies.length >= 12 && state.rescueCooldown <= 0 && !state.rescue) {
        startRescueEvent();
      }
    }

    function recordTypedChars(text) {
      if (!text) return;
      state.totalTypedChars += Array.from(text).length;
    }

    function handleTypingText(text) {
      if (state.rescue) {
        handleRescueTyping(text);
        return;
      }
      if (!state.running || state.bossIntroTimer > 0 || !text) return;
      const bossIntercept = interceptBossBullet(text);
      const value = normalizeInput(text);
      if (!/^[a-zぁ-んー一-龠々-]+$/.test(value)) return;
      if (!state.input && hasInputPrefixFor(value)) state.typingStartTime = state.time;
      const previousInput = state.input;
      state.input = (state.input + value).slice(0, 48);
      const enemy = findTypedEnemy();
      if (enemy) {
        playSound("typeGood");
        const elapsed = Math.max(0.12, state.time - state.typingStartTime);
        state.input = "";
        state.typingStartTime = 0;
        state.typoStreak = 0;
        state.combo += 1;
        state.maxCombo = Math.max(state.maxCombo, state.combo);
        if (state.combo >= 2) addFloater(state.player.x, state.player.y - 76, `${state.combo}コンボ!`, "#f5b84b");
        fireTypedShot(enemy);
        gainTypingExp(enemy, elapsed);
        return;
      }
      if (hasInputPrefix() || bossIntercept.hit || bossIntercept.pending) playSound("typeGood");
      if (!hasInputPrefix()) {
        if (bossIntercept.hit || bossIntercept.pending) {
          state.input = previousInput;
          if (!state.input) state.typingStartTime = 0;
          return;
        }
        if (state.difficultyKey === "easy") {
          state.input = previousInput;
          if (!state.input) state.typingStartTime = 0;
          registerTypingMiss();
          return;
        }
        state.combo = 0;
        state.input = value;
        state.typingStartTime = hasInputPrefix() ? state.time : 0;
        if (!hasInputPrefix()) {
          state.input = "";
          state.typingStartTime = 0;
          registerTypingMiss();
        }
      }
    }

    function hasInputPrefixFor(text) {
      const typed = normalizeInput(text);
      return typed === "" || state.enemies.some((enemy) => enemy.wordAnswers.some((answer) => answer.startsWith(typed)));
    }

    function submitTypingText(text) {
      if (!text) return;
      const typingActive = state.running || state.rescue?.mode === "active";
      if (!typingActive) return;
      if (state.bossIntroTimer > 0) return;
      const now = performance.now();
      const mayDuplicate = /[^\x00-\x7F]/.test(text);
      if (mayDuplicate && text === state.lastTextInput && now - state.lastTextInputAt < 90) return;
      state.lastTextInput = text;
      state.lastTextInputAt = now;
      recordTypedChars(text);
      if (state.rescue) handleRescueTyping(text);
      else handleTypingText(text);
    }

    function startRescueEvent() {
      const prompt = rescuePrompts[Math.floor(rand(0, rescuePrompts.length))];
      state.rescue = {
        mode: "intro",
        prompt,
        answers: [...new Set([...rescueAnswerVariants(prompt.reading), normalizeRescueText(prompt.text)])],
        enemyBackup: state.enemies.map((enemy) => ({ ...enemy, kind: { ...enemy.kind }, wordAnswers: [...enemy.wordAnswers] })),
        input: "",
        misses: 0,
        missLimit: 5,
        introTimer: 30,
        timeLeft: 60,
        button: null,
      };
      state.running = false;
      state.input = "";
      state.typingStartTime = 0;
      state.typoStreak = 0;
      stopBgm();
      startRescueBgm();
      playSound("damage");
      showToast("起死回生タイピング発動");
    }

    function beginRescueChallenge() {
      if (!state.rescue || state.rescue.mode === "active") return;
      state.rescue.mode = "active";
      state.rescue.input = "";
      state.rescue.misses = 0;
      state.rescue.timeLeft = 60;
      playSound("shoot");
    }

    function handleRescueTyping(text) {
      if (!state.rescue || state.rescue.mode !== "active" || !text) return;
      const value = normalizeRescueText(text);
      if (!/^[a-zぁ-んー一-龠々。、-]+$/.test(value)) return;
      const next = state.rescue.input + value;
      const status = rescueMatchStatus(next);
      if (status.prefix || status.exact) {
        playSound("typeGood");
        state.rescue.input = next;
        if (status.exact) completeRescueEvent();
        return;
      }
      state.rescue.misses += 1;
      state.totalMistypes += 1;
      playSound("typeMiss");
      playSound("damage");
      if (state.rescue.misses >= state.rescue.missLimit) failRescueEvent();
    }

    function completeRescueEvent() {
      if (!state.rescue) return;
      playSound("rescueClear");
      playSound("explode");
      for (const enemy of state.enemies) {
        for (let i = 0; i < 24; i++) addParticle(enemy.x, enemy.y, i % 2 ? enemy.kind.color : "#f5b84b", rand(100, 340), rand(0.4, 1), rand(4, 11));
      }
      const defeated = state.enemies.length;
      state.totalKills += defeated;
      const expGain = state.enemies.reduce((sum, enemy) => sum + enemyExpValue(enemy, 1.55), 0);
      state.enemies.length = 0;
      state.bullets.length = 0;
      state.enemyBullets.length = 0;
      state.phaseKills += defeated;
      state.score += defeated * 180;
      state.killsSinceLevel += defeated;
      state.exp += expGain;
      addFloater(state.player.x, state.player.y - 78, `EXP +${expGain}`, "#f5b84b");
      healPlayer(0.5);
      processLevelUps();
      state.rescue = null;
      state.rescueCooldown = 5;
      state.running = true;
      if (state.phase !== "boss") startBossPrep();
      state.last = performance.now();
      stopRescueBgm();
      startBgm(state.phase === "boss" ? "boss" : "normal");
      showToast("起死回生成功: 敵全滅");
    }

    function failRescueEvent() {
      if (!state.rescue) return;
      if (state.enemies.length === 0 && state.rescue.enemyBackup?.length) {
        state.enemies = state.rescue.enemyBackup.map((enemy) => ({ ...enemy, kind: { ...enemy.kind }, wordAnswers: [...enemy.wordAnswers] }));
      }
      playSound("fail");
      state.rescue = null;
      state.rescueCooldown = 5;
      state.running = true;
      state.last = performance.now();
      stopRescueBgm();
      startBgm(state.phase === "boss" ? "boss" : "normal");
      showToast("起死回生失敗");
    }

    function advancePhase() {
      if (state.phase === "waves" && state.phaseKills >= state.phaseGoal) {
        startBossPrep();
      } else if (state.phase === "bossPrep" && state.bossPrepTimer <= 0) {
        state.phase = "boss";
        state.phaseKills = 0;
        state.phaseGoal = 1;
        summonBossByAbsorbing();
      } else if (state.phase === "boss" && state.phaseKills >= 1) {
        state.completed = Math.max(state.completed, state.stage + 1);
        if (state.stage >= 9) {
          endGame(true);
        } else {
          showStageClear();
        }
      }
    }

    function update(dt) {
      state.time += dt;
      state.pierceTimer = Math.max(0, state.pierceTimer - dt);
      state.explosiveTimer = Math.max(0, state.explosiveTimer - dt);
      state.omniTimer = Math.max(0, state.omniTimer - dt);
      state.laserTimer = Math.max(0, state.laserTimer - dt);
      state.bounceTimer = Math.max(0, state.bounceTimer - dt);
      state.attackBoostTimer = Math.max(0, state.attackBoostTimer - dt);
      if (state.attackBoostTimer <= 0) state.attackBoostMultiplier = 1;
      state.faceTimer = Math.max(0, state.faceTimer - dt);
      state.invincibleTimer = Math.max(0, state.invincibleTimer - dt);
      state.bossIntroTimer = Math.max(0, state.bossIntroTimer - dt);
      state.rescueCooldown = Math.max(0, state.rescueCooldown - dt);
      state.damageSoundTimer = Math.max(0, state.damageSoundTimer - dt);
      state.shake = Math.max(0, state.shake - dt * 32);

      let moveX = 0;
      let moveY = 0;
      if (state.keys.has("ArrowLeft")) moveX -= 1;
      if (state.keys.has("ArrowRight")) moveX += 1;
      if (state.keys.has("ArrowUp")) moveY -= 1;
      if (state.keys.has("ArrowDown")) moveY += 1;
      if (state.laserTimer > 0) {
        updateLaser(dt);
      } else if (moveX || moveY) {
        const len = Math.hypot(moveX, moveY) || 1;
        state.player.x = clamp(state.player.x + (moveX / len) * state.player.speed * dt, 28, state.w - 28);
        state.player.y = clamp(state.player.y + (moveY / len) * state.player.speed * dt, 88, state.h - 30);
      }

      if (state.phase === "waves") {
        state.spawnTimer -= dt;
        const spawnEvery = Math.max(0.16, (1.05 - state.stage * 0.065 - state.phaseKills * 0.007) / difficultyRate());
        const enemyLimit = Math.max(1, Math.ceil((5 + state.stage) * enemyLimitMultiplier() * difficultyRate()));
        if (state.phaseKills < state.phaseGoal && state.enemies.length === 0) {
          spawnEnemy("minion");
          state.spawnTimer = spawnEvery;
        } else if (state.spawnTimer <= 0 && state.phaseKills < state.phaseGoal && state.enemies.length < enemyLimit) {
          spawnEnemy("minion");
          state.spawnTimer = spawnEvery;
        }
      } else if (state.phase === "bossPrep") {
        state.bossPrepTimer = Math.max(0, state.bossPrepTimer - dt);
        state.phaseKills = state.phaseGoal - state.bossPrepTimer;
        state.spawnTimer -= dt;
        const enemyLimit = Math.max(4, Math.ceil((6 + state.stage) * enemyLimitMultiplier() * difficultyRate()));
        if (state.spawnTimer <= 0 && state.enemies.length < enemyLimit) {
          spawnEnemy("minion");
          state.spawnTimer = Math.max(0.1, (0.52 - state.stage * 0.025) / difficultyRate());
        }
      }

      for (const enemy of state.enemies) {
        const frozen = (enemy.freezeTimer || 0) > 0;
        if (frozen) {
          enemy.freezeTimer = Math.max(0, enemy.freezeTimer - dt);
          enemy.vx = 0;
          enemy.vy = 0;
          if (enemy.freezeTimer <= 0) crackIce(enemy);
        } else {
          enemy.iceBreakTimer = Math.max(0, (enemy.iceBreakTimer || 0) - dt);
          const bossCharge = enemy.type === "boss" ? 1 + Math.max(0, Math.sin(state.time * 1.25 + enemy.dashPhase)) * 1.15 : 1;
          const target = enemy.type === "boss"
            ? {
                x: clamp(state.player.x + Math.sin(state.time * 2.2 + enemy.dashPhase) * state.w * 0.18, 60, state.w - 60),
                y: clamp(state.player.y + Math.cos(state.time * 1.7 + enemy.dashPhase) * state.h * 0.12, 90, state.h - 50),
              }
            : state.player;
          const angle = Math.atan2(target.y - enemy.y, target.x - enemy.x);
          enemy.wobble += dt * (2.2 + state.stage * 0.08);
          const drift = enemy.speedLevel || 1;

          if (enemy.type !== "boss") {
            const move = enemy.move || "straight";

            if (move === "straight") {
              enemy.vx = Math.cos(angle) * enemy.speed;
              enemy.vy = Math.sin(angle) * enemy.speed;
            } else if (move === "zigzag") {
              enemy.vx = Math.cos(angle) * enemy.speed + Math.cos(enemy.wobble * 4.2) * 70 * drift;
              enemy.vy = Math.sin(angle) * enemy.speed + Math.sin(enemy.wobble * 2.4) * 28 * drift;
            } else if (move === "float") {
              enemy.vx = Math.cos(angle) * enemy.speed * 0.85 + Math.cos(enemy.wobble * 1.4) * 90 * drift;
              enemy.vy = Math.sin(angle) * enemy.speed * 0.85 + Math.sin(enemy.wobble * 2.1) * 55 * drift;
            } else if (move === "heavy") {
              enemy.vx = Math.cos(angle) * enemy.speed * 0.72;
              enemy.vy = Math.sin(angle) * enemy.speed * 0.72;
            } else if (move === "rush") {
              const pulse = 0.65 + Math.max(0, Math.sin(enemy.wobble * 3.2)) * 1.25;
              enemy.vx = Math.cos(angle) * enemy.speed * pulse;
              enemy.vy = Math.sin(angle) * enemy.speed * pulse;
            } else if (move === "orbit") {
              const side = angle + Math.PI / 2;
              enemy.vx = Math.cos(angle) * enemy.speed * 0.75 + Math.cos(side) * 85 * Math.sin(enemy.wobble * 2.6);
              enemy.vy = Math.sin(angle) * enemy.speed * 0.75 + Math.sin(side) * 85 * Math.sin(enemy.wobble * 2.6);
            }

            enemy.x += enemy.vx * dt;
            enemy.y += enemy.vy * dt;
          } else {
            enemy.vx = Math.cos(angle) * enemy.speed * bossCharge + Math.cos(enemy.wobble * 2.3) * 22 * drift;
            enemy.vy = Math.sin(angle) * enemy.speed * bossCharge + Math.sin(enemy.wobble * 1.7) * 18 * drift;
            enemy.x += enemy.vx * dt;
            enemy.y += enemy.vy * dt;
            enemy.x = clamp(enemy.x, enemy.radius, state.w - enemy.radius);
            enemy.y = clamp(enemy.y, 80, state.h - enemy.radius);
          }
        }
        if (dist(enemy, state.player) < enemy.radius + state.player.radius && enemy.type !== "boss") {
          applyPlayerDamage(enemy.attack, state.player.x, state.player.y - 45);
          enemy.hp = 0;
          state.combo = 0;
          state.shake = Math.max(state.shake, 13);
        } else if (dist(enemy, state.player) < enemy.radius + state.player.radius && enemy.type === "boss" && state.bossIntroTimer <= 0) {
          if (state.time % 0.5 < dt) applyPlayerDamage(enemy.attack * 0.5, state.player.x, state.player.y - 45);
          state.shake = Math.max(state.shake, 8);
        }
        if (!frozen && enemy.type === "boss" && state.bossIntroTimer <= 0) {
          enemy.bossShotTimer -= dt;
          if (enemy.bossShotTimer <= 0) {
            fireBossBullet(enemy);
            enemy.bossShotTimer = rand(1, 3) / difficultyRate();
          }
        }
      }
      updateVacuums(dt);
      state.enemies = state.enemies.filter((enemy) => enemy.hp > 0);

      for (const shot of state.enemyBullets) {
        shot.x += shot.vx * dt;
        shot.y += shot.vy * dt;
        shot.life -= dt;
        if (dist(shot, state.player) < shot.radius + state.player.radius) {
          applyPlayerDamage(shot.damage, state.player.x, state.player.y - 45);
          shot.life = 0;
          state.shake = Math.max(state.shake, 10);
        }
      }
      state.enemyBullets = state.enemyBullets.filter((shot) => shot.life > 0 && shot.x > -60 && shot.x < state.w + 60 && shot.y > -80 && shot.y < state.h + 80);
      updatePowerups(dt);
      updateThunderChain(dt);
      updateLightningEffects(dt);

      for (const bullet of state.bullets) {
        const lockedEnemy = state.enemies.find((enemy) => enemy.id === bullet.targetId);
        if (lockedEnemy) {
          const angle = Math.atan2(lockedEnemy.y - bullet.y, lockedEnemy.x - bullet.x);
          const speed = Math.hypot(bullet.vx, bullet.vy) || 1060;
          bullet.vx = Math.cos(angle) * speed;
          bullet.vy = Math.sin(angle) * speed;
        }
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
        bullet.life -= dt;
        for (const enemy of state.enemies) {
          if (dist(bullet, enemy) < bullet.radius + enemy.radius) {
            if (bullet.hitIds.includes(enemy.id)) continue;
            bullet.hitIds.push(enemy.id);
            playSoundAt(bullet.pierce ? "pierceHit" : "hit", comboHitPitch());
            const bossPierce = bullet.pierce && enemy.type === "boss";
            const killed = hitEnemy(enemy, bullet.power);
            if (bullet.explosive) explodeBulletAt(enemy, bullet.power, enemy.id);
            if (killed) state.enemies = state.enemies.filter((target) => target !== enemy);
            const canBounce = !bullet.pierce || bossPierce;
            if (canBounce && retargetBounceBullet(bullet, enemy)) break;
            if (canBounce) bullet.life = 0;
            if (canBounce) break;
          }
        }
      }
      state.bullets = state.bullets.filter((bullet) => bullet.life > 0 && bullet.x > -50 && bullet.x < state.w + 50 && bullet.y > -70 && bullet.y < state.h + 70);

      for (const p of state.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 40 * dt;
        p.life -= dt;
      }
      state.particles = state.particles.filter((p) => p.life > 0);

      for (const f of state.floaters) {
        f.y -= 46 * dt;
        f.life -= dt;
      }
      state.floaters = state.floaters.filter((f) => f.life > 0);

      advancePhase();
      if (state.health <= 0) endGame(false);
      updateUi();
    }

    function updateRescue(dt) {
      if (!state.rescue) return;
      if (state.rescue.mode === "intro") {
        state.rescue.introTimer -= dt;
        if (state.rescue.introTimer <= 0) beginRescueChallenge();
        return;
      }
      state.rescue.timeLeft -= dt;
      if (state.rescue.timeLeft <= 0) failRescueEvent();
    }

    function updateUi() {
      canvas.style.cursor = state.rescue?.mode === "intro" || !state.running ? "default" : "none";
      updatePauseButton();
      ui.stageName.textContent = `Stage ${state.stage + 1}: ${stageNames[state.stage]} / ${difficulties[state.difficultyKey]?.label || "ノーマル"}`;
      ui.phaseName.textContent = phaseLabels[state.phase] || "";
      ui.healthBar.style.width = `${clamp((state.health / state.maxHealth) * 100, 0, 100)}%`;
      ui.cleanBar.style.width = `${clamp(state.clean, 0, 100)}%`;
      const goal = Math.max(1, state.phaseGoal);
      ui.progressBar.style.width = `${clamp((state.phaseKills / goal) * 100, 0, 100)}%`;
      ui.score.textContent = state.score.toLocaleString();
      ui.ammo.textContent = state.input || "-";
      ui.combo.textContent = state.combo;
      ui.enemyCount.textContent = state.enemies.length;
      ui.level.textContent = state.playerLevel;
      ui.exp.textContent = `${Math.floor((state.exp / state.nextExp) * 100)}%`;
      if (state.explosiveTimer > 0) {
        ui.powerStatus.textContent = `炸裂 ${Math.ceil(state.explosiveTimer)}`;
      } else if (state.invincibleTimer > 0) {
        ui.powerStatus.textContent = `無敵 ${Math.ceil(state.invincibleTimer)}`;
      } else if (state.pierceTimer > 0) {
        ui.powerStatus.textContent = `貫通 ${Math.ceil(state.pierceTimer)}`;
      } else if (state.laserTimer > 0) {
        ui.powerStatus.textContent = `レーザー ${Math.ceil(state.laserTimer)}`;
      } else if (state.bounceTimer > 0) {
        ui.powerStatus.textContent = `跳弾 ${Math.ceil(state.bounceTimer)}`;
      } else if (state.omniTimer > 0) {
        ui.powerStatus.textContent = `八方位 ${Math.ceil(state.omniTimer)}`;
      } else {
        ui.powerStatus.textContent = 
        state.thunderCount > 0
          ? `⚡${state.thunderCount}`
          : "なし";
      }
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, state.h);
      g.addColorStop(0, "#17211c");
      g.addColorStop(0.52, "#1e2a25");
      g.addColorStop(1, "#101312");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, state.w, state.h);

      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.strokeStyle = "#6f786b";
      ctx.lineWidth = 1;
      const gap = 64;
      for (let x = -gap; x < state.w + gap; x += gap) {
        ctx.beginPath();
        ctx.moveTo(x + Math.sin(state.time * 0.2 + x) * 6, 0);
        ctx.lineTo(x - state.h * 0.25, state.h);
        ctx.stroke();
      }
      for (let y = state.h * 0.56; y < state.h + gap; y += gap) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(state.w, y + Math.sin(state.time * 0.12 + y) * 8);
        ctx.stroke();
      }
      ctx.restore();

      ctx.fillStyle = "rgba(11, 14, 13, 0.78)";
      ctx.fillRect(0, state.h - 88, state.w, 88);
      ctx.fillStyle = "rgba(232, 245, 212, 0.08)";
      for (let i = 0; i < 36; i++) {
        const x = (i * 137 + state.time * 18) % (state.w + 120) - 60;
        const y = state.h - 80 + (i * 29) % 62;
        ctx.fillRect(x, y, 18 + (i % 3) * 8, 3);
      }
    }

    function drawEnemy(enemy) {
      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(Math.sin(state.time * 2 + enemy.wobble) * 0.12);
      const hpRatio = clamp(enemy.hp / enemy.maxHp, 0, 1);
      const spikes = enemy.type === "boss" ? 18 : 9;
      ctx.beginPath();
      for (let i = 0; i < spikes * 2; i++) {
        const a = (i / (spikes * 2)) * Math.PI * 2;
        const r = enemy.radius * (i % 2 ? 0.72 : 1 + Math.sin(state.time * 3 + i) * 0.05);
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = enemy.kind.color;
      ctx.strokeStyle = enemy.kind.accent;
      ctx.lineWidth = enemy.type === "boss" ? 7 : 4;
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = enemy.kind.accent;
      for (let i = 0; i < 5; i++) {
        const a = enemy.wobble + i * 1.27;
        ctx.fillRect(Math.cos(a) * enemy.radius * 0.45 - 8, Math.sin(a) * enemy.radius * 0.38 - 5, 16, 10);
      }

      ctx.fillStyle = "#101312";
      ctx.beginPath();
      ctx.arc(-enemy.radius * 0.28, -enemy.radius * 0.12, Math.max(4, enemy.radius * 0.12), 0, Math.PI * 2);
      ctx.arc(enemy.radius * 0.28, -enemy.radius * 0.12, Math.max(4, enemy.radius * 0.12), 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#101312";
      ctx.lineWidth = Math.max(2, enemy.radius * 0.06);
      ctx.beginPath();
      ctx.arc(0, enemy.radius * 0.16, enemy.radius * 0.28, 0.1, Math.PI - 0.1);
      ctx.stroke();

      ctx.fillStyle = "#f5f7ef";
      ctx.font = `800 ${Math.max(10, enemy.radius * 0.34)}px system-ui`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(enemy.kind.label, 0, enemy.radius * 0.02);

      if ((enemy.freezeTimer || 0) > 0 || (enemy.iceBreakTimer || 0) > 0) {
        const frozen = (enemy.freezeTimer || 0) > 0;
        const pulse = 1 + Math.sin(state.time * 12) * 0.03;
        ctx.globalAlpha = frozen ? 0.72 : clamp((enemy.iceBreakTimer || 0) / 0.42, 0, 1) * 0.55;
        ctx.fillStyle = frozen ? "rgba(191, 243, 255, 0.58)" : "rgba(245, 251, 255, 0.34)";
        ctx.strokeStyle = frozen ? "rgba(245, 251, 255, 0.88)" : "rgba(191, 243, 255, 0.78)";
        ctx.lineWidth = Math.max(3, enemy.radius * 0.055);
        ctx.beginPath();
        ctx.ellipse(0, 0, enemy.radius * 1.1 * pulse, enemy.radius * 0.92 * pulse, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.globalAlpha = frozen ? 0.9 : clamp((enemy.iceBreakTimer || 0) / 0.42, 0, 1);
        ctx.strokeStyle = "rgba(255,255,255,0.82)";
        ctx.lineWidth = Math.max(1.5, enemy.radius * 0.035);
        for (let i = 0; i < 5; i++) {
          const a = i * 1.26 + enemy.dashPhase;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * enemy.radius * 0.15, Math.sin(a) * enemy.radius * 0.12);
          ctx.lineTo(Math.cos(a + 0.25) * enemy.radius * 0.88, Math.sin(a + 0.25) * enemy.radius * 0.74);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      ctx.restore();

      const barW = enemy.radius * 1.65;
      ctx.fillStyle = "rgba(0,0,0,0.42)";
      ctx.fillRect(enemy.x - barW / 2, enemy.y - enemy.radius - 14, barW, 5);
      ctx.fillStyle = enemy.type === "boss" ? "#f5b84b" : "#ff6b5f";
      ctx.fillRect(enemy.x - barW / 2, enemy.y - enemy.radius - 14, barW * hpRatio, 5);

      const typed = normalizeInput(state.input);
      const answer = enemy.wordAnswer || "";
      const label = enemy.wordDisplay || answer;
      const reading = enemy.wordReading || "";
      ctx.save();
      const labelSize = enemy.type === "boss" ? 19 : 15;
      const readingSize = enemy.type === "boss" ? 13 : 11;
      ctx.font = `800 ${labelSize}px system-ui`;
      const labelWidth = ctx.measureText(label).width;
      ctx.font = `700 ${readingSize}px system-ui`;
      const readingWidth = reading ? ctx.measureText(reading).width : 0;
      const textWidth = Math.max(72, labelWidth, readingWidth) + 18;
      const boxH = reading ? 42 : 28;
      const boxX = enemy.x - textWidth / 2;
      const boxY = enemy.y + enemy.radius + 10;
      const matchesTyped = typed && enemy.wordAnswers.some((candidate) => candidate.startsWith(typed));
      ctx.fillStyle = matchesTyped ? "rgba(71, 183, 200, 0.74)" : "rgba(13, 18, 17, 0.82)";
      ctx.strokeStyle = "rgba(255,255,255,0.24)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(boxX, boxY, textWidth, boxH, 7);
      ctx.fill();
      ctx.stroke();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#f5f7ef";
      ctx.font = `800 ${labelSize}px system-ui`;
      ctx.fillText(label, enemy.x, boxY + (reading ? 15 : 14));
      if (reading) {
        ctx.fillStyle = "#b8c3b0";
        ctx.font = `700 ${readingSize}px system-ui`;
        ctx.fillText(reading, enemy.x, boxY + 31);
      }
      ctx.restore();
    }

    function drawBase() {
      const x = state.player.x;
      const y = state.player.y;
      ctx.save();
      ctx.translate(x, y);
      const barrierActive = state.invincibleTimer > 0 || state.laserTimer > 0;
      ctx.fillStyle = barrierActive ? "#dff4ef" : "#e8f5d4";
      ctx.strokeStyle = barrierActive ? "#47b7c8" : "#8fd14f";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, state.player.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#101312";
      if (state.faceTimer > 0) {
        ctx.strokeStyle = "#101312";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-13, -9);
        ctx.lineTo(-4, 0);
        ctx.moveTo(-4, -9);
        ctx.lineTo(-13, 0);
        ctx.moveTo(4, -9);
        ctx.lineTo(13, 0);
        ctx.moveTo(13, -9);
        ctx.lineTo(4, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 13, 9, Math.PI + 0.2, Math.PI * 2 - 0.2);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(-8, -4, 4, 0, Math.PI * 2);
        ctx.arc(8, -4, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#101312";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 7, 10, 0.15, Math.PI - 0.15);
        ctx.stroke();
      }
      if (barrierActive) {
        ctx.strokeStyle = "rgba(71,183,200,0.45)";
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.arc(0, 0, state.player.radius + 13 + Math.sin(state.time * 8) * 2, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawCrosshair() {
      const target = state.enemies.find((enemy) => enemy.id === state.targetId) || null;
      const x = target ? target.x : state.player.x;
      const y = target ? target.y : state.player.y;
      ctx.save();
      ctx.strokeStyle = target ? "#e8f5d4" : "rgba(232,245,212,0.44)";
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.95;
      ctx.beginPath();
      ctx.arc(x, y, target ? target.radius + 12 : 19, 0, Math.PI * 2);
      ctx.moveTo(x - 30, y);
      ctx.lineTo(x - 8, y);
      ctx.moveTo(x + 8, y);
      ctx.lineTo(x + 30, y);
      ctx.moveTo(x, y - 30);
      ctx.lineTo(x, y - 8);
      ctx.moveTo(x, y + 8);
      ctx.lineTo(x, y + 30);
      ctx.stroke();
      ctx.restore();
    }

    function drawLaser() {
      if (state.laserTimer <= 0 || !state.running) return;
      const start = { x: state.player.x, y: state.player.y };
      const end = laserEndPoint();
      const flicker = Math.sin(state.time * 42) * 2.5;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.strokeStyle = "rgba(126, 231, 255, 0.18)";
      ctx.lineWidth = 34 + flicker;
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
      ctx.strokeStyle = "rgba(71, 183, 200, 0.62)";
      ctx.lineWidth = 17 + flicker * 0.5;
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
      ctx.strokeStyle = "rgba(245, 251, 255, 0.94)";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
      ctx.restore();
    }

    function drawVacuums() {
      for (const vacuum of state.vacuums) {
        ctx.save();
        ctx.translate(vacuum.x, vacuum.y);
        const alpha = clamp(vacuum.life / 10, 0, 1);
        ctx.globalAlpha = 0.18 * alpha;
        ctx.fillStyle = "#b8c3b0";
        ctx.beginPath();
        ctx.arc(0, 0, vacuum.pullRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.9 * alpha;
        ctx.strokeStyle = "rgba(245,247,239,0.55)";
        ctx.lineWidth = 2;
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.arc(0, 0, 42 + i * 32, vacuum.spin + i * 0.7, vacuum.spin + i * 0.7 + Math.PI * 0.9);
          ctx.stroke();
        }
        ctx.fillStyle = "#d4ded2";
        ctx.strokeStyle = "#4f5f59";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.roundRect(-30, -20, 60, 42, 10);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#4f5f59";
        ctx.fillRect(-18, -34, 36, 18);
        ctx.fillStyle = "#101312";
        ctx.font = "900 24px system-ui";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("吸", 0, 3);
        ctx.restore();
      }
    }

    function drawLightningEffects() {
      for (const fx of state.lightningEffects) {
        const alpha = clamp(fx.life / fx.maxLife, 0, 1);

        ctx.save();
        ctx.globalAlpha = alpha * (0.65 + Math.random() * 0.35);
        ctx.strokeStyle = "#c8f5ff";
        ctx.lineWidth = 7;
        ctx.shadowColor = "#fff176";
        ctx.shadowBlur = 28;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.beginPath();
        ctx.moveTo(fx.fromX, fx.fromY);

        const segments = 5;
        for (let i = 1; i < segments; i += 1) {
          const t = i / segments;
          const x = fx.fromX + (fx.toX - fx.fromX) * t + rand(-24, 24);
          const y = fx.fromY + (fx.toY - fx.fromY) * t + rand(-24, 24);
          ctx.lineTo(x, y);
        }

        ctx.lineTo(fx.toX, fx.toY);
        ctx.stroke();

        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.restore();
      }
    }

    function strokeArrow(fromX, fromY, toX, toY, size = 5) {
      const angle = Math.atan2(toY - fromY, toX - fromX);
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - Math.cos(angle - 0.55) * size, toY - Math.sin(angle - 0.55) * size);
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - Math.cos(angle + 0.55) * size, toY - Math.sin(angle + 0.55) * size);
      ctx.stroke();
    }

    function drawPowerupSymbol(kind, radius) {
      const r = radius * 0.72;
      if (kind === "shield") {
        const points = [];
        for (let i = 0; i < 5; i++) {
          const a = -Math.PI / 2 + (Math.PI * 2 * i) / 5;
          points.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
        }
        ctx.beginPath();
        [0, 2, 4, 1, 3, 0].forEach((index, i) => i ? ctx.lineTo(points[index].x, points[index].y) : ctx.moveTo(points[index].x, points[index].y));
        ctx.stroke();
      } else if (kind === "pierce") {
        ctx.beginPath();
        ctx.arc(4, 0, r * 0.58, -1.2, 2.7);
        ctx.moveTo(-r * 0.25, -r * 0.45);
        ctx.lineTo(-r * 0.05, -r * 0.12);
        ctx.lineTo(r * 0.18, -r * 0.56);
        ctx.moveTo(r * 0.05, r * 0.12);
        ctx.lineTo(r * 0.46, r * 0.44);
        ctx.moveTo(r * 0.1, -r * 0.02);
        ctx.lineTo(r * 0.64, -r * 0.18);
        ctx.stroke();
        strokeArrow(-r * 0.92, r * 0.54, r * 0.36, -r * 0.1, r * 0.16);
      } else if (kind === "explosive") {
        ctx.beginPath();
        for (let i = 0; i < 16; i++) {
          const a = -Math.PI / 2 + (Math.PI * 2 * i) / 16;
          const rr = i % 2 ? r * 0.42 : r;
          const x = Math.cos(a) * rr;
          const y = Math.sin(a) * rr;
          if (i) ctx.lineTo(x, y);
          else ctx.moveTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      } else if (kind === "omni") {
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.22, 0, Math.PI * 2);
        ctx.stroke();
        for (let i = 0; i < 8; i++) {
          const a = (Math.PI * 2 * i) / 8;
          strokeArrow(Math.cos(a) * r * 0.36, Math.sin(a) * r * 0.36, Math.cos(a) * r, Math.sin(a) * r, r * 0.14);
        }
      } else if (kind === "freeze") {
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI * 2 * i) / 6;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          ctx.moveTo(Math.cos(a) * r * 0.58, Math.sin(a) * r * 0.58);
          ctx.lineTo(Math.cos(a + 0.48) * r * 0.78, Math.sin(a + 0.48) * r * 0.78);
          ctx.moveTo(Math.cos(a) * r * 0.58, Math.sin(a) * r * 0.58);
          ctx.lineTo(Math.cos(a - 0.48) * r * 0.78, Math.sin(a - 0.48) * r * 0.78);
          ctx.stroke();
        }
      } else if (kind === "laser") {
        ctx.beginPath();
        ctx.moveTo(-r, r * 0.55);
        ctx.lineTo(r * 0.42, -r * 0.32);
        ctx.moveTo(-r * 0.8, r * 0.78);
        ctx.lineTo(r * 0.62, -r * 0.1);
        ctx.moveTo(r * 0.52, -r * 0.55);
        ctx.lineTo(r * 0.52, r * 0.16);
        ctx.moveTo(r * 0.18, -r * 0.2);
        ctx.lineTo(r * 0.86, -r * 0.2);
        ctx.stroke();
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = (Math.PI * 2 * i) / 8;
          ctx.moveTo(r * 0.52, -r * 0.2);
          ctx.lineTo(r * 0.52 + Math.cos(a) * r * 0.36, -r * 0.2 + Math.sin(a) * r * 0.36);
        }
        ctx.stroke();
      } else if (kind === "bounce") {
        ctx.beginPath();
        ctx.arc(-r * 0.48, -r * 0.28, r * 0.28, 0, Math.PI * 2);
        ctx.arc(r * 0.5, -r * 0.02, r * 0.28, 0, Math.PI * 2);
        ctx.arc(-r * 0.08, r * 0.58, r * 0.28, 0, Math.PI * 2);
        ctx.stroke();
        strokeArrow(-r * 0.78, -r * 0.8, -r * 0.48, -r * 0.56, r * 0.13);
        strokeArrow(-r * 0.2, -r * 0.18, r * 0.22, -r * 0.04, r * 0.13);
        strokeArrow(r * 0.32, r * 0.2, r * 0.04, r * 0.36, r * 0.13);
      } else if (kind === "vacuum") {
        ctx.beginPath();
        ctx.roundRect(-r * 0.45, -r * 0.1, r * 0.68, r * 0.42, r * 0.12);
        ctx.moveTo(r * 0.18, -r * 0.14);
        ctx.quadraticCurveTo(r * 0.76, -r * 0.72, r * 0.86, -r * 0.18);
        ctx.lineTo(r * 0.98, -r * 0.12);
        ctx.moveTo(-r * 0.25, r * 0.34);
        ctx.lineTo(-r * 0.34, r * 0.58);
        ctx.moveTo(r * 0.04, r * 0.34);
        ctx.lineTo(r * 0.12, r * 0.58);
        ctx.moveTo(-r * 0.86, r * 0.5);
        ctx.lineTo(r * 0.56, r * 0.5);
        ctx.stroke();
      } else if (kind === "heal") {
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.78);
        ctx.lineTo(0, r * 0.78);
        ctx.moveTo(-r * 0.78, 0);
        ctx.lineTo(r * 0.78, 0);
        ctx.stroke();
      } else if (kind === "thunder") {
        ctx.beginPath();
        ctx.moveTo(r * 0.18, -r);
        ctx.lineTo(-r * 0.35, r * 0.05);
        ctx.lineTo(r * 0.02, r * 0.05);
        ctx.lineTo(-r * 0.22, r);
        ctx.lineTo(r * 0.55, -r * 0.18);
        ctx.lineTo(r * 0.12, -r * 0.18);
        ctx.closePath();
        ctx.stroke();
      }
    }

    function drawPowerups() {
      for (const powerup of state.powerups) {
        ctx.save();
        ctx.translate(powerup.x, powerup.y);
        ctx.rotate(powerup.spin * 0.45);
        const color = powerupColor(powerup.kind);
        const pulse = 1 + Math.sin(state.time * 8 + powerup.age * 6) * 0.04;
        const r = powerup.radius * pulse;
        ctx.globalAlpha = clamp(powerup.life / 0.45, 0, 1);
        ctx.strokeStyle = color;
        ctx.lineWidth = Math.max(2, r * 0.13);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.shadowColor = color;
        ctx.shadowBlur = 13;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha *= 0.92;
        ctx.lineWidth = Math.max(1.7, r * 0.11);
        drawPowerupSymbol(powerup.kind, r);
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    function drawInputPrompt() {
      ctx.save();
      ctx.font = "900 22px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const text = state.input ? `入力: ${state.input}` : "正確にタイプして敵を撃破";
      const width = Math.max(260, ctx.measureText(text).width + 28);
      const x = state.w / 2 - width / 2;
      const y = state.h - 62;
      ctx.fillStyle = "rgba(18, 24, 27, 0.16)";
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, width, 38, 8);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#f5f7ef";
      ctx.fillText(text, state.w / 2, y + 19);
      ctx.restore();
    }

    function drawThunderReadyNotice() {
      if (state.thunderCount <= 0 || !state.running || state.rescue) return;

      const alpha = 0.45 + Math.sin(state.time * 4) * 0.35;
      const text = "⚡️スペースキーでサンダーアタック⚡️";

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = "1000 30px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const x = state.w / 2;
      const y = state.h * 0.38;
      const width = ctx.measureText(text).width + 34;

      ctx.fillStyle = "rgba(13, 18, 17, 0.62)";
      ctx.strokeStyle = "rgba(255, 241, 118, 0.85)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(x - width / 2, y - 24, width, 48, 10);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#fff176";
      ctx.shadowColor = "#fff176";
      ctx.shadowBlur = 18;
      ctx.fillText(text, x, y);

      ctx.restore();
    }

    function canvasUIFont(weight, size) {
      return `${weight} ${size}px system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif`;
    }

    function drawFittedCenteredText(text, x, y, maxWidth, size, weight = 900, minSize = 14) {
      let fittedSize = size;
      ctx.font = canvasUIFont(weight, fittedSize);
      const width = ctx.measureText(text).width;
      if (width > maxWidth) fittedSize = Math.max(minSize, Math.floor(fittedSize * maxWidth / width));
      ctx.font = canvasUIFont(weight, fittedSize);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, x, y);
      return fittedSize;
    }

    function drawRescueIntroTitle(x, y, maxWidth) {
      const title = "起死回生のチャンス";
      const bang = "!!";
      let size = 52;
      const gap = 8;
      ctx.textBaseline = "middle";
      ctx.textAlign = "left";
      ctx.font = canvasUIFont(900, size);
      let totalWidth = ctx.measureText(title).width + gap + ctx.measureText(bang).width;
      if (totalWidth > maxWidth) size = Math.max(34, Math.floor(size * maxWidth / totalWidth));
      ctx.font = canvasUIFont(900, size);
      const titleWidth = ctx.measureText(title).width;
      const bangWidth = ctx.measureText(bang).width;
      const startX = x - (titleWidth + gap + bangWidth) / 2;
      ctx.fillStyle = "#ffebe8";
      ctx.fillText(title, startX, y);
      ctx.fillStyle = "#ff3f20";
      ctx.fillText(bang, startX + titleWidth + gap, y);
    }

    function drawRescueBangLine(text, x, y, maxWidth, size = 21) {
      const bang = "!!";
      let fittedSize = size;
      const gap = 6;
      ctx.textBaseline = "middle";
      ctx.textAlign = "left";
      ctx.font = canvasUIFont(800, fittedSize);
      let totalWidth = ctx.measureText(text).width + gap + ctx.measureText(bang).width;
      if (totalWidth > maxWidth) fittedSize = Math.max(15, Math.floor(fittedSize * maxWidth / totalWidth));
      ctx.font = canvasUIFont(800, fittedSize);
      const textWidth = ctx.measureText(text).width;
      const bangWidth = ctx.measureText(bang).width;
      const startX = x - (textWidth + gap + bangWidth) / 2;
      ctx.fillStyle = "#f5f7ef";
      ctx.fillText(text, startX, y);
      ctx.fillStyle = "#ff3f20";
      ctx.fillText(bang, startX + textWidth + gap, y);
    }

    function drawRescueOverlay() {
      if (!state.rescue) return;
      ctx.save();
      ctx.fillStyle = "rgba(5, 7, 7, 0.82)";
      ctx.fillRect(0, 0, state.w, state.h);
      if (state.rescue.mode === "intro") {
        const panelW = Math.min(920, state.w - 36);
        const panelX = (state.w - panelW) / 2;
        const panelH = Math.min(520, state.h - 120);
        const panelY = (state.h - panelH) / 2;
        const centerX = panelX + panelW / 2;
        ctx.fillStyle = "rgba(13, 18, 17, 0.96)";
        ctx.strokeStyle = "#f5b84b";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.roundRect(panelX, panelY, panelW, panelH, 8);
        ctx.fill();
        ctx.stroke();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        drawRescueIntroTitle(centerX, panelY + 88, panelW - 92);
        ctx.fillStyle = "#f5f7ef";
        drawFittedCenteredText("これから表示されることばを間違えずに入力できたら今いる敵を全滅できるよ👌", centerX, panelY + 170, panelW - 112, 21, 800, 15);
        drawFittedCenteredText("5回タイプミスしたらアウト", centerX, panelY + 208, panelW - 112, 21, 800, 15);
        drawRescueBangLine("挑戦ボタンを押してスタート", centerX, panelY + 246, panelW - 112, 21);
        ctx.fillStyle = "#b8c3b0";
        drawFittedCenteredText(`自動開始まで ${Math.max(0, Math.ceil(state.rescue.introTimer))} 秒`, centerX, panelY + 306, panelW - 112, 18, 800, 14);
        const buttonW = 210;
        const buttonH = 54;
        const buttonX = centerX - buttonW / 2;
        const buttonY = panelY + panelH - 98;
        state.rescue.button = { x: buttonX, y: buttonY, w: buttonW, h: buttonH };
        ctx.fillStyle = "#e8f5d4";
        ctx.strokeStyle = "rgba(255,255,255,0.34)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(buttonX, buttonY, buttonW, buttonH, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#10140d";
        drawFittedCenteredText("挑戦する", centerX, buttonY + buttonH / 2, buttonW - 34, 22, 900, 16);
        ctx.restore();
        return;
      }
      const danger = state.rescue.timeLeft <= 10;
      const panelW = Math.min(1120, state.w - 36);
      const panelX = (state.w - panelW) / 2;
      ctx.fillStyle = danger ? "rgba(84, 12, 10, 0.92)" : "rgba(13, 18, 17, 0.94)";
      ctx.strokeStyle = danger ? "#ff6b5f" : "rgba(255,255,255,0.22)";
      ctx.lineWidth = danger ? 5 : 2;
      ctx.beginPath();
      ctx.roundRect(panelX, 70, panelW, Math.min(560, state.h - 120), 8);
      ctx.fill();
      ctx.stroke();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = danger ? "#ffebe8" : "#f5f7ef";
      ctx.font = "900 52px system-ui";
      ctx.fillText(`残り ${Math.ceil(state.rescue.timeLeft)} 秒`, state.w / 2, 128);
      ctx.font = "800 19px system-ui";
      ctx.fillStyle = "#f5b84b";
      ctx.fillText("5回ミスすることなく全てタイピングし切れば敵キャラ全滅、経験値獲得で体力も半分回復", state.w / 2, 185);
      ctx.fillStyle = "#b8c3b0";
      ctx.fillText(`ミス ${state.rescue.misses}/${state.rescue.missLimit}`, state.w / 2, 218);
      ctx.fillStyle = "#f5f7ef";
      ctx.font = "900 28px system-ui";
      drawRescueProgressText(state.rescue.prompt.text, state.rescue.prompt.reading, state.w / 2, 270, panelW - 70, 38, "900 28px system-ui");
      ctx.fillStyle = "#8fd14f";
      ctx.font = "900 24px system-ui";
      drawRescueProgressText(state.rescue.prompt.reading, state.rescue.prompt.reading, state.w / 2, 430, panelW - 70, 32, "900 24px system-ui");
      ctx.fillStyle = "#47b7c8";
      ctx.font = "900 22px system-ui";
      wrapText(state.rescue.input || "入力待ち", state.w / 2, 545, panelW - 70, 28);
      ctx.restore();
    }

    function drawBossIntroOverlay() {
      if (state.bossIntroTimer <= 0 || state.rescue) return;
      ctx.save();
      const alpha = clamp(state.bossIntroTimer / 0.35, 0, 1);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "rgba(5, 7, 7, 0.48)";
      ctx.fillRect(0, 0, state.w, state.h);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "1000 72px system-ui";
      ctx.lineWidth = 9;
      ctx.strokeStyle = "rgba(5, 7, 7, 0.9)";
      ctx.fillStyle = "#ffebe8";
      ctx.strokeText("ボスが現れた‼️", state.w / 2, state.h * 0.42);
      ctx.fillText("ボスが現れた‼️", state.w / 2, state.h * 0.42);
      ctx.font = "900 24px system-ui";
      ctx.fillStyle = "#f5b84b";
      ctx.fillText("タイピングスキルを駆使してやっつけよう❗️", state.w / 2, state.h * 0.42 + 72);
      ctx.restore();
    }

    function drawRescueProgressText(text, reading, x, y, maxWidth, lineHeight, font) {
      const readingIndex = currentRescueReadingIndex(reading);
      const coloredUntil = mapReadingProgressToTextIndex(text, reading, readingIndex);
      ctx.save();
      ctx.font = font;
      ctx.textBaseline = "middle";
      const lines = [];
      let line = "";
      for (const char of text) {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = char;
        } else {
          line = testLine;
        }
      }
      if (line) lines.push(line);
      let index = 0;
      lines.forEach((current, lineIndex) => {
        const width = ctx.measureText(current).width;
        let cursor = x - width / 2;
        for (const char of current) {
          ctx.fillStyle = index < coloredUntil ? "#47b7c8" : "#f5f7ef";
          const charWidth = ctx.measureText(char).width;
          ctx.fillText(char, cursor + charWidth / 2, y + lineIndex * lineHeight);
          cursor += charWidth;
          index += 1;
        }
      });
      ctx.restore();
    }

    function wrapText(text, x, y, maxWidth, lineHeight) {
      let line = "";
      let currentY = y;
      for (const char of text) {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, currentY);
          line = char;
          currentY += lineHeight;
        } else {
          line = testLine;
        }
      }
      if (line) ctx.fillText(line, x, currentY);
    }

    function render() {
      ctx.save();
      const shakeX = rand(-state.shake, state.shake);
      const shakeY = rand(-state.shake, state.shake);
      ctx.translate(shakeX, shakeY);

      drawBackground();
      for (const shot of state.enemyBullets) {
        ctx.fillStyle = "rgba(255,107,95,0.9)";
        ctx.strokeStyle = "rgba(255,255,255,0.32)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(shot.x, shot.y, shot.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#101312";
        ctx.font = "900 17px system-ui";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(shot.display, shot.x, shot.y);
      }
      for (const bullet of state.bullets) {
        ctx.strokeStyle = bullet.explosive ? "rgba(255,143,61,0.42)" : "rgba(232,245,212,0.34)";
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(bullet.x - bullet.vx * 0.018, bullet.y - bullet.vy * 0.018);
        ctx.lineTo(bullet.x, bullet.y);
        ctx.stroke();
        ctx.fillStyle = bullet.explosive ? "#ff8f3d" : "#e8f5d4";
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      for (const enemy of state.enemies) drawEnemy(enemy);
      drawLightningEffects();
      drawPowerups();
      for (const p of state.particles) {
        ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      drawVacuums();
      drawBase();
      drawLaser();
      for (const f of state.floaters) {
        ctx.globalAlpha = clamp(f.life / f.maxLife, 0, 1);
        ctx.fillStyle = f.color;
        ctx.font = "800 18px system-ui";
        ctx.textAlign = "center";
        ctx.fillText(f.text, f.x, f.y);
      }
      ctx.globalAlpha = 1;
      drawCrosshair();
      drawInputPrompt();
      drawThunderReadyNotice();
      drawBossIntroOverlay();
      drawRescueOverlay();
      ctx.restore();

      if (!state.running && !state.rescue) {
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(0, 0, state.w, state.h);
      }
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - state.last) / 1000 || 0);
      state.last = now;
      if (state.rescue) updateRescue(dt);
      else if (state.running) update(dt);
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", fit);
    window.addEventListener("keydown", (event) => {
      if (state.rescue) {
        if (state.rescue.mode === "intro" && (event.code === "Enter" || event.code === "Space")) {
          event.preventDefault();
          beginRescueChallenge();
          return;
        }
        if (event.code === "Backspace") {
          event.preventDefault();
          if (state.rescue.mode === "active") state.rescue.input = state.rescue.input.slice(0, -1);
          return;
        }
        if (!event.isComposing && event.key !== "Process" && event.key.length === 1) {
          event.preventDefault();
          submitTypingText(event.key);
        }
        return;
      }
      if (event.code === "Space" && state.running) {
        event.preventDefault();

        useThunder();

        return;
      }
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(event.code)) {
        event.preventDefault();
        state.keys.add(event.code);
        return;
      }
      if (event.code === "Backspace" && state.running) {
        event.preventDefault();
        state.input = state.input.slice(0, -1);
        if (!state.input) state.typingStartTime = 0;
        return;
      }
      if (event.code === "Escape" && state.running) {
        event.preventDefault();
        state.input = "";
        state.typingStartTime = 0;
        return;
      }
      if (event.code === "Enter" && !state.running) {
        event.preventDefault();
        if (state.menuMode === "levelUp") chooseLevelBonus("attack");
        else if (state.menuMode === "stageClear") continueNextStage();
        else if (state.menuMode === "pause") resumeGame();
        else if (state.menuMode === "title") selectDifficulty("normal");
        else if (state.menuMode === "end") startGame();
        return;
      }
      if (event.code === "KeyR" && !state.running && state.menuMode === "end") {
        event.preventDefault();
        startGame();
        return;
      }
      if (!event.isComposing && event.key !== "Process" && event.key.length === 1) submitTypingText(event.key);
    });
    window.addEventListener("beforeinput", (event) => {
      if (!event.data || !/[^\x00-\x7F]/.test(event.data)) return;
      if (event.inputType && !event.inputType.startsWith("insert")) return;
      event.preventDefault();
      submitTypingText(event.data);
    });
    window.addEventListener("compositionend", (event) => {
      submitTypingText(event.data);
    });
    window.addEventListener("keyup", (event) => {
      state.keys.delete(event.code);
    });
    canvas.addEventListener("click", (event) => {
      if (!state.rescue || state.rescue.mode !== "intro" || !state.rescue.button) return;
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const button = state.rescue.button;
      if (x >= button.x && x <= button.x + button.w && y >= button.y && y <= button.y + button.h) beginRescueChallenge();
    });
    startBtn.addEventListener("click", () => {
      if (state.menuMode === "levelUp") chooseLevelBonus("attack");
      else if (state.menuMode === "stageClear") continueNextStage();
      else if (state.menuMode === "pause") resumeGame();
      else if (state.menuMode === "title") selectDifficulty("normal");
      else startGame();
    });
    practiceBtn.addEventListener("click", () => {
      if (state.menuMode === "levelUp") chooseLevelBonus("defense");
      else if (state.menuMode === "stageClear") returnToTitle();
      else if (state.menuMode === "end") returnToTitle();
      else if (state.menuMode === "pause") returnToTitle();
      else selectDifficulty("normal");
    });
    pauseBtn.addEventListener("click", pauseGame);
    englishToggle.addEventListener("change", () => {
      state.englishWords = englishToggle.checked;
      updateWordModeUi();
    });
    easyBtn.addEventListener("click", () => selectDifficulty("easy"));
    normalBtn.addEventListener("click", () => selectDifficulty("normal"));
    hardBtn.addEventListener("click", () => selectDifficulty("hard"));
    infernoBtn.addEventListener("click", () => selectDifficulty("inferno"));

    fit();
    updateStageList();
    showTitleMenu();
    updateUi();
    requestAnimationFrame((now) => {
      state.last = now;
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>

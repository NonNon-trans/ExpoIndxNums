<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trash Uprising Shooter</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(18, 24, 27, 0.16);
      --line: rgba(255, 255, 255, 0.18);
      --text: #f5f7ef;
      --muted: #b8c3b0;
      --accent: #8fd14f;
      --warn: #f5b84b;
      --danger: #ff6b5f;
      --water: #47b7c8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #101513;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: default;
      background: #111813;
    }

    .hud {
      position: fixed;
      inset: 16px 16px auto;
      display: grid;
      grid-template-columns: minmax(250px, 1fr) auto;
      gap: 12px;
      pointer-events: none;
      z-index: 2;
      text-shadow: 0 2px 3px rgba(0, 0, 0, 0.85);
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.12);
    }

    .status {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .stage-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meters {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .meter {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      min-width: 0;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .fill {
      width: 50%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 120ms linear;
    }

    .fill.health {
      background: var(--danger);
    }

    .fill.clean {
      background: var(--water);
    }

    .fill.stage {
      background: var(--warn);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(7, auto);
      gap: 10px;
      padding: 12px;
      align-content: center;
      font-size: 13px;
      color: var(--muted);
    }

    .stats strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      line-height: 1.1;
      text-align: right;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: radial-gradient(circle at 50% 45%, rgba(44, 72, 52, 0.55), rgba(9, 12, 10, 0.88) 58%, rgba(5, 6, 6, 0.96));
      z-index: 3;
    }

    .overlay.hidden {
      display: none;
    }

    .menu {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(18px, 4vw, 34px);
      background: rgba(13, 18, 17, 0.9);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.44);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .lead {
      max-width: 60ch;
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-line;
    }

    .lead rt {
      font-size: 0.58em;
      color: #d9e6d4;
      font-weight: 800;
    }

    .title-award {
      display: none;
      margin: 18px 0 8px;
      padding: 16px 18px;
      border: 3px solid rgba(255, 207, 95, 0.85);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255, 207, 95, 0.2), rgba(71, 183, 200, 0.22), rgba(240, 167, 255, 0.18));
      box-shadow: 0 0 28px rgba(255, 207, 95, 0.28), inset 0 0 18px rgba(255, 255, 255, 0.12);
      color: #fff6c9;
      font-weight: 1000;
      font-size: clamp(26px, 5vw, 46px);
      line-height: 1.15;
      text-align: center;
      text-shadow: 0 3px 0 #101312, 0 0 18px rgba(255, 207, 95, 0.8);
      white-space: pre-line;
    }

    .title-award.show {
      display: block;
    }

    .run-achievements {
      display: none;
      margin: 12px 0 8px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(13, 18, 17, 0.58);
      color: #f5f7ef;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 900;
      line-height: 1.45;
      text-align: center;
      white-space: pre-line;
    }

    .run-achievements.show {
      display: block;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .word-mode-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin: 18px 0 4px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-weight: 900;
      cursor: pointer;
    }

    .word-mode-label {
      display: grid;
      gap: 2px;
    }

    .word-mode-label strong {
      font-size: 18px;
      line-height: 1.1;
    }

    .word-mode-label span {
      color: var(--muted);
      font-size: 13px;
    }

    .word-mode-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch-track {
      position: relative;
      width: 112px;
      height: 62px;
      border-radius: 999px;
      padding: 5px;
      background: #6e7772;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.18), 0 9px 22px rgba(0, 0, 0, 0.34);
      transition: background 180ms ease, box-shadow 180ms ease;
      flex: 0 0 auto;
    }

    .switch-thumb {
      display: block;
      position: relative;
      z-index: 1;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.38), 0 1px 2px rgba(0, 0, 0, 0.22);
      transition: transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .word-mode-toggle input:checked + .switch-track {
      background: #35df61;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.14), 0 0 22px rgba(52, 214, 95, 0.42);
    }

    .word-mode-toggle input:checked + .switch-track .switch-thumb {
      transform: translateX(50px);
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      padding: 12px 16px;
      background: #e8f5d4;
      color: #10140d;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      background: transparent;
      color: var(--text);
    }

    .pause-button {
      position: fixed;
      top: 140px;
      right: 16px;
      z-index: 2;
      min-width: 86px;
      padding: 10px 14px;
      border-color: rgba(245, 184, 75, 0.62);
      background: rgba(13, 18, 17, 0.52);
      color: #f5f7ef;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.26);
    }

    .pause-button.hidden {
      display: none;
    }

    .stage-list {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      margin-top: 16px;
    }

    .stage-chip {
      min-height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      background: rgba(255, 255, 255, 0.05);
    }

    .stage-chip.done {
      color: #10200b;
      background: var(--accent);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      max-width: min(560px, calc(100vw - 32px));
      transform: translateX(-50%);
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      text-align: center;
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
      z-index: 4;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 720px) {
      .hud {
        inset: 10px 10px auto;
        grid-template-columns: 1fr;
      }

      .meters {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(4, 1fr);
      }

      .stage-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .word-mode-toggle {
        align-items: center;
        flex-direction: row;
      }

      .pause-button {
        top: auto;
        right: 10px;
        bottom: 78px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Trash Uprising Shooter"></canvas>

        </div>
      </div>
    </div>
    <div class="panel stats">
      <span>得点<strong id="score">0</strong></span>
      <span>入力<strong id="ammo">-</strong></span>
      <span>連鎖<strong id="combo">0</strong></span>

      <span>Lv<strong id="level">1</strong></span>
      <span>経験<strong id="exp">0%</strong></span>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="menu">
      <h1>Trash Uprising Shooter</h1>
      <p class="lead" id="menuText"><ruby>方向<rt>ほうこう</rt></ruby>キーで<ruby>移動<rt>いどう</rt></ruby>し、<ruby>敵<rt>てき</rt></ruby>にくっついてる<ruby>単語<rt>たんご</rt></ruby>を<ruby>正確<rt>せいかく</rt></ruby>にタイプして<ruby>浄化<rt>じょうか</rt></ruby>ショットを<ruby>撃<rt>う</rt></ruby>ち<ruby>込<rt>こ</rt></ruby>もう。<br><ruby>難易度<rt>なんいど</rt></ruby>を<ruby>選<rt>えら</rt></ruby>んでゲームスタート‼️</p>
      <div class="title-award" id="titleAward"></div>
      <div class="run-achievements" id="runAchievements"></div>
      <label class="word-mode-toggle" id="wordModeToggle">
        <span class="word-mode-label">
          <strong id="wordModeTitle">英単語ON</strong>
          <span id="wordModeText">日本語+英語</span>
        </span>
        <input id="englishToggle" type="checkbox" checked>
        <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
      </label>
      <div class="controls">
        <button id="startBtn">ゲーム開始</button>
        <button class="secondary" id="practiceBtn">ステージ1から練習</button>
        <button class="secondary difficulty-btn" id="easyBtn">イージーモード</button>
        <button class="difficulty-btn" id="normalBtn">ノーマルモード</button>
        <button class="secondary difficulty-btn" id="hardBtn">ハードモード</button>
        <button class="secondary difficulty-btn" id="infernoBtn">インフェルノモード</button>
      </div>
      <div class="stage-list" id="stageList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

    function playLoopNote(note, beat, step, type = "square", volume = 0.026) {
      if (!note) return;
      const freq = noteFreqs[note] || note;
      if (type === "harmonica") harmonicaNote(freq, beat * 0.9, volume, step);
      else {
        beep(freq, beat * 0.86, type, volume, step);
        beep(freq * 2.003, beat * 0.7, "sine", volume * 0.22, step + 0.006);

        [null, 1], ["d4", 0.8], ["a4", 1], ["b4", 1], ["a4", 1], ["d4", 1], ["g4", 1.7],
      ];
      let time = 0.03;
      melody.forEach(([note, length]) => {
        playLoopNote(note, beat * length, time, "harmonica", 0.033);
        if (note) harmonicaNote((noteFreqs[note] || note) / 2, beat * length * 0.58, 0.01, time + 0.02);
        time += beat * length;

      const bass = ["g3", "g3", "d4", "g3", "e4", "d4", "g3", "d4"];

    function playRescueBgmPattern() {

    function playThunderSound(index = 0) {

      if (!audioCtx) return;

      const now = audioCtx.currentTime;

      const bufferSize = audioCtx.sampleRate * 0.25;

      const buffer = audioCtx.createBuffer(
        1,
        bufferSize,
        audioCtx.sampleRate
      );

      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * 0.7;
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const noiseGain = audioCtx.createGain();

      noiseGain.gain.setValueAtTime(0.35, now);
      noiseGain.gain.exponentialRampToValueAtTime(
        0.0001,
        now + 0.25
      );

      noise.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);

      noise.start(now);

      for (let i = 0; i < 4; i++) {

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sawtooth";

        osc.frequency.setValueAtTime(
          400 - i * 70,
          now + i * 0.02
        );

        osc.frequency.exponentialRampToValueAtTime(
          70,
          now + i * 0.08
        );

        gain.gain.setValueAtTime(
          0.0001,
          now + i * 0.02
        );

        gain.gain.exponentialRampToValueAtTime(
          0.2,
          now + i * 0.03
        );

        gain.gain.exponentialRampToValueAtTime(
          0.0001,
          now + i * 0.10
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now + i * 0.02);
        osc.stop(now + i * 0.12);
      }
    }

    function startRescueBgm() {
      try {
        getAudio();
        if (rescueBgmTimer) return;

        rescueBgmTimer = setInterval(playRescueBgmPattern, 820);
      } catch {

      }

    function fit() {
      state.ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      state.w = window.innerWidth;
      state.h = window.innerHeight;
      canvas.width = Math.floor(state.w * state.ratio);
      canvas.height = Math.floor(state.h * state.ratio);
      ctx.setTransform(state.ratio, 0, 0, state.ratio, 0, 0);
      if (!state.mouse.x) {
        state.mouse.x = state.w / 2;
        state.mouse.y = state.h / 2;
      }
      if (!state.player.x) {

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function normalizeAngle(angle) {
      const full = Math.PI * 2;
      return ((angle % full) + full) % full;
    }

    function distanceToSegment(point, start, end) {
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const lengthSq = dx * dx + dy * dy || 1;
      const t = clamp(((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSq, 0, 1);
      const x = start.x + dx * t;
      const y = start.y + dy * t;
      return Math.hypot(point.x - x, point.y - y);
    }

    function laserEndPoint() {
      const length = Math.hypot(state.w, state.h) + 140;
      return {
        x: state.player.x + Math.cos(state.laserAngle) * length,
        y: state.player.y - Math.sin(state.laserAngle) * length,
      };
    }

    function difficultyRate() {
      return difficulties[state.difficultyKey]?.rate || 1;
    }

    function stageAttackMultiplier(type) {
      const stageNumber = clamp(state.stage + 1, 1, 10);
      return (type === "boss" ? 4 : 3) * stageNumber * difficultyRate();
    }

    function stageDefenseMultiplier(type) {
      return stageAttackMultiplier(type);
    }

    function playerAttackDamage() {
      return 12 * Math.pow(1.4, state.attackRank) * Math.pow(1.2, state.combo) * state.attackBoostMultiplier;
    }

    function playerDefenseDivisor() {
      return state.defenseMultiplier;
    }

    function comboHitPitch() {
      return 1 + Math.min(2.2, state.combo * 0.055);
    }

    function applyPlayerDamage(amount, x, y) {
      if (state.invincibleTimer > 0 || state.laserTimer > 0) {
        addFloater(x, y, "無効", "#47b7c8");
        return;
      }
      const finalDamage = amount / playerDefenseDivisor();
      state.health -= finalDamage;
      state.faceTimer = 1;
      if (state.damageSoundTimer <= 0) {
        playSound("damage");
        state.damageSoundTimer = 0.28;
      }
      addFloater(x, y, `-${Math.ceil(finalDamage)}`, "#ff6b5f");
    }

    function gainTypingExp(enemy, elapsed) {
      const answerLength = Math.max(3, enemy.wordAnswer.length);
      const speedFactor = elapsed <= 0.9 ? 2.3 : elapsed <= 1.6 ? 1.8 : elapsed <= 2.6 ? 1.35 : elapsed <= 4 ? 1 : 0.72;
      const typeFactor = enemy.type === "boss" ? 2.2 : 1;
      const exp = Math.round((answerLength * 5 + 8) * speedFactor * typeFactor);
      state.exp += exp;
      addFloater(state.player.x, state.player.y - 54, `EXP +${exp}`, "#f5b84b");
      processLevelUps();
    }

    function enemyExpValue(enemy, speedFactor = 1.35) {
      const answerLength = Math.max(3, enemy.wordAnswer?.length || 3);
      const typeFactor = enemy.type === "boss" ? 2.2 : 1;
      return Math.round((answerLength * 5 + 8) * speedFactor * typeFactor);
    }

    function awardEnemyKillExp(enemy, multiplier = 1) {
      const exp = Math.round(enemyExpValue(enemy, 1.15) * multiplier);
      state.exp += exp;
      addFloater(state.player.x, state.player.y - 58, `EXP +${exp}`, "#f5b84b");
      processLevelUps();
    }

    function processLevelUps() {
      while (state.exp >= state.nextExp && state.killsSinceLevel >= 3) {
        state.exp -= state.nextExp;
        state.killsSinceLevel = Math.max(0, state.killsSinceLevel - 3);
        state.playerLevel += 1;
        state.levelUpQueue += 1;
        state.nextExp = Math.round(state.nextExp * 1.42 + 45 + state.playerLevel * 12);
        state.maxHealth *= 1.2;
        state.defenseMultiplier *= 1.2;
        state.health = clamp(state.health + state.maxHealth * 0.3, 0, state.maxHealth);
        playSound("heal");
      }
      if (state.levelUpQueue > 0 && state.running) showLevelUp();
    }

    function healPlayer(ratio, x = state.player.x, y = state.player.y - 48) {

    function isEasyWord(word) {
      const display = normalizeInput(word.display);
      if (/^[a-z]+$/.test(display)) return display.length <= 7;
      if (/^[一-龠々]{4}$/.test(display)) return false;
      return Array.from(display).length <= 6;
    }

    function isEnglishDisplayWord(word) {
      return /^[a-z]+$/.test(normalizeInput(word.display));
    }

    function isAllowedWord(word) {
      if (!state.englishWords && isEnglishDisplayWord(word)) return false;
      if (state.difficultyKey === "easy" && !isEasyWord(word)) return false;
      return true;
    }

    function pickWord() {
      const candidates = wordBank.filter(isAllowedWord);
      const pool = candidates.length ? candidates : wordBank;
      return pool[Math.floor(rand(0, pool.length))];
    }

    function normalizeInput(text) {
      return text
        .toLowerCase()
        .replace(/[ァ-ン]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60))
        .replace(/[ｰ－]/g, "-")
        .replace(/[、。，．,.「」『』（）()・\s]/g, "");
    }

    function relaxLongVowels(text) {
      return normalizeInput(text).replace(/-/g, "");
    }

    function normalizeRescueText(text) {
      return text
        .toLowerCase()
        .replace(/[ァ-ン]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60))
        .replace(/[，,]/g, "、")
        .replace(/[．.]/g, "。")
        .replace(/[「」『』（）()・\s]/g, "");
    }

    const kanaRomanMap = {
      きゃ: "kya", きゅ: "kyu", きょ: "kyo", しゃ: "sha", しゅ: "shu", しょ: "sho",
      ちゃ: "cha", ちゅ: "chu", ちょ: "cho", にゃ: "nya", にゅ: "nyu", にょ: "nyo",
      ひゃ: "hya", ひゅ: "hyu", ひょ: "hyo", みゃ: "mya", みゅ: "myu", みょ: "myo",
      りゃ: "rya", りゅ: "ryu", りょ: "ryo", ぎゃ: "gya", ぎゅ: "gyu", ぎょ: "gyo",
      じゃ: "ja", じゅ: "ju", じょ: "jo", びゃ: "bya", びゅ: "byu", びょ: "byo",
      ぴゃ: "pya", ぴゅ: "pyu", ぴょ: "pyo",
      あ: "a", い: "i", う: "u", え: "e", お: "o", か: "ka", き: "ki", く: "ku", け: "ke", こ: "ko",
      さ: "sa", し: "shi", す: "su", せ: "se", そ: "so", た: "ta", ち: "chi", つ: "tsu", て: "te", と: "to",
      な: "na", に: "ni", ぬ: "nu", ね: "ne", の: "no", は: "ha", ひ: "hi", ふ: "fu", へ: "he", ほ: "ho",
      ま: "ma", み: "mi", む: "mu", め: "me", も: "mo", や: "ya", ゆ: "yu", よ: "yo",
      ら: "ra", り: "ri", る: "ru", れ: "re", ろ: "ro", わ: "wa", を: "wo", ん: "n",
      が: "ga", ぎ: "gi", ぐ: "gu", げ: "ge", ご: "go", ざ: "za", じ: "ji", ず: "zu", ぜ: "ze", ぞ: "zo",
      だ: "da", ぢ: "ji", づ: "zu", で: "de", ど: "do", ば: "ba", び: "bi", ぶ: "bu", べ: "be", ぼ: "bo",
      ぱ: "pa", ぴ: "pi", ぷ: "pu", ぺ: "pe", ぽ: "po", ぁ: "la", ぃ: "li", ぅ: "lu", ぇ: "le", ぉ: "lo", ゃ: "lya", ゅ: "lyu", ょ: "lyo", っ: "", ー: "-",
    };

    function kanaToRoman(text) {
      const kana = normalizeInput(text);
      let output = "";
      for (let i = 0; i < kana.length; i++) {
        const pair = kana.slice(i, i + 2);
        if (kana[i] === "っ" && kana[i + 1]) {
          const next = kanaRomanMap[kana.slice(i + 1, i + 3)] || kanaRomanMap[kana[i + 1]] || "";
          output += next[0] || "";
          continue;
        }
        if (kanaRomanMap[pair]) {
          output += kanaRomanMap[pair];
          i += 1;
        } else {
          output += kanaRomanMap[kana[i]] || kana[i];
        }
      }
      return output.replace(/-/g, "");
    }

    function kanaToRomanRescue(text) {
      const kana = normalizeRescueText(text);
      let output = "";
      for (let i = 0; i < kana.length; i++) {
        const pair = kana.slice(i, i + 2);
        if (kana[i] === "っ" && kana[i + 1]) {
          const next = kanaRomanMap[kana.slice(i + 1, i + 3)] || kanaRomanMap[kana[i + 1]] || "";
          output += next[0] || "";
          continue;
        }
        if (kanaRomanMap[pair]) {
          output += kanaRomanMap[pair];
          i += 1;
        } else {
          output += kanaRomanMap[kana[i]] || kana[i];
        }
      }
      return output.replace(/-/g, "");
    }

    function rescueAnswerVariants(reading) {
      const kana = normalizeRescueText(reading);
      const roman = kanaToRomanRescue(reading);
      const variants = new Set([kana, roman]);
      for (const current of [...variants]) {
        variants.add(current.split("ha").join("wa"));
        variants.add(current.split("wo").join("o"));
        variants.add(current.split("he").join("e"));
      }
      for (const current of [...variants]) {
        variants.add(current.split("ha").join("wa").split("wo").join("o"));
        variants.add(current.split("ha").join("wa").split("he").join("e"));
        variants.add(current.split("wo").join("o").split("he").join("e"));
        variants.add(current.split("ha").join("wa").split("wo").join("o").split("he").join("e"));
      }
      return [...variants];
    }

    function rescueInputForms(text) {
      const normalized = normalizeRescueText(text);
      const roman = kanaToRomanRescue(text);
      return [...new Set([normalized, roman, normalized.replace(/nn/g, "n"), roman.replace(/nn/g, "n")])];
    }

    function romanOptions(base, kana = "") {
      const options = new Set(expandRomanVariants(base));
      if (kana === "は") options.add("wa");
      if (kana === "へ") options.add("e");
      if (kana === "を") options.add("o");
      if (kana === "ん") options.add("nn");
      return [...options];
    }

    function kanaTokenOptions(kana, index) {
      if (kana[index] === "、" || kana[index] === "。") return { options: [kana[index]], size: 1 };
      if (kana[index] === "っ" && kana[index + 1]) {
        const nextPair = kana.slice(index + 1, index + 3);
        const nextBase = kanaRomanMap[nextPair] || kanaRomanMap[kana[index + 1]] || "";
        const consonants = romanOptions(nextBase, kana[index + 1]).map((option) => option[0]).filter(Boolean);
        return { options: [...new Set(consonants)], size: 1 };
      }
      const pair = kana.slice(index, index + 2);
      if (kanaRomanMap[pair]) return { options: romanOptions(kanaRomanMap[pair], pair), size: 2 };
      return { options: romanOptions(kanaRomanMap[kana[index]] || kana[index], kana[index]), size: 1 };
    }

    function rescueRomanProgress(reading, typed) {
      const kana = normalizeRescueText(reading);
      const input = normalizeRescueText(typed);
      if (!input) return { prefix: true, exact: false };
      let positions = new Set([0]);
      for (let i = 0; i < kana.length; i++) {
        const { options, size } = kanaTokenOptions(kana, i);
        const nextPositions = new Set();
        for (const position of positions) {
          const remaining = input.slice(position);
          if (!remaining) return { prefix: true, exact: false };
          for (const option of options) {
            if (remaining.startsWith(option)) nextPositions.add(position + option.length);
            else if (option.startsWith(remaining)) return { prefix: true, exact: false };
          }
        }
        if (!nextPositions.size) return { prefix: false, exact: false };
        positions = nextPositions;
        i += size - 1;
      }
      return { prefix: positions.has(input.length), exact: positions.has(input.length) };
    }

    function rescueReadingProgressIndex(reading, typed) {
      const kana = normalizeRescueText(reading);
      const input = normalizeRescueText(typed);
      if (!input) return 0;
      let states = new Set([0]);
      let furthest = 0;
      for (let i = 0; i < kana.length; i++) {
        const { options, size } = kanaTokenOptions(kana, i);
        const nextStates = new Set();
        for (const position of states) {
          const remaining = input.slice(position);
          if (!remaining) return i;
          for (const option of options) {
            if (remaining.startsWith(option)) {
              nextStates.add(position + option.length);
              if (position + option.length <= input.length) furthest = Math.max(furthest, i + size);
            } else if (option.startsWith(remaining)) {
              furthest = Math.max(furthest, i);
            }
          }
        }
        if (!nextStates.size) return furthest;
        states = nextStates;
        i += size - 1;
      }
      return states.has(input.length) ? kana.length : furthest;
    }

    function mapReadingProgressToTextIndex(text, reading, readingIndex) {
      const normalizedText = normalizeRescueText(text);
      const normalizedReading = normalizeRescueText(reading);
      if (!readingIndex) return 0;
      if (normalizedText === normalizedReading) return Math.min(text.length, readingIndex);
      const ratio = readingIndex / Math.max(1, normalizedReading.length);
      return Math.min(text.length, Math.floor(text.length * ratio));
    }

    function currentRescueReadingIndex(reading) {
      if (!state.rescue?.input) return 0;
      const normalizedReading = normalizeRescueText(reading);
      let best = 0;
      for (const form of rescueInputForms(state.rescue.input)) {
        if (/^[a-z。、]+$/.test(form)) {
          best = Math.max(best, rescueReadingProgressIndex(reading, form));
        } else if (normalizedReading.startsWith(form)) {
          best = Math.max(best, form.length);
        }
      }
      return best;
    }

    function rescueMatchStatus(candidate) {
      if (!state.rescue) return { prefix: false, exact: false };
      const forms = rescueInputForms(candidate);
      let prefix = false;
      let exact = false;
      for (const form of forms) {
        for (const answer of state.rescue.answers) {
          if (answer.startsWith(form)) prefix = true;
          if (answer === form) exact = true;
        }
        if (/^[a-z。、]+$/.test(form)) {
          const romanStatus = rescueRomanProgress(state.rescue.prompt.reading, form);
          prefix ||= romanStatus.prefix;
          exact ||= romanStatus.exact;
        }
      }
      return { prefix, exact };
    }

    function expandRomanVariants(answer) {
      const normalized = normalizeInput(answer);
      if (!/^[a-z]+$/.test(normalized)) return [normalized];
      const variants = new Set([normalized]);
      for (const [a, b] of romanVariantPairs) {
        for (const current of [...variants]) {
          if (current.includes(a)) variants.add(current.split(a).join(b));
          if (current.includes(b)) variants.add(current.split(b).join(a));
        }
        if (variants.size > 80) break;
      }
      for (const [a, b] of romanVariantExpansions) {
        for (const current of [...variants]) {
          if (current.includes(a)) variants.add(current.split(a).join(b));
          if (current.includes(b)) variants.add(current.split(b).join(a));
        }
        if (variants.size > 140) break;
      }
      return [...variants];
    }

    function hasKanji(text) {
      return /[一-龠々]/.test(text);
    }

    function inferReading(word) {
      if (word.reading) return word.reading;
      return word.answers.find((answer) => /^[ぁ-んー]+$/.test(normalizeRescueText(answer))) || "";
    }

    function assignWord(enemy) {
      const word = pickWord();
      enemy.wordDisplay = word.display;
      enemy.wordReading = hasKanji(word.display) ? inferReading(word) : "";
      enemy.wordAnswers = [...new Set([...word.answers, word.display].flatMap(expandRomanVariants).flatMap((answer) => [normalizeInput(answer), relaxLongVowels(answer)]))];
      enemy.wordAnswer = enemy.wordAnswers[0];
      enemy.typedFlash = 0;
    }

    function mistypeAchievementName(won = false) {
      const misses = state.totalMistypes;
      if (!won && state.stage === 0) return "🏆 へっぽこタイパー 🏆";
      if (!won && misses === 0) return "🏆 へっぽこタイパー 🏆";
      if (misses === 0) return "🏆 完全無欠の神タイパー 🏆";
      if (misses < 20) return "🏆 伝説の浄化士 🏆";
      if (misses < 40) return "🏆 熟練タイパー 🏆";
      if (misses < 60) return "🏆 安定タイパー 🏆";
      if (misses < 80) return "🏆 がんばりタイパー 🏆";
      if (misses < 100) return "🏆 それでも街を救った 🏆";
      return "🏆 最後まであきらめなかった 🏆";

    function formatPlayTime(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}分${seconds}秒`;
    }

    function playResultLines() {
      const elapsedMs = state.playStartTime ? Date.now() - state.playStartTime : 0;
      const elapsedSeconds = Math.max(0, elapsedMs / 1000);
      const speed = elapsedSeconds > 0 ? state.totalTypedChars / elapsedSeconds : 0;
      return [
        `合計撃破数: ${state.totalKills}体`,
        `合計タイプ数: ${state.totalTypedChars}文字`,
        `合計プレイ時間: ${formatPlayTime(elapsedMs)}`,
        `平均入力速度: ${speed.toFixed(2)}文字/秒`,
      ];
    }

    function endRunAchievementText(won = false) {
      const lines = [
        mistypeAchievementName(won),
        state.englishWords ? "単語モード: 英単語あり" : "単語モード: 日本語のみ",
      ];
      if (state.maxCombo >= 20) {
        lines.push(`コンボ実績: 🏆 最大${state.maxCombo}コンボ 🏆`);
      } else {
        lines.push(`最大${state.maxCombo}コンボ`);
      }
      lines.push(...playResultLines());
      return lines.join("\n");
    }
